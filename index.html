  body{font-size:15px}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useRef,useCallback}=React;

/* ====================================================================
   DB ハイブリッドストレージ (boat-sign と同じ設計)
   サーバーあり: SQLite経由 / サーバーなし: IndexedDB
==================================================================== */
let _useServer=false, _serverBase='';
let _idb=null;
const IDB_NAME='KeirinSignDB';

function _getIDB(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,3);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      ['players','raceResults','signConditions','signTracking','discoveries','predictionLogs'].forEach(n=>{
        if(!d.objectStoreNames.contains(n)){
          d.createObjectStore(n,{keyPath:'id',autoIncrement:true});
        }
      });
    };
    r.onsuccess=e=>{_idb=e.target.result;res(_idb)};
    r.onerror=e=>rej(e);
  });
}
async function _idbAll(store){
  const db=await _getIDB();
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readonly');
    const r=t.objectStore(store).getAll();
    r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error);
  });
}
async function _idbPut(store,data){
  const db=await _getIDB();
  // raceResults: 同date+venue+raceNoがあれば上書き
  if(store==='raceResults'&&data.date&&data.venue&&data.raceNo!=null&&!data.id){
    const existing=await new Promise((res,rej)=>{
      const t=db.transaction(store,'readonly');
      const r=t.objectStore(store).getAll();
      r.onsuccess=()=>res(r.result||[]);
      r.onerror=()=>rej(r.error);
    });
    const dup=existing.find(r=>String(r.date)===String(data.date)&&String(r.venue)===String(data.venue)&&String(r.raceNo)===String(data.raceNo));
    if(dup)data={...data,id:dup.id};
  }
  // discoveries: 同一サインキーがあれば上書き
  if(store==='discoveries'&&!data.id&&data.type){
    const existing=await new Promise((res,rej)=>{
      const t=db.transaction(store,'readonly');
      const r=t.objectStore(store).getAll();
      r.onsuccess=()=>res(r.result||[]);
      r.onerror=()=>rej(r.error);
    });
    const newKey=signKey(data);
    const dup=existing.find(d=>signKey(d)===newKey);
    if(dup)data={...data,id:dup.id};
  }
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readwrite');
    const r=t.objectStore(store).put(data);
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
async function _idbDel(store,id){
  const db=await _getIDB();
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readwrite');
    const r=t.objectStore(store).delete(id);
    r.onsuccess=()=>res(); r.onerror=()=>rej(r.error);
  });
}

async function dbAll(store){
  if(_useServer){
    try{
      const r=await fetch(`${_serverBase}/api/db/${store}`);
      const d=await r.json();
      return d.data||[];
    }catch(e){_useServer=false;}
  }
  return _idbAll(store);
}
async function dbPut(store,data){
  if(_useServer){
    try{
      const r=await fetch(`${_serverBase}/api/db/${store}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
      });
      const d=await r.json();
      return d.id;
    }catch(e){_useServer=false;}
  }
  return _idbPut(store,data);
}
async function dbDel(store,id){
  if(_useServer){
    try{await fetch(`${_serverBase}/api/db/${store}/${id}`,{method:'DELETE'});return;}
    catch(e){_useServer=false;}
  }
  return _idbDel(store,id);
}

// ★ Render デプロイ後ここを実URLに書き換える (デフォルト: keirin-sign.onrender.com)
const CLOUD_URL='https://keirin-sign.onrender.com';

async function _tryCloud(){
  try{
    // Render free plan は cold start で 30秒以上かかることあり
    const r=await fetch(`${CLOUD_URL}/api/ping`,{signal:AbortSignal.timeout(45000)});
    const d=await r.json();
    if(d.ok===true){_useServer=true;_serverBase=CLOUD_URL;return true;}
  }catch(e){}
  return false;
}

/* ====================================================================
   CORS プロキシ経由のクライアントサイド KEIRIN.JP スクレイピング
   (サーバーなしでも GitHub Pages から直接データ取得可能)
==================================================================== */
const CORS_PROXIES=[
  'https://api.codetabs.com/v1/proxy/?quest=',
];
const KEIRIN_JSON='https://keirin.jp/pc/json';

async function _proxyFetch(params,timeout=20000){
  const qs=new URLSearchParams(params).toString();
  const target=`${KEIRIN_JSON}?${qs}`;
  for(const proxy of CORS_PROXIES){
    try{
      const url=proxy+encodeURIComponent(target);
      const r=await fetch(url,{signal:AbortSignal.timeout(timeout)});
      if(!r.ok)continue;
      const ct=r.headers.get('content-type')||'';
      if(!ct.includes('json'))continue;
      return await r.json();
    }catch(e){console.warn('proxy failed:',proxy,e);}
  }
  throw new Error('CORS proxy 経由の取得に失敗しました');
}

const VENUE_NAME_TO_CD={'函館':'11','青森':'12','いわき平':'13','弥彦':'21','前橋':'22','取手':'23',
  '宇都宮':'24','大宮':'25','西武園':'26','京王閣':'27','立川':'28','松戸':'31','千葉':'32',
  '川崎':'34','平塚':'35','小田原':'36','伊東':'37','静岡':'38','名古屋':'42','岐阜':'43',
  '大垣':'44','豊橋':'45','富山':'46','松阪':'47','四日市':'48','福井':'51','奈良':'53',
  '向日町':'54','和歌山':'55','岸和田':'56','玉野':'61','広島':'62','防府':'63','高松':'71',
  '小松島':'73','高知':'74','松山':'75','小倉':'81','久留米':'83','武雄':'84','佐世保':'85','別府':'86','熊本':'87'};

async function clientFetchVenues(dateStr){
  const kday=dateStr.replace(/-/g,'');
  const j=await _proxyFetch({type:'JSJ057',kday});
  const venues=(j.kInfo||[]).map(v=>({
    name:v.jyoName, code:v.bKeirinCd||v.KeirinCd,
    grade:v.gradeIconChar||'', nitiji:v.nitijiIconChar||'',
    encPrm:v.encPrm,
  }));
  return venues;
}

async function clientFetchRacelist(dateStr,venueName,raceNo){
  // venuesを取得してencPrmを得る
  const venues=await clientFetchVenues(dateStr);
  const v=venues.find(x=>x.name===venueName);
  if(!v||!v.encPrm)throw new Error(`${venueName} は ${dateStr} に開催されていません`);
  const j=await _proxyFetch({type:'JSJ017',encp:v.encPrm});
  const races=(j.rInfo||[]).map(r=>({
    raceNo:r.raceNo, syumoku:r.syumoku, denTime:r.denTime, stTime:r.stTime,
    racers:(r.sInfo||[]).map(s=>({
      syaban:Number(s.syaban),
      regNo:String(s.senNo||'').padStart(6,'0'),
      name:(s.senName||'').replace('　',' ').trim(),
      prefecture:(s.huken||'').replace(/　/g,'').trim(),
      kyaku:s.kyaku||'',
      note:s.assen||'',
    })),
  }));
  if(raceNo){
    const targetNo=Number(raceNo);
    const found=races.find(r=>r.raceNo===targetNo);
    if(!found)throw new Error(`${targetNo}R が見つかりません`);
    return {race:found,encPrm:v.encPrm,grade:v.grade};
  }
  return {races,encPrm:v.encPrm,grade:v.grade};
}

/* 本日データを自動取得する共通関数 (起動時・定期更新で使う) */
async function autoFetchTodayData(opts={}){
  const onProgress=opts.onProgress||(()=>{});
  const dateStr=opts.date||new Date().toISOString().slice(0,10);
  const force=opts.force||false;

  // 既存の本日データをチェック
  const existing=await dbAll('raceResults');
  const todayExisting=existing.filter(r=>r.date===dateStr);
  // 全レースに結果が揃っているかチェック
  const allHaveResult=todayExisting.length>0&&todayExisting.every(r=>r.result1);

  if(!force&&allHaveResult){
    onProgress({status:'skipped',message:'本日データ取得済み (結果も全て揃っています)'});
    return {saved:0,skipped:todayExisting.length,errors:0};
  }

  onProgress({status:'fetching',message:'本日の開催場を取得中...'});
  let venues;
  try{
    venues=await clientFetchVenues(dateStr);
  }catch(e){
    onProgress({status:'error',message:'開催場取得失敗: '+e.message});
    return {saved:0,skipped:0,errors:1};
  }

  if(venues.length===0){
    onProgress({status:'done',message:'本日は開催無し'});
    return {saved:0,skipped:0,errors:0};
  }

  let saved=0,errors=0;
  for(let i=0;i<venues.length;i++){
    const v=venues[i];
    onProgress({status:'fetching',message:`${i+1}/${venues.length} ${v.name} を取得中...`,progress:i/venues.length});
    try{
      const [entriesJson,resultsJson]=await Promise.all([
        _proxyFetch({type:'JSJ017',encp:v.encPrm}),
        _proxyFetch({type:'JSJ018',encp:v.encPrm}).catch(()=>({})),
      ]);
      const resMap={};
      ((resultsJson||{}).resultList||[]).forEach(r=>{
        const rno=parseInt((r.rclblRaceNo||'').replace('R',''));
        if(!rno)return;
        const get=(lst,k,d='')=>lst&&lst[0]?lst[0][k]:d;
        const pay3raw=(r.harai3renList?.[0]?.kingaku||'').replace(/[,円]/g,'');
        const pay2raw=(r.harai2syaList?.[0]?.kingaku||'').replace(/[,円]/g,'');
        const ninki3=(r.harai3renList?.[0]?.ninki||'').replace(/[()]/g,'');
        const ninki2=(r.harai2syaList?.[0]?.ninki||'').replace(/[()]/g,'');
        resMap[rno]={
          result1:get(r.tyakui1List||[],'rclblSyaban'),
          result2:get(r.tyakui2List||[],'rclblSyaban'),
          result3:get(r.tyakui3List||[],'rclblSyaban'),
          kimari1:get(r.tyakui1List||[],'rclblKimari',''),
          kimari2:get(r.tyakui2List||[],'rclblKimari',''),
          kimari3:get(r.tyakui3List||[],'rclblKimari',''),
          trifectaCombo:r.harai3renList?.[0]?.kumi||'',
          exactaCombo:r.harai2syaList?.[0]?.kumi||'',
          trifectaPayout:pay3raw?Number(pay3raw):null,
          exactaPayout:pay2raw?Number(pay2raw):null,
          trifectaNinki:ninki3?Number(ninki3):null,
          exactaNinki:ninki2?Number(ninki2):null,
          raceRVPrm:r.raceRVPrm||r.raceTanpyoPrm||'',
        };
      });
      const races=(entriesJson.rInfo||[]).map(r=>({
        date:dateStr, venue:v.name, raceNo:Number(r.raceNo),
        grade:v.grade||'', syumoku:r.syumoku||'',
        denTime:r.denTime||'', stTime:r.stTime||'',
        entries:(r.sInfo||[]).map(s=>({
          syaban:Number(s.syaban),
          regNo:String(s.senNo||'').padStart(6,'0'),
          name:(s.senName||'').replace('　',' ').trim(),
          prefecture:(s.huken||'').replace(/　/g,'').trim(),
          kyaku:s.kyaku||'', note:s.assen||'',
        })),
        racerCount:(r.sInfo||[]).length,
        ...(resMap[Number(r.raceNo)]||{})
      }));
      for(const race of races){
        await dbPut('raceResults',race);
        saved++;
      }
    }catch(e){
      console.warn(`auto-fetch venue ${v.name} failed:`,e);
      errors++;
    }
  }
  onProgress({status:'done',message:`完了: ${saved}レース取得, エラー${errors}場`,progress:1});
  return {saved,errors};
}

/* ROI+ サイン総動員マイニング
   全2車連動パターンを抽出し、実際のワイド配当からROIを計算、
   連動率80%+ AND ROI 100%+ のものだけ返す */
async function mineROIPositive(races,players,opts={}){
  const minRate=opts.minRate||80;
  const minROI=opts.minROI||100;
  const minTrials=opts.minTrials||3;
  const onProgress=opts.onProgress||(()=>{});
  const validRaces=dedupRaces(races).filter(r=>r.result1&&r.entries&&r.entries.length>0);
  const playerMap={};
  players.forEach(p=>{if(p.regNo)playerMap[String(p.regNo).padStart(6,'0')]=p;});
  validRaces.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const rn=String(e.regNo||'').padStart(6,'0');
      if(rn&&!playerMap[rn]&&e.name)playerMap[rn]={regNo:rn,name:e.name};
    });
  });

  // 1) 全パターン抽出 (PLAYER_SYABAN_PAIR_LINK のみ、最初は速いやつから)
  onProgress({phase:'mining',message:`${validRaces.length}件のレースから2車連動パターンを抽出中...`,progress:0});
  const psHist={};
  validRaces.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const rn=String(e.regNo||'').padStart(6,'0');
      const sy=Number(e.syaban);
      if(!rn||!sy)return;
      (psHist[`${rn}|${sy}`]=psHist[`${rn}|${sy}`]||[]).push(r);
    });
  });

  const candidates=[];
  Object.entries(psHist).forEach(([key,races_])=>{
    if(races_.length<minTrials)return;
    const [rn,syStr]=key.split('|');
    const sy=Number(syStr);
    const top3Sets=races_.map(r=>new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number)));
    for(let n1=1;n1<=9;n1++){
      if(n1===sy)continue;
      for(let n2=n1+1;n2<=9;n2++){
        if(n2===sy)continue;
        const hits=top3Sets.filter(t3=>t3.has(n1)&&t3.has(n2)).length;
        if(hits<minTrials)continue;
        const rate=Math.round(hits/races_.length*100);
        if(rate<minRate)continue;
        candidates.push({
          type:'PLAYER_SYABAN_PAIR_LINK',
          regNo:rn,
          playerName:(playerMap[rn]||{}).name||'?',
          syaban:sy,linkedPair:[n1,n2],
          trials:races_.length,hits,rate,
          _matchedRaces:races_,  // 内部用 (DBに保存しない)
        });
      }
    }
  });

  onProgress({phase:'mining',message:`${candidates.length}件の候補抽出完了 → ROI計算開始`,progress:0});

  // 2) 各候補のROI計算 (ワイド配当を取得)
  const roiPositive=[];
  const venueEncCache={};
  const startedAt=Date.now();

  for(let i=0;i<candidates.length;i++){
    if(opts.cancelRef&&opts.cancelRef.cancelled)break;
    const sign=candidates[i];
    const pair=sign.linkedPair;
    const key=pair.join('-');
    let totalPayout=0,hitWithPayout=0,fetchedNew=0,skippedNoEnc=0;
    const enriched=[];

    for(const r of sign._matchedRaces){
      const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
      const isHit=pair.every(n=>top3.includes(n));
      if(!isHit){enriched.push({race:r,isHit:false,pay:null});continue;}
      let pay=null;
      if(r.widePayouts&&r.widePayouts[key]!=null){
        pay=r.widePayouts[key];
      }else{
        let rvPrm=r.raceRVPrm;
        if(!rvPrm){
          // 過去レースの場合はvenue経由で取得
          const cacheKey=`${r.date}|${r.venue}`;
          if(!(cacheKey in venueEncCache)){
            try{
              const venues=await clientFetchVenues(r.date);
              const v=venues.find(x=>x.name===r.venue);
              if(v&&v.encPrm){
                const j=await _proxyFetch({type:'JSJ018',encp:v.encPrm});
                const map={};
                (j.resultList||[]).forEach(rr=>{
                  const rno=parseInt((rr.rclblRaceNo||'').replace('R',''));
                  if(rno&&(rr.raceRVPrm||rr.raceTanpyoPrm))map[rno]=rr.raceRVPrm||rr.raceTanpyoPrm;
                });
                venueEncCache[cacheKey]=map;
              }else{venueEncCache[cacheKey]={};}
            }catch(e){venueEncCache[cacheKey]={};}
          }
          rvPrm=venueEncCache[cacheKey][r.raceNo];
        }
        if(rvPrm){
          try{
            const w=await clientFetchWideForRace(rvPrm);
            pay=w.widePayouts[key];
            if(Object.keys(w.widePayouts).length>0){
              await dbPut('raceResults',{...r,widePayouts:w.widePayouts,wideNinki:w.wideNinki,raceRVPrm:rvPrm});
              fetchedNew++;
            }
          }catch(e){}
        }else{skippedNoEnc++;}
      }
      if(pay!=null){totalPayout+=pay;hitWithPayout++;}
      enriched.push({race:r,isHit:true,pay});
    }

    const trials=sign._matchedRaces.length;
    const hits=enriched.filter(e=>e.isHit).length;
    const totalBet=trials*100;
    const roi=totalBet>0?totalPayout/totalBet*100:0;

    if(roi>=minROI&&hitWithPayout>=Math.min(minTrials,hits)){
      const avgPay=hits>0?Math.round(totalPayout/hits):0;
      const desc=`${sign.playerName} が${sign.syaban}番のとき → ${pair[0]}・${pair[1]}両方3着以内 ${sign.rate}% (${sign.hits}/${trials})`;
      roiPositive.push({
        type:sign.type, regNo:sign.regNo, playerName:sign.playerName,
        syaban:sign.syaban, linkedPair:sign.linkedPair,
        trials,hits,hitWithPayout,
        totalBet,totalPayout,roi:Math.round(roi*10)/10,avgPay,
        rate:sign.rate,desc,
        examples:enriched.filter(e=>e.isHit).slice(0,8).map(e=>({
          date:e.race.date,venue:e.race.venue,raceNo:e.race.raceNo,
          result:[e.race.result1,e.race.result2,e.race.result3].filter(Boolean).join('-'),
          pay:e.pay,
        })),
      });
    }

    if(i%5===0||i===candidates.length-1){
      const elapsed=Math.round((Date.now()-startedAt)/1000);
      const remaining=i>0?Math.round((candidates.length-i-1)*(elapsed/(i+1))):'?';
      onProgress({phase:'roi',
        message:`${i+1}/${candidates.length} 確定${roiPositive.length}件 (経過${elapsed}s / 残り${remaining}s)`,
        progress:(i+1)/candidates.length,
      });
    }
  }

  roiPositive.sort((a,b)=>b.roi-a.roi);
  onProgress({phase:'done',message:`完了: ${roiPositive.length}件のROI100%+サイン`,progress:1});
  return roiPositive;
}

async function clientFetchWideForRace(raceEncp){
  /* JSJ012: 1レースの詳細配当 (ワイド含む)
     return: {widePayouts: {'1-2': 140, ...}, wideNinki: {'1-2': 1, ...}}*/
  try{
    const j=await _proxyFetch({type:'JSJ012',encp:raceEncp});
    const sub=j.haraiGakuSubData||{};
    const wideList=sub.WHaraiGakuDispItemSubData||[];
    const widePayouts={},wideNinki={};
    wideList.forEach(it=>{
      if(!it.kumiBan)return;
      const nums=it.kumiBan.split('=').map(n=>parseInt(n.trim())).filter(n=>n>0).sort((a,b)=>a-b);
      if(nums.length!==2)return;
      const key=nums.join('-');
      const price=parseInt((it.haraiGaku||'').replace(/[,円]/g,''));
      const ninki=parseInt((it.ninki||'').replace(/[()]/g,''));
      if(price>0)widePayouts[key]=price;
      if(ninki>0)wideNinki[key]=ninki;
    });
    return {widePayouts,wideNinki};
  }catch(e){return {widePayouts:{},wideNinki:{}};}
}

async function clientFetchResults(dateStr,venueName){
  const venues=await clientFetchVenues(dateStr);
  const v=venues.find(x=>x.name===venueName);
  if(!v||!v.encPrm)return null;
  const j=await _proxyFetch({type:'JSJ018',encp:v.encPrm});
  const map={};
  (j.resultList||[]).forEach(r=>{
    const rno=parseInt((r.rclblRaceNo||'').replace('R',''));
    if(!rno)return;
    const get=(lst,k,d='')=>lst&&lst[0]?lst[0][k]:d;
    const t1=r.tyakui1List||[], t2=r.tyakui2List||[], t3=r.tyakui3List||[];
    const pay3raw=(r.harai3renList?.[0]?.kingaku||'').replace(/[,円]/g,'');
    const pay2raw=(r.harai2syaList?.[0]?.kingaku||'').replace(/[,円]/g,'');
    map[rno]={
      result1:get(t1,'rclblSyaban'),result2:get(t2,'rclblSyaban'),result3:get(t3,'rclblSyaban'),
      kimari1:get(t1,'rclblKimari',''),kimari2:get(t2,'rclblKimari',''),kimari3:get(t3,'rclblKimari',''),
      trifectaPayout:pay3raw?Number(pay3raw):null,
      exactaPayout:pay2raw?Number(pay2raw):null,
    };
  });
  return map;
}

async function initStorage(){
  // 1. ローカルサーバー (start_server.command 起動時)
  try{
    const r=await fetch('/api/ping',{signal:AbortSignal.timeout(2500)});
    const d=await r.json();
    if(d.ok===true){_useServer=true;_serverBase='';return 'local';}
  }catch(e){}

  // 2. Render (GitHub Pages 経由でアクセス時)
  if(await _tryCloud()) return 'cloud';

  // 3. IndexedDB フォールバック (外出モード)
  // 空の場合は keirinsign_export.json から自動シード
  try{
    const existing=await _idbAll('players');
    if(existing.length===0){
      const resp=await fetch('./keirinsign_export.json',{signal:AbortSignal.timeout(20000)});
      if(resp.ok){
        const data=await resp.json();
        const db=await _getIDB();
        for(const store of ['players','raceResults','signConditions','signTracking','discoveries']){
          const records=data[store]||[];
          if(records.length>0){
            await new Promise((res,rej)=>{
              const t=db.transaction(store,'readwrite');
              const os=t.objectStore(store);
              records.forEach(rec=>os.put(rec));
              t.oncomplete=()=>res();
              t.onerror=()=>rej(t.error);
            });
          }
        }
      }
    }
  }catch(e){console.error('auto-seed:',e);}
  return 'idb';
}

function permutations(arr,r){
  if(r===0)return[[]];
  const out=[];
  arr.forEach((x,i)=>{
    const rest=[...arr.slice(0,i),...arr.slice(i+1)];
    permutations(rest,r-1).forEach(p=>out.push([x,...p]));
  });
  return out;
}

/* 出走表データが欠けているレースを再取得して補完 */
async function repairMissingEntries(onProgress){
  const races=await dbAll('raceResults');
  // 結果あり + 出走表なし のレースを抽出
  const targets=races.filter(r=>r.result1&&(!r.entries||r.entries.length===0));
  if(targets.length===0)return {repaired:0,failed:0,skipped:0};

  // (date, venue) ごとにグルーピング (同会場・同日は1回のAPI呼出で全レース取得)
  const groups={};
  targets.forEach(r=>{
    const k=`${r.date}|${r.venue}`;
    (groups[k]=groups[k]||[]).push(r);
  });
  const groupKeys=Object.keys(groups);

  let repaired=0,failed=0,doneGroups=0;
  for(const gk of groupKeys){
    const [date,venue]=gk.split('|');
    const racesInGroup=groups[gk];
    try{
      // 会場情報取得 → JSJ017で全レースの出走表を一括取得
      const venues=await clientFetchVenues(date);
      const v=venues.find(x=>x.name===venue);
      if(!v||!v.encPrm){failed+=racesInGroup.length;doneGroups++;continue;}
      const j=await _proxyFetch({type:'JSJ017',encp:v.encPrm});
      const entriesMap={};
      (j.rInfo||[]).forEach(r=>{
        entriesMap[Number(r.raceNo)]=(r.sInfo||[]).map(s=>({
          syaban:Number(s.syaban),
          regNo:String(s.senNo||'').padStart(6,'0'),
          name:(s.senName||'').replace('　',' ').trim(),
          prefecture:(s.huken||'').replace(/　/g,'').trim(),
          kyaku:s.kyaku||'',
          note:s.assen||'',
        }));
      });
      for(const race of racesInGroup){
        const ents=entriesMap[race.raceNo];
        if(ents&&ents.length>0){
          await dbPut('raceResults',{...race,entries:ents,racerCount:ents.length});
          repaired++;
        }else{
          failed++;
        }
      }
    }catch(e){
      console.warn(`repair ${gk} failed:`,e);
      failed+=racesInGroup.length;
    }
    doneGroups++;
    if(onProgress)onProgress(doneGroups,groupKeys.length,repaired,failed);
  }
  return {repaired,failed,total:targets.length};
}

/* 高速一括削除 (IndexedDB単一トランザクションでN件削除) */
async function bulkDeleteRaces(idsToDelete,onProgress){
  if(!idsToDelete||idsToDelete.length===0)return;
  const db=await _getIDB();
  const BATCH=500;  // 1トランザクションに収める件数
  let done=0;
  for(let i=0;i<idsToDelete.length;i+=BATCH){
    const batch=idsToDelete.slice(i,i+BATCH);
    await new Promise((res,rej)=>{
      const t=db.transaction('raceResults','readwrite');
      const s=t.objectStore('raceResults');
      batch.forEach(id=>s.delete(id));
      t.oncomplete=()=>res();
      t.onerror=()=>rej(t.error);
    });
    done+=batch.length;
    if(onProgress)onProgress(done,idsToDelete.length);
  }
}

/* 重複レースを検出して削除 (新しい id を残す) */
async function dedupRaceResultsDB(onProgress){
  const races=await dbAll('raceResults');
  const byKey={};
  const toDelete=[];
  races.forEach(r=>{
    const k=`${r.date||''}|${r.venue||''}|${r.raceNo||''}`;
    const prev=byKey[k];
    if(!prev){byKey[k]=r;return;}
    if((r.id||0)>(prev.id||0)){toDelete.push(prev.id);byKey[k]=r;}
    else{toDelete.push(r.id);}
  });
  if(toDelete.length===0)return 0;
  await bulkDeleteRaces(toDelete,onProgress);
  return toDelete.length;
}

// サインの一意キーを生成 (データ型ゆれにも対応)
function signKey(s){
  const norm=(v)=>v==null?'':String(v).trim();
  const normN=(v)=>{const n=parseInt(v);return isNaN(n)?'':String(n);};
  const normPair=(v)=>{
    if(Array.isArray(v))return v.map(normN).filter(Boolean).sort((a,b)=>Number(a)-Number(b)).join(',');
    if(typeof v==='string')return v.split(/[,\-=]/).map(normN).filter(Boolean).sort((a,b)=>Number(a)-Number(b)).join(',');
    return '';
  };
  const type=norm(s.type||s.conditionType);
  const reg=norm(s.regNo).padStart(6,'0');
  const sy=normN(s.syaban);
  if(type==='PLAYER_SYABAN_LINK')return `PSL|${reg}|${sy}|${normN(s.linkedSyaban)}`;
  if(type==='PLAYER_SYABAN_PAIR_LINK')return `PSPL|${reg}|${sy}|${normPair(s.linkedPair)}`;
  if(type==='PLAYER_COMBO_LINK'){
    const ab=[norm(s.regA).padStart(6,'0'),norm(s.regB).padStart(6,'0')].sort().join('+');
    return `PCL|${ab}|${normN(s.syaA)}|${normN(s.syaB)}|${normN(s.linkedSyaban)}`;
  }
  if(type==='PLAYER_COMBO_PAIR_LINK'){
    const ab=[norm(s.regA).padStart(6,'0'),norm(s.regB).padStart(6,'0')].sort().join('+');
    return `PCPL|${ab}|${normN(s.syaA)}|${normN(s.syaB)}|${normPair(s.linkedPair)}`;
  }
  if(type==='COURSE_LINK')return `CL|${reg}|${norm(s.venue)}|${sy}|${normN(s.lookback)||'3'}`;
  if(type==='KYAKU_PATTERN')return `KP|${norm(s.pattern)}|${norm(s.winnerKyaku)}`;
  if(type==='VENUE_CAR_HABIT')return `VCH|${norm(s.venue)}|${normN(s.racerCount)}|${sy}|${norm(s.side)}`;
  if(type==='KYAKU_CAR_HABIT')return `KCH|${norm(s.kyaku)}|${normN(s.racerCount)}|${sy}|${norm(s.side)}`;
  return `${type}|${reg}|${sy}`;
}

// サイン配列を一意キーで重複除去 (最初に出現したものを残す)
function dedupSigns(signs){
  const seen=new Set();
  const out=[];
  signs.forEach(s=>{
    const k=signKey(s);
    if(seen.has(k))return;
    seen.add(k);
    out.push(s);
  });
  return out;
}

// 同date+venue+raceNoの重複を除去 (id最大=最新を残す)
function dedupRaces(races){
  const byKey={};
  races.forEach(r=>{
    const k=`${r.date||''}|${r.venue||''}|${r.raceNo||''}`;
    const prev=byKey[k];
    if(!prev||(r.id||0)>(prev.id||0))byKey[k]=r;
  });
  return Object.values(byKey);
}

function mineClientSide(races, players, opts={}){
  const minTrials=opts.minTrials||5;
  const minRate=opts.minRate||90;
  // 重複レース排除 → 結果あり&エントリありのみ
  const validRaces=dedupRaces(races).filter(r=>r.result1&&r.entries&&r.entries.length>0);
  const playerMap={};
  players.forEach(p=>{if(p.regNo)playerMap[String(p.regNo).padStart(6,'0')]=p;});
  // フォールバック: 選手DBに無いregNoはrace.entriesから名前を補完
  validRaces.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const rn=String(e.regNo||'').padStart(6,'0');
      if(!rn||playerMap[rn])return;
      if(e.name){
        playerMap[rn]={regNo:rn,name:e.name,prefecture:e.prefecture||'',kyaku:e.kyaku||''};
      }
    });
  });

  // 1. コース連動: 選手×場×車番の連動率
  const histories={};
  validRaces.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const rn=String(e.regNo||'').padStart(6,'0');
      const sy=Number(e.syaban);
      if(!rn||!sy)return;
      const key=`${rn}|${r.venue}|${sy}`;
      (histories[key]=histories[key]||[]).push(r);
    });
  });
  Object.keys(histories).forEach(k=>{
    histories[k].sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.raceNo-b.raceNo));
  });
  const courseLink=[];
  Object.entries(histories).forEach(([key,hist])=>{
    if(hist.length<minTrials+2)return;
    const [rn,venue,syStr]=key.split('|');
    const sy=Number(syStr);
    for(let lb=2;lb<=5;lb++){
      if(hist.length<minTrials+lb)continue;
      let trials=0,hits2=0,hits3=0;
      for(let i=lb;i<hist.length;i++){
        const curr=hist[i], ref=hist[i-lb];
        const refTop3=[ref.result1,ref.result2,ref.result3].filter(Boolean).map(Number);
        const curTop3=[curr.result1,curr.result2,curr.result3].filter(Boolean).map(Number);
        if(refTop3.length<3||curTop3.length<3)continue;
        const refRegs=refTop3.map(bn=>{
          const en=(ref.entries||[]).find(e=>Number(e.syaban)===bn);
          return en?String(en.regNo||'').padStart(6,'0'):null;
        }).filter(Boolean);
        const curRegs=curTop3.map(bn=>{
          const en=(curr.entries||[]).find(e=>Number(e.syaban)===bn);
          return en?String(en.regNo||'').padStart(6,'0'):null;
        }).filter(Boolean);
        if(refRegs.length<3||curRegs.length<3)continue;
        const matches=refRegs.filter(x=>curRegs.includes(x)).length;
        trials++;
        if(matches>=2)hits2++;
        if(matches>=3)hits3++;
      }
      if(trials<minTrials)continue;
      const rate2=Math.round(hits2/trials*100);
      if(rate2>=minRate){
        const p=playerMap[rn];
        courseLink.push({
          type:'COURSE_LINK',regNo:rn,playerName:p?p.name:'?',
          venue,syaban:sy,lookback:lb,trials,hits2,hits3,
          rate2,rate3:Math.round(hits3/trials*100),
          desc:`${p?p.name:'?'} ${venue}${sy}番 ${lb}走前→2艇以上連動 ${rate2}% (${hits2}/${trials})`,
        });
      }
    }
  });
  courseLink.sort((a,b)=>b.rate2-a.rate2||b.trials-a.trials);

  // 2. 競輪場×車番の3着内率
  const venueSyaban={};
  validRaces.forEach(r=>{
    const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
    (r.entries||[]).forEach(e=>{
      const sy=Number(e.syaban);
      if(!sy)return;
      const key=`${r.venue}|${sy}`;
      const d=venueSyaban[key]=venueSyaban[key]||{trials:0,inTop3:0,wins:0};
      d.trials++;
      if(top3.has(sy))d.inTop3++;
      if(Number(r.result1)===sy)d.wins++;
    });
  });
  const venueSyabanOut=[];
  Object.entries(venueSyaban).forEach(([k,d])=>{
    if(d.trials<minTrials*3)return;
    const rate3=Math.round(d.inTop3/d.trials*100);
    const rateWin=Math.round(d.wins/d.trials*100);
    if(rate3>=minRate||rateWin>=50){
      const [venue,syStr]=k.split('|');
      venueSyabanOut.push({type:'VENUE_SYABAN',venue,syaban:Number(syStr),
        trials:d.trials,inTop3:d.inTop3,wins:d.wins,rate3,rateWin,
        desc:`${venue} ${Number(syStr)}番 → 3着以内${rate3}% (${d.inTop3}/${d.trials}) / 1着${rateWin}%`});
    }
  });
  venueSyabanOut.sort((a,b)=>b.rate3-a.rate3);

  // 3. 車番×脚質の3着内率
  const kyakuSyaban={};
  validRaces.forEach(r=>{
    const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
    (r.entries||[]).forEach(e=>{
      const sy=Number(e.syaban), ky=e.kyaku;
      if(!sy||!ky)return;
      const key=`${sy}|${ky}`;
      const d=kyakuSyaban[key]=kyakuSyaban[key]||{trials:0,inTop3:0};
      d.trials++;
      if(top3.has(sy))d.inTop3++;
    });
  });
  const kyakuSyabanOut=[];
  Object.entries(kyakuSyaban).forEach(([k,d])=>{
    if(d.trials<minTrials*3)return;
    const rate=Math.round(d.inTop3/d.trials*100);
    if(rate>=minRate||rate<=(100-minRate)){
      const [syStr,ky]=k.split('|');
      kyakuSyabanOut.push({type:'KYAKU_SYABAN',syaban:Number(syStr),kyaku:ky,
        trials:d.trials,inTop3:d.inTop3,rate,
        desc:`${Number(syStr)}番×脚質「${ky}」 → 3着以内 ${rate}% (${d.inTop3}/${d.trials})`});
    }
  });
  kyakuSyabanOut.sort((a,b)=>b.rate-a.rate);

  // 4.5 選手×車番 → 連動車番 (3着以内)
  const psHist={};
  validRaces.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const rn=String(e.regNo||'').padStart(6,'0');
      const sy=Number(e.syaban);
      if(!rn||!sy)return;
      (psHist[`${rn}|${sy}`]=psHist[`${rn}|${sy}`]||[]).push(r);
    });
  });
  // 連動事例を構築 (各レースの結果を簡潔に)
  const buildExample=(r)=>({
    date:r.date,venue:r.venue,raceNo:r.raceNo,
    result:[r.result1,r.result2,r.result3].filter(Boolean).join('-'),
    kimari:r.kimari1||'',
  });
  const playerSyabanLink=[];
  const psThreshold=Math.max(minTrials-2,3);
  const psRate=Math.max(minRate-10,70);
  Object.entries(psHist).forEach(([key,races])=>{
    if(races.length<psThreshold)return;
    const [rn,syStr]=key.split('|');
    const sy=Number(syStr);
    const linkCount={}, winCount={};
    for(let n=1;n<=9;n++){linkCount[n]=0;winCount[n]=0;}
    races.forEach(r=>{
      const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
      for(let n=1;n<=9;n++){
        if(n===sy)continue;
        if(top3.has(n))linkCount[n]++;
        if(Number(r.result1)===n)winCount[n]++;
      }
    });
    for(let n=1;n<=9;n++){
      const cnt=linkCount[n];
      if(cnt===0)continue;
      const rate=Math.round(cnt/races.length*100);
      if(rate>=psRate){
        const p=playerMap[rn];
        // 連動事例: 当該nが3着内に来たレース最大10件
        const hitExamples=races.filter(r=>{
          const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
          return t3.includes(n);
        }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,10).map(buildExample);
        // 不発事例: 当該nが3着内に来なかったレース最大5件
        const missExamples=races.filter(r=>{
          const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
          return !t3.includes(n);
        }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5).map(buildExample);
        playerSyabanLink.push({
          type:'PLAYER_SYABAN_LINK',
          regNo:rn,playerName:p?p.name:'?',
          syaban:sy,linkedSyaban:n,
          trials:races.length,hits:cnt,rate,
          rateWin:Math.round(winCount[n]/races.length*100),
          examples:hitExamples, misses:missExamples,
          desc:`${p?p.name:'?'} が${sy}番のとき → ${n}番が3着以内 ${rate}% (${cnt}/${races.length})`,
        });
      }
    }
  });
  playerSyabanLink.sort((a,b)=>b.rate-a.rate||b.trials-a.trials);

  // 4.7 選手×車番 → 2車両方3着内連動
  const playerSyabanPairLink=[];
  const pairRate=Math.max(minRate-20,60);
  Object.entries(psHist).forEach(([key,races])=>{
    if(races.length<psThreshold)return;
    const [rn,syStr]=key.split('|');
    const sy=Number(syStr);
    const top3Sets=races.map(r=>new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number)));
    for(let n1=1;n1<=9;n1++){
      if(n1===sy)continue;
      for(let n2=n1+1;n2<=9;n2++){
        if(n2===sy)continue;
        const cnt=top3Sets.filter(t3=>t3.has(n1)&&t3.has(n2)).length;
        if(cnt===0)continue;
        const rate=Math.round(cnt/races.length*100);
        if(rate>=pairRate){
          const p=playerMap[rn];
          const hitExamples=races.filter(r=>{
            const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
            return t3.includes(n1)&&t3.includes(n2);
          }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,10).map(buildExample);
          const missExamples=races.filter(r=>{
            const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
            return !(t3.includes(n1)&&t3.includes(n2));
          }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5).map(buildExample);
          playerSyabanPairLink.push({
            type:'PLAYER_SYABAN_PAIR_LINK',
            regNo:rn,playerName:p?p.name:'?',
            syaban:sy,linkedPair:[n1,n2],
            trials:races.length,hits:cnt,rate,
            examples:hitExamples, misses:missExamples,
            desc:`${p?p.name:'?'} が${sy}番のとき → ${n1}・${n2}両方3着以内 ${rate}% (${cnt}/${races.length})`,
          });
        }
      }
    }
  });
  playerSyabanPairLink.sort((a,b)=>b.rate-a.rate||b.trials-a.trials);

  // 4.8 複合条件: 2人の選手×車番が同時出走 → 連動車番 (90%+のみ)
  // 既存の (regNo, syaban) ペア履歴(psHist)を再利用して、
  // 同レース内で2つの (regNo, syaban) 組み合わせが出現する場合を集計
  const playerComboLink=[];
  if(opts.enableCombo!==false){
    // race ID -> [(regNo, syaban, name), ...]
    const raceToEntries={};
    validRaces.forEach((r,idx)=>{
      raceToEntries[idx]=[];
      (r.entries||[]).forEach(e=>{
        const rn=String(e.regNo||'').padStart(6,'0');
        const sy=Number(e.syaban);
        if(rn&&sy)raceToEntries[idx].push({rn,sy});
      });
    });

    // ペア出現履歴を構築 (両条件を同時に満たすレース)
    // pairHist[key] = [race]; key = "regA|syA~~regB|syB" (sorted)
    const pairHist={};
    validRaces.forEach((r,idx)=>{
      const ents=raceToEntries[idx];
      for(let i=0;i<ents.length;i++){
        for(let j=i+1;j<ents.length;j++){
          const ka=`${ents[i].rn}|${ents[i].sy}`;
          const kb=`${ents[j].rn}|${ents[j].sy}`;
          const key=ka<kb?`${ka}~~${kb}`:`${kb}~~${ka}`;
          (pairHist[key]=pairHist[key]||[]).push(r);
        }
      }
    });

    // 各ペアで連動車番を計算
    const comboThreshold=Math.max(minTrials-2,3);
    const comboMinRate=Math.max(minRate,90); // 複合は90%以上に絞る
    Object.entries(pairHist).forEach(([key,races])=>{
      if(races.length<comboThreshold)return;
      const [partA,partB]=key.split('~~');
      const [rnA,syA]=partA.split('|'); const syaA=Number(syA);
      const [rnB,syB]=partB.split('|'); const syaB=Number(syB);
      const top3Sets=races.map(r=>new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number)));
      // 単独連動（1車）
      for(let n=1;n<=9;n++){
        if(n===syaA||n===syaB)continue;
        const cnt=top3Sets.filter(t3=>t3.has(n)).length;
        if(cnt===0)continue;
        const rate=Math.round(cnt/races.length*100);
        if(rate>=comboMinRate){
          const pA=playerMap[rnA], pB=playerMap[rnB];
          const hitExamples=races.filter(r=>{
            const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
            return t3.includes(n);
          }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8).map(buildExample);
          const missExamples=races.filter(r=>{
            const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
            return !t3.includes(n);
          }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5).map(buildExample);
          playerComboLink.push({
            type:'PLAYER_COMBO_LINK',
            regA:rnA, syaA, playerNameA:pA?pA.name:'?',
            regB:rnB, syaB, playerNameB:pB?pB.name:'?',
            linkedSyaban:n, linkedPair:null,
            trials:races.length, hits:cnt, rate,
            examples:hitExamples, misses:missExamples,
            desc:`${pA?pA.name:'?'}が${syaA}番 かつ ${pB?pB.name:'?'}が${syaB}番のとき → ${n}番3着以内 ${rate}% (${cnt}/${races.length})`,
          });
        }
      }
      // 2車連動（2車両方3着内）
      for(let n1=1;n1<=9;n1++){
        if(n1===syaA||n1===syaB)continue;
        for(let n2=n1+1;n2<=9;n2++){
          if(n2===syaA||n2===syaB)continue;
          const cnt=top3Sets.filter(t3=>t3.has(n1)&&t3.has(n2)).length;
          if(cnt===0)continue;
          const rate=Math.round(cnt/races.length*100);
          if(rate>=comboMinRate){
            const pA=playerMap[rnA], pB=playerMap[rnB];
            const hitExamples=races.filter(r=>{
              const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
              return t3.includes(n1)&&t3.includes(n2);
            }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8).map(buildExample);
            const missExamples=races.filter(r=>{
              const t3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
              return !(t3.includes(n1)&&t3.includes(n2));
            }).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5).map(buildExample);
            playerComboLink.push({
              type:'PLAYER_COMBO_PAIR_LINK',
              regA:rnA, syaA, playerNameA:pA?pA.name:'?',
              regB:rnB, syaB, playerNameB:pB?pB.name:'?',
              linkedSyaban:null, linkedPair:[n1,n2],
              trials:races.length, hits:cnt, rate,
              examples:hitExamples, misses:missExamples,
              desc:`${pA?pA.name:'?'}が${syaA}番 かつ ${pB?pB.name:'?'}が${syaB}番のとき → ${n1}・${n2}両方3着以内 ${rate}% (${cnt}/${races.length})`,
            });
          }
        }
      }
    });
    playerComboLink.sort((a,b)=>b.rate-a.rate||b.trials-a.trials);
  }

  // 4. 脚質構成パターン
  const patterns={};
  validRaces.forEach(r=>{
    const ents=r.entries||[];
    if(!ents.length||!r.result1)return;
    const nige=ents.filter(e=>e.kyaku==='逃').length;
    const ryo=ents.filter(e=>e.kyaku==='両').length;
    const oi=ents.filter(e=>e.kyaku==='追').length;
    const n=ents.length;
    const key=`逃${nige}/両${ryo}/追${oi}/${n}車`;
    const winner=ents.find(e=>Number(e.syaban)===Number(r.result1));
    if(!winner)return;
    const wk=winner.kyaku;
    const d=patterns[key]=patterns[key]||{trials:0,kyakuCount:{}};
    d.trials++;
    d.kyakuCount[wk]=(d.kyakuCount[wk]||0)+1;
  });
  const kyakuPattern=[];
  Object.entries(patterns).forEach(([key,d])=>{
    if(d.trials<minTrials)return;
    Object.entries(d.kyakuCount).forEach(([wk,cnt])=>{
      const rate=Math.round(cnt/d.trials*100);
      if(rate>=minRate){
        kyakuPattern.push({type:'KYAKU_PATTERN',pattern:key,winnerKyaku:wk,
          rate,trials:d.trials,hits:cnt,
          desc:`構成「${key}」のとき1着は「${wk}」 ${rate}% (${cnt}/${d.trials})`});
      }
    });
  });
  kyakuPattern.sort((a,b)=>b.rate-a.rate||b.trials-a.trials);

  // 重複統合: 同一regNoは最良(rate最高→trials最大)の1件のみ
  const dedupByPlayer=(arr,getRegs)=>{
    const seen=new Set();
    const out=[];
    arr.forEach(it=>{
      const regs=getRegs(it).filter(Boolean);
      if(regs.length===0){out.push(it);return;}
      if(regs.some(r=>seen.has(r)))return;
      regs.forEach(r=>seen.add(r));
      out.push(it);
    });
    return out;
  };
  const playerSyabanLinkUnique=dedupByPlayer(playerSyabanLink,(it)=>[it.regNo]);
  const playerSyabanPairLinkUnique=dedupByPlayer(playerSyabanPairLink,(it)=>[it.regNo]);
  const playerComboLinkUnique=dedupByPlayer(playerComboLink,(it)=>[it.regA,it.regB]);
  return {courseLink,venueSyaban:venueSyabanOut,kyakuSyaban:kyakuSyabanOut,kyakuPattern,
    playerSyabanLink:playerSyabanLinkUnique,
    playerSyabanPairLink:playerSyabanPairLinkUnique,
    playerComboLink:playerComboLinkUnique};
}

// サインの自然言語定義を生成
/* ====================================================================
   統計ユーティリティ (Wilson信頼区間下限、時間重み)
==================================================================== */
function wilsonLowerBound(hits, trials, confidence=0.95){
  if(trials===0)return 0;
  const z=confidence===0.95?1.96:confidence===0.99?2.576:1.645;
  const p=hits/trials;
  const n=trials;
  const denom=1+z*z/n;
  const center=(p+z*z/(2*n))/denom;
  const spread=z*Math.sqrt((p*(1-p)+z*z/(4*n))/n)/denom;
  return Math.max(0,Math.min(1,center-spread));
}

function timeWeightedRate(hits, trials, allEvents){
  /* allEvents: [{date: YYYY-MM-DD, hit: boolean}] sorted by date asc
     Recent events weighted higher (exponential decay) */
  if(!allEvents||allEvents.length===0)return null;
  const today=new Date();
  let weightedHits=0, totalWeight=0;
  allEvents.forEach(e=>{
    const d=new Date(e.date);
    const daysAgo=(today-d)/86400000;
    // 60日で半減 exponential decay
    const weight=Math.pow(0.5, daysAgo/60);
    totalWeight+=weight;
    if(e.hit)weightedHits+=weight;
  });
  return totalWeight>0?weightedHits/totalWeight:null;
}

function getSignMatchHistory(sign, raceResults){
  /* サインの該当履歴を {date, venue, raceNo, hit} の配列で返す */
  const dedup=dedupRaces(raceResults).filter(r=>r.result1&&r.entries);
  const history=[];
  const type=sign.type||sign.conditionType;
  for(const r of dedup){
    const ents=r.entries||[];
    const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
    let isMatch=false, isHit=false;
    if(type==='PLAYER_SYABAN_LINK'){
      const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
      if(myE){isMatch=true;isHit=top3.includes(Number(sign.linkedSyaban));}
    }else if(type==='PLAYER_SYABAN_PAIR_LINK'){
      const pair=Array.isArray(sign.linkedPair)?sign.linkedPair.map(Number):[];
      const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
      if(myE&&pair.length===2){isMatch=true;isHit=pair.every(n=>top3.includes(n));}
    }else if(type==='PLAYER_COMBO_LINK'){
      const a=ents.find(e=>String(e.regNo)===String(sign.regA)&&Number(e.syaban)===Number(sign.syaA));
      const b=ents.find(e=>String(e.regNo)===String(sign.regB)&&Number(e.syaban)===Number(sign.syaB));
      if(a&&b){isMatch=true;isHit=top3.includes(Number(sign.linkedSyaban));}
    }else if(type==='PLAYER_COMBO_PAIR_LINK'){
      const a=ents.find(e=>String(e.regNo)===String(sign.regA)&&Number(e.syaban)===Number(sign.syaA));
      const b=ents.find(e=>String(e.regNo)===String(sign.regB)&&Number(e.syaban)===Number(sign.syaB));
      const pair=Array.isArray(sign.linkedPair)?sign.linkedPair.map(Number):[];
      if(a&&b&&pair.length===2){isMatch=true;isHit=pair.every(n=>top3.includes(n));}
    }else if(type==='VENUE_CAR_HABIT'){
      const rc=ents.filter(e=>e.regNo).length||r.racerCount;
      if(r.venue===sign.venue&&Number(rc)===Number(sign.racerCount)){
        const has=ents.some(e=>Number(e.syaban)===Number(sign.syaban));
        if(has){isMatch=true;const inT=top3.includes(Number(sign.syaban));isHit=sign.side==='kill'?!inT:inT;}
      }
    }else if(type==='KYAKU_CAR_HABIT'){
      const rc=ents.filter(e=>e.regNo).length||r.racerCount;
      if(Number(rc)===Number(sign.racerCount)){
        const e=ents.find(e=>Number(e.syaban)===Number(sign.syaban)&&e.kyaku===sign.kyaku);
        if(e){isMatch=true;const inT=top3.includes(Number(sign.syaban));isHit=sign.side==='kill'?!inT:inT;}
      }
    }
    if(isMatch)history.push({date:r.date,venue:r.venue,raceNo:r.raceNo,hit:isHit});
  }
  history.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  return history;
}

function evaluateSign(sign, raceResults){
  /* サインを多角的に評価
     return: {
       trials, hits, rate,
       wilsonLower (信頼区間下限),
       recent30Trials, recent30Hits, recent30Rate,
       weightedRate,
       grade: 'A'|'B'|'C',
       issues: [...]
     } */
  const history=getSignMatchHistory(sign,raceResults);
  const trials=history.length;
  const hits=history.filter(h=>h.hit).length;
  const rate=trials>0?hits/trials:0;
  const wilsonLower=wilsonLowerBound(hits,trials);

  // 直近30日
  const today=new Date();
  const _30daysAgo=new Date(today.getTime()-30*86400000).toISOString().slice(0,10);
  const recent30=history.filter(h=>h.date>=_30daysAgo);
  const recent30Trials=recent30.length;
  const recent30Hits=recent30.filter(h=>h.hit).length;
  const recent30Rate=recent30Trials>0?recent30Hits/recent30Trials:null;

  // 時間重み
  const weightedRate=timeWeightedRate(hits,trials,history);

  // 評価
  const issues=[];
  if(trials<5)issues.push('試行回数不足');
  if(wilsonLower<0.5)issues.push(`信頼下限が低い (${Math.round(wilsonLower*100)}%)`);
  if(recent30Trials>=3&&recent30Rate<0.5)issues.push(`直近30日の連動率低下 (${Math.round(recent30Rate*100)}%)`);

  let grade='C';
  if(wilsonLower>=0.7&&(recent30Trials<3||recent30Rate>=0.7))grade='A';
  else if(wilsonLower>=0.6||(recent30Trials>=3&&recent30Rate>=0.7))grade='B';

  return {trials,hits,rate:Math.round(rate*1000)/10,wilsonLower:Math.round(wilsonLower*1000)/10,
    recent30Trials,recent30Hits,recent30Rate:recent30Rate!=null?Math.round(recent30Rate*1000)/10:null,
    weightedRate:weightedRate!=null?Math.round(weightedRate*1000)/10:null,
    grade,issues,history};
}

function describeSign(s){
  const type=s.type||s.conditionType;
  const rate=s.rate?` (${s.rate}%)`:'';
  const trials=s.trials?` 過去${s.trials}回中${s.hits||0}回連動${rate}`:rate;

  if(type==='PLAYER_SYABAN_LINK'){
    const name=s.playerName||s.pName||(s.regNo||'').toString();
    return `「${name} 選手」が ${s.syaban}番車 に入った時、${s.linkedSyaban}番車 が3着以内に来る${trials}`;
  }
  if(type==='PLAYER_SYABAN_PAIR_LINK'){
    const name=s.playerName||s.pName||(s.regNo||'').toString();
    const pair=Array.isArray(s.linkedPair)?s.linkedPair:[];
    return `「${name} 選手」が ${s.syaban}番車 に入った時、${pair[0]||'?'}番車 と ${pair[1]||'?'}番車 の両方が3着以内に来る${trials}`;
  }
  if(type==='PLAYER_COMBO_LINK'){
    return `「${s.playerNameA||'?'} 選手」が ${s.syaA||'?'}番車、かつ「${s.playerNameB||'?'} 選手」が ${s.syaB||'?'}番車 に入った時、${s.linkedSyaban}番車 が3着以内に来る${trials}`;
  }
  if(type==='PLAYER_COMBO_PAIR_LINK'){
    const pair=Array.isArray(s.linkedPair)?s.linkedPair:[];
    return `「${s.playerNameA||'?'} 選手」が ${s.syaA||'?'}番車、かつ「${s.playerNameB||'?'} 選手」が ${s.syaB||'?'}番車 に入った時、${pair[0]||'?'}番車 と ${pair[1]||'?'}番車 の両方が3着以内に来る${trials}`;
  }
  if(type==='COURSE_LINK'){
    return `「${s.playerName||s.pName||'?'} 選手」が ${s.venue||'同会場'} の ${s.syaban}番車 に入った時、${s.lookback||3}走前の決まり目から2艇以上が3着以内に来る${trials}`;
  }
  if(type==='KYAKU_PATTERN'){
    return `脚質構成が「${s.pattern}」の時、勝者の脚質は「${s.winnerKyaku}」になりやすい${trials}`;
  }
  if(type==='VENUE_CAR_HABIT'){
    const r=s.rate?` (ルール成立${s.rate}% / ${s.hits||0}/${s.trials||0})`:'';
    if(s.side==='kill')return `${s.venue} の ${s.racerCount}車立てでは ${s.syaban}番車 は3着以内に入りにくい＝消し${r}`;
    return `${s.venue} の ${s.racerCount}車立てでは ${s.syaban}番車 が高確率で3着以内＝軸${r}`;
  }
  if(type==='KYAKU_CAR_HABIT'){
    const r=s.rate?` (ルール成立${s.rate}% / ${s.hits||0}/${s.trials||0})`:'';
    if(s.side==='kill')return `${s.racerCount}車立てで「${s.kyaku}」脚質が ${s.syaban}番車 のとき3着以内に入りにくい＝消し${r}`;
    return `${s.racerCount}車立てで「${s.kyaku}」脚質が ${s.syaban}番車 のとき高確率で3着以内＝軸${r}`;
  }
  return s.desc||s.description||type||'(定義不明)';
}

function classifyGrade(syumoku){
  if(!syumoku) return '';
  if(syumoku.includes('Ｓ級')||syumoku.includes('S級')) return 'S';
  if(syumoku.includes('Ａ級')||syumoku.includes('A級')) return 'A';
  if(syumoku.includes('チャレンジ')) return 'C';
  if(syumoku.includes('ガールズ')) return 'G';
  return '';
}

/* ====================================================================
   分析エンジン (本日のレース判定 + 買い目生成)
==================================================================== */
function runAnalysis({entries,raceResults,signConditions,players,discoveries=[],venue='',narabi=[]}){
  const pm={};players.forEach(p=>pm[p.id]=p);
  const pmByReg={};players.forEach(p=>{if(p.regNo)pmByReg[String(p.regNo).padStart(6,'0')]=p});
  const alerts=[];
  const linkedSet=new Set();
  const killSet=new Set();  // 消し目 (3着内に入りにくい車番) → 買い目から除外

  for(const cond of signConditions){
    if(!cond.active) continue;
    const todayE=entries.find(e=>e.regNo&&String(e.regNo)===String(cond.regNo));
    if(!todayE&&cond.conditionType!=='KYAKU_PATTERN') continue;
    const p=pmByReg[String(cond.regNo).padStart(6,'0')]||null;

    /* コース連動 */
    if(cond.conditionType==='COURSE_LINK'){
      if(String(todayE.syaban)!==String(cond.syaban)) continue;
      const pastRaces=raceResults
        .filter(r=>(r.entries||[]).some(e=>String(e.regNo)===String(cond.regNo)&&String(e.syaban)===String(cond.syaban))
                   &&(!cond.venue||r.venue===cond.venue))
        .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      const lb=parseInt(cond.lookback)||3;
      if(pastRaces.length<lb){
        alerts.push({type:'COURSE_LINK',status:'NO_DATA',regNo:cond.regNo,pName:p?.name||cond.regNo,
          syaban:todayE.syaban,lookback:lb,pastCount:pastRaces.length,condId:cond.id});
        continue;
      }
      const ref=pastRaces[lb-1];
      const kimes=[ref.result1,ref.result2,ref.result3].filter(Boolean).map(Number);
      const kimeRegs=kimes
        .map(bn=>ref.entries?.find(e=>Number(e.syaban)===bn)?.regNo)
        .filter(Boolean).map(String);
      const linked=entries.filter(e=>e.regNo&&kimeRegs.includes(String(e.regNo)));
      alerts.push({type:'COURSE_LINK',
        status:linked.length>=2?'FULL':linked.length===1?'PARTIAL':'NONE',
        regNo:cond.regNo,pName:p?.name||cond.regNo,syaban:todayE.syaban,
        ref,kimes,kimeRegs,linked,condId:cond.id});
      linked.forEach(e=>linkedSet.add(e.syaban));
    }

    /* ライン連動 (手動入力ライン依存) */
    if(cond.conditionType==='LINE_LINK'){
      // ライン情報があれば、特定ラインから2人以上が来る前提で連動艇を追加
      const targetLineIdx=parseInt(cond.targetLine);
      if(narabi&&narabi.length>0&&targetLineIdx>=0){
        const line=narabi[targetLineIdx];
        if(line&&line.length>=2){
          alerts.push({type:'LINE_LINK',status:'ALERT',
            regNo:cond.regNo,pName:p?.name||cond.regNo,
            syaban:todayE?.syaban,desc:cond.description||`ライン${targetLineIdx+1}連動`,
            line,condId:cond.id});
          line.forEach(bn=>linkedSet.add(bn));
        }
      }
    }

    /* 選手×車番→連動車番 */
    if(cond.conditionType==='PLAYER_SYABAN_LINK'){
      if(!todayE||String(todayE.syaban)!==String(cond.syaban))continue;
      const linkedNo=parseInt(cond.linkedSyaban);
      const linkedEntry=entries.find(e=>Number(e.syaban)===linkedNo&&e.regNo);
      alerts.push({type:'PLAYER_SYABAN_LINK',status:linkedEntry?'ALERT':'NO_TARGET',
        regNo:cond.regNo,pName:p?.name||cond.regNo,
        syaban:todayE.syaban,linkedSyaban:linkedNo,
        rate:cond.rate,trials:cond.trials,
        desc:cond.description||`${p?.name||'?'}が${cond.syaban}番→${linkedNo}番3着以内${cond.rate||'?'}%`,
        condId:cond.id});
      if(linkedEntry)linkedSet.add(linkedNo);
    }

    /* 選手×車番→2車連動 */
    if(cond.conditionType==='PLAYER_SYABAN_PAIR_LINK'){
      if(!todayE||String(todayE.syaban)!==String(cond.syaban))continue;
      const pair=(cond.linkedPair||'').toString().split(',').map(n=>parseInt(n)).filter(n=>n>=1&&n<=9);
      const ok=pair.length===2&&pair.every(n=>entries.find(e=>Number(e.syaban)===n&&e.regNo));
      alerts.push({type:'PLAYER_SYABAN_PAIR_LINK',status:ok?'ALERT':'NO_TARGET',
        regNo:cond.regNo,pName:p?.name||cond.regNo,
        syaban:todayE.syaban,linkedPair:pair,
        rate:cond.rate,trials:cond.trials,
        desc:cond.description||`${p?.name||'?'}が${cond.syaban}番→${pair.join('・')}両方3着以内${cond.rate||'?'}%`,
        condId:cond.id});
      if(ok)pair.forEach(n=>linkedSet.add(n));
    }

    /* サインレーサー */
    if(cond.conditionType==='RACER_SIGN'){
      alerts.push({type:'RACER_SIGN',status:'ALERT',regNo:cond.regNo,pName:p?.name||cond.regNo,
        syaban:todayE.syaban,desc:cond.description,condId:cond.id});
      if(cond.relatedBoats){
        String(cond.relatedBoats).split(',').forEach(s=>{
          const n=parseInt(s.trim());
          if(n>=1&&n<=9) linkedSet.add(n);
        });
      }
    }

    /* 脚質構成 */
    if(cond.conditionType==='KYAKU_PATTERN'){
      const nige=entries.filter(e=>e.regNo&&e.kyaku==='逃').length;
      const ryo=entries.filter(e=>e.regNo&&e.kyaku==='両').length;
      const oi=entries.filter(e=>e.regNo&&e.kyaku==='追').length;
      const n=entries.filter(e=>e.regNo).length;
      const myPattern=`逃${nige}/両${ryo}/追${oi}/${n}車`;
      if(cond.pattern===myPattern){
        alerts.push({type:'KYAKU_PATTERN',status:'ALERT',pattern:myPattern,
          winnerKyaku:cond.winnerKyaku,rate:cond.rate,trials:cond.trials,
          desc:cond.description,condId:cond.id});
        entries.forEach(e=>{
          if(e.regNo&&e.kyaku===cond.winnerKyaku) linkedSet.add(e.syaban);
        });
      }
    }
  }

  // 自動発見: 選手×車番→連動車番
  discoveries.filter(d=>d.type==='PLAYER_SYABAN_LINK').forEach(d=>{
    const myE=entries.find(en=>String(en.regNo)===String(d.regNo));
    if(!myE||String(myE.syaban)!==String(d.syaban))return;
    const linkedNo=parseInt(d.linkedSyaban);
    const linkedEntry=entries.find(e=>Number(e.syaban)===linkedNo&&e.regNo);
    alerts.push({type:'PLAYER_SYABAN_LINK_AUTO',status:linkedEntry?'ALERT':'NO_TARGET',
      regNo:d.regNo,pName:d.playerName||'?',syaban:myE.syaban,
      linkedSyaban:linkedNo,rate:d.rate,trials:d.trials,desc:d.desc});
    if(linkedEntry)linkedSet.add(linkedNo);
  });

  // 自動発見: 選手×車番→2車連動
  discoveries.filter(d=>d.type==='PLAYER_SYABAN_PAIR_LINK').forEach(d=>{
    const myE=entries.find(en=>String(en.regNo)===String(d.regNo));
    if(!myE||String(myE.syaban)!==String(d.syaban))return;
    const pair=Array.isArray(d.linkedPair)?d.linkedPair.map(Number):[];
    const allPresent=pair.length===2&&pair.every(n=>entries.find(e=>Number(e.syaban)===n&&e.regNo));
    alerts.push({type:'PLAYER_SYABAN_PAIR_LINK_AUTO',status:allPresent?'ALERT':'NO_TARGET',
      regNo:d.regNo,pName:d.playerName||'?',syaban:myE.syaban,
      linkedPair:pair,rate:d.rate,trials:d.trials,desc:d.desc});
    if(allPresent)pair.forEach(n=>linkedSet.add(n));
  });

  // 自動発見: 複合条件 2選手→1車連動
  discoveries.filter(d=>d.type==='PLAYER_COMBO_LINK').forEach(d=>{
    const eA=entries.find(e=>String(e.regNo)===String(d.regA)&&Number(e.syaban)===Number(d.syaA));
    const eB=entries.find(e=>String(e.regNo)===String(d.regB)&&Number(e.syaban)===Number(d.syaB));
    if(!eA||!eB)return;
    const linkedNo=Number(d.linkedSyaban);
    const linkedEntry=entries.find(e=>Number(e.syaban)===linkedNo&&e.regNo);
    alerts.push({type:'PLAYER_COMBO_LINK_AUTO',status:linkedEntry?'ALERT':'NO_TARGET',
      pName:`${d.playerNameA}(${d.syaA}) × ${d.playerNameB}(${d.syaB})`,
      syaban:null,linkedSyaban:linkedNo,
      rate:d.rate,trials:d.trials,desc:d.desc});
    if(linkedEntry)linkedSet.add(linkedNo);
  });

  // 自動発見: 複合条件 2選手→2車連動
  discoveries.filter(d=>d.type==='PLAYER_COMBO_PAIR_LINK').forEach(d=>{
    const eA=entries.find(e=>String(e.regNo)===String(d.regA)&&Number(e.syaban)===Number(d.syaA));
    const eB=entries.find(e=>String(e.regNo)===String(d.regB)&&Number(e.syaban)===Number(d.syaB));
    if(!eA||!eB)return;
    const pair=Array.isArray(d.linkedPair)?d.linkedPair.map(Number):[];
    const allPresent=pair.length===2&&pair.every(n=>entries.find(e=>Number(e.syaban)===n&&e.regNo));
    alerts.push({type:'PLAYER_COMBO_PAIR_LINK_AUTO',status:allPresent?'ALERT':'NO_TARGET',
      pName:`${d.playerNameA}(${d.syaA}) × ${d.playerNameB}(${d.syaB})`,
      syaban:null,linkedPair:pair,
      rate:d.rate,trials:d.trials,desc:d.desc});
    if(allPresent)pair.forEach(n=>linkedSet.add(n));
  });

  // 自動発見の連動チェック
  discoveries.filter(d=>d.type==='COURSE_LINK').forEach(d=>{
    if(d.venue&&venue&&d.venue!==venue) return;
    const myE=entries.find(en=>String(en.regNo)===String(d.regNo));
    if(!myE) return;
    if(String(myE.syaban)!==String(d.syaban)) return;
    const pastRaces=raceResults
      .filter(r=>r.venue===d.venue&&(r.entries||[]).some(en=>String(en.regNo)===String(d.regNo)&&Number(en.syaban)===Number(d.syaban))&&r.result1)
      .sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.raceNo-b.raceNo));
    if(pastRaces.length<d.lookback) return;
    const refRace=pastRaces[pastRaces.length-d.lookback];
    const refBoats=[refRace.result1,refRace.result2,refRace.result3].filter(Boolean).map(Number);
    alerts.push({type:'COURSE_LINK_AUTO',status:'ALERT',regNo:d.regNo,pName:d.playerName,
      syaban:myE.syaban,venue:d.venue,lookback:d.lookback,refRace,refBoats,
      trials:d.trials,rate:d.rate2,desc:d.desc});
    refBoats.forEach(bn=>linkedSet.add(bn));
  });

  // 自動発見: 場の車番グセ (軸/消し)
  const todayRC=entries.filter(e=>e.regNo).length;
  discoveries.filter(d=>d.type==='VENUE_CAR_HABIT'&&d.active!==false).forEach(d=>{
    if(venue&&d.venue!==venue)return;
    if(Number(d.racerCount)!==todayRC)return;
    const e=entries.find(en=>Number(en.syaban)===Number(d.syaban)&&en.regNo);
    if(!e)return;
    alerts.push({type:'VENUE_CAR_HABIT',status:d.side==='kill'?'KILL':'AXIS',
      syaban:Number(d.syaban),side:d.side,venue:d.venue,racerCount:d.racerCount,
      rate:d.rate,trials:d.trials,desc:describeSign(d)});
    if(d.side==='kill')killSet.add(Number(d.syaban));else linkedSet.add(Number(d.syaban));
  });
  // 自動発見: 脚質の車番グセ (軸/消し)
  discoveries.filter(d=>d.type==='KYAKU_CAR_HABIT'&&d.active!==false).forEach(d=>{
    if(Number(d.racerCount)!==todayRC)return;
    const e=entries.find(en=>Number(en.syaban)===Number(d.syaban)&&en.regNo&&en.kyaku===d.kyaku);
    if(!e)return;
    alerts.push({type:'KYAKU_CAR_HABIT',status:d.side==='kill'?'KILL':'AXIS',
      syaban:Number(d.syaban),side:d.side,kyaku:d.kyaku,racerCount:d.racerCount,
      rate:d.rate,trials:d.trials,desc:describeSign(d)});
    if(d.side==='kill')killSet.add(Number(d.syaban));else linkedSet.add(Number(d.syaban));
  });

  // 買い目生成
  const activeBoats=Array.from(new Set(entries.filter(e=>e.regNo).map(e=>Number(e.syaban)))).sort((a,b)=>a-b);
  // 連動(軸)に入っている車番は個別サイン優先で消し対象から除外
  linkedSet.forEach(n=>killSet.delete(n));
  const killed=[...killSet].filter(n=>activeBoats.includes(n));
  const linked=[...linkedSet].filter(n=>activeBoats.includes(n));
  // 相手(3着候補)から消し目を除外して点数を絞る
  const others=activeBoats.filter(n=>!linked.includes(n)&&!killSet.has(n));
  const tickets=[];

  if(linked.length>=3){
    permutations(linked.slice(0,4),3).forEach(([a,b,c])=>tickets.push({combo:[a,b,c],tier:'top'}));
    if(others.length>0&&linked.length===3){
      others.slice(0,2).forEach(o=>{
        permutations([...linked,o],3).filter(([a])=>linked.includes(a))
          .forEach(([a,b,c])=>{
            if(!tickets.find(t=>t.combo.join()===`${a},${b},${c}`)) tickets.push({combo:[a,b,c],tier:'main'});
          });
      });
    }
  }else if(linked.length===2){
    permutations(linked,2).forEach(([a,b])=>{
      others.forEach(c=>{
        tickets.push({combo:[a,b,c],tier:'main'});
      });
    });
  }else if(linked.length===1){
    const[l]=linked;
    permutations(others.filter(n=>n!==l),2).forEach(([b,c])=>{
      tickets.push({combo:[l,b,c],tier:'main'});
    });
  }

  return{alerts,linked:[...linkedSet],killed,tickets:tickets.slice(0,24)};
}

function Chip({no,size='md'}){return<span className={`chip b${no} ${size}`}>{no}</span>}
function KyakuBadge({k}){
  if(!k) return null;
  const cls=k==='逃'?'nige':k==='両'?'ryo':'oi';
  return<span className={`kyaku ${cls}`}>{k}</span>;
}
function GradeBadge({s}){
  if(!s) return null;
  const c=classifyGrade(s);
  const cls=c==='S'?'s':c==='A'?'a':c==='G'?'g':'c';
  return<span className={`grade-cls ${cls}`}>{s}</span>;
}

function PlayerSearch({players,value,onChange,placeholder='選手名・登番'}){
  const[q,setQ]=useState('');
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  const sel=players.find(p=>String(p.regNo)===String(value)||p.id==value);
  const filtered=useMemo(()=>{
    const s=q.toLowerCase();
    return(q?players.filter(p=>p.name?.toLowerCase().includes(s)||String(p.regNo||'').includes(s)):players).slice(0,30);
  },[players,q]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener('mousedown',h);
    document.addEventListener('touchstart',h,{passive:true});
    return()=>{document.removeEventListener('mousedown',h);document.removeEventListener('touchstart',h)};
  },[]);
  return(
    <div className="dropdown" ref={ref}>
      <input className="inp" style={{width:'100%'}}
        value={open?q:(sel?`${sel.regNo||''} ${sel.name}`:'')}
        onChange={e=>{setQ(e.target.value);setOpen(true)}}
        onFocus={()=>{setQ('');setOpen(true)}}
        placeholder={placeholder}
      />
      {open&&(
        <div className="dd-list">
          {value&&<div className="dd-item dd-clear" onClick={()=>{onChange(null);setOpen(false);setQ('')}}>✕ クリア</div>}
          {filtered.map(p=>(
            <div key={p.id} className="dd-item" onClick={()=>{onChange(p.regNo);setOpen(false);setQ('')}}>
              <span style={{color:'var(--text2)',minWidth:'52px',fontSize:'12px'}}>{p.regNo}</span>
              <span style={{flex:1}}>{p.name}</span>
              <KyakuBadge k={p.kyaku}/>
              {p.prefecture&&<span style={{fontSize:'10px',color:'var(--text2)'}}>{p.prefecture}</span>}
            </div>
          ))}
          {!filtered.length&&<div style={{padding:'10px',color:'var(--text2)',fontSize:'12px'}}>見つかりません</div>}
        </div>
      )}
    </div>
  );
}

/* ====================================================================

==================================================================== */
function NarabiEditor({entries,narabi,onChange}){
  // ラインは [[1,2,5],[3,7],[4,6]] のような配列。 (車番のグループ)
  // UIではテキストで「1-2-5 3-7 4-6」のように入力
  const [text,setText]=useState(narabi.map(l=>l.join('-')).join(' '));
  useEffect(()=>{setText(narabi.map(l=>l.join('-')).join(' '))},[narabi]);
  const apply=(v)=>{
    setText(v);
    const groups=v.trim().split(/\s+/).filter(Boolean).map(g=>g.split('-').map(Number).filter(n=>n>=1&&n<=9));
    onChange(groups);
  };
  return(
    <div>
      <input className="inp" value={text} onChange={e=>apply(e.target.value)}
        placeholder="例: 1-2-5 3-7 4-6 (3分戦)"/>
      <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px'}}>
        ライン構成を空白区切り。先頭が先頭員(競り)、後ろが番手。
      </div>
      {narabi.length>0&&(
        <div style={{marginTop:'8px',display:'flex',gap:'5px',flexWrap:'wrap'}}>
          {narabi.map((line,i)=>(
            <div key={i} className="line-group">
              <span style={{fontSize:'10px',color:'var(--text2)',marginRight:'2px'}}>L{i+1}</span>
              {line.map(bn=><Chip key={bn} no={bn} size="sm"/>)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const mkEntries=(n=7)=>Array.from({length:n},(_,i)=>({syaban:i+1,regNo:null,kyaku:'',prefecture:''}));

function TodayScreen({players,raceResults,signConditions,discoveries=[],reload}){
  const today=new Date().toISOString().slice(0,10);
  const[venue,setVenue]=useState('函館');
  const[raceNo,setRaceNo]=useState('1');
  const[date,setDate]=useState(today);
  const[racerCount,setRacerCount]=useState(7);
  const[entries,setEntries]=useState(mkEntries(7));
  const[narabi,setNarabi]=useState([]);
  const[result,setResult]=useState(null);
  const[availableVenues,setAvailableVenues]=useState(null);
  const[venuesLoading,setVenuesLoading]=useState(false);
  const[fetching,setFetching]=useState(false);
  const[fetchMsg,setFetchMsg]=useState(null);
  const pmByReg=useMemo(()=>{const m={};players.forEach(p=>{if(p.regNo)m[String(p.regNo).padStart(6,'0')]=p});return m;},[players]);

  useEffect(()=>{
    if(!date) return;
    setVenuesLoading(true); setAvailableVenues(null);
    const fetchVenues=async()=>{
      try{
        if(_useServer){
          const r=await fetch(`${_serverBase}/api/racing_venues?date=${date}`);
          const ct=r.headers.get('content-type')||'';
          if(ct.includes('json')){
            const d=await r.json();
            if(d.ok&&d.venues){
              setAvailableVenues(d.venues);
              if(d.venues.length>0&&!d.venues.find(v=>v.name===venue)) setVenue(d.venues[0].name);
              return;
            }
          }
        }
        // クライアントサイド (CORSプロキシ経由)
        const venues=await clientFetchVenues(date);
        setAvailableVenues(venues);
        if(venues.length>0&&!venues.find(v=>v.name===venue)) setVenue(venues[0].name);
      }catch(e){
        console.warn('venues fetch failed:',e);
        setAvailableVenues(null);
      }finally{setVenuesLoading(false);}
    };
    fetchVenues();
  },[date]);

  const upd=(syaban,field,val)=>{
    setEntries(prev=>prev.map(e=>e.syaban===syaban?{...e,[field]:val}:e));
    setResult(null);
  };

  const analyze=()=>setResult(runAnalysis({entries,raceResults,signConditions,players,discoveries,venue,narabi}));

  const clearAll=()=>{
    setEntries(mkEntries(racerCount));
    setNarabi([]); setResult(null); setFetchMsg(null);
  };

  async function fetchRacelist(){
    setFetching(true); setFetchMsg(null);
    try{
      let racersData, syumokuStr;
      if(_useServer){
        const url=`${_serverBase}/api/racelist?venue=${encodeURIComponent(venue)}&date=${date}&raceNo=${raceNo}`;
        const res=await fetch(url);
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const ct=res.headers.get('content-type')||'';
        if(!ct.includes('json'))throw new Error('サーバー応答が不正');
        const data=await res.json();
        if(!data.ok) throw new Error(data.error||'取得失敗');
        racersData=data.racers;
        syumokuStr=data.syumoku||'';
      }else{
        // CORSプロキシ経由
        const {race}=await clientFetchRacelist(date,venue,raceNo);
        racersData=race.racers;
        syumokuStr=race.syumoku||'';
      }
      const n=racersData.length;
      const newEntries=mkEntries(n);
      racersData.forEach(r=>{
        const ent=newEntries.find(e=>e.syaban===r.syaban);
        if(!ent) return;
        ent.regNo=String(r.regNo).padStart(6,'0');
        ent.name=r.name;
        ent.kyaku=r.kyaku;
        ent.prefecture=r.prefecture;
        ent.note=r.note;
      });
      setRacerCount(n);
      setEntries(newEntries);
      setNarabi([]);
      setResult(null);
      // 未登録選手の自動登録
      const existing=new Set(players.filter(p=>p.regNo).map(p=>String(p.regNo).padStart(6,'0')));
      const toAdd=racersData.filter(r=>!existing.has(String(r.regNo).padStart(6,'0')));
      if(toAdd.length>0){
        for(const r of toAdd){
          await dbPut('players',{
            regNo:String(r.regNo).padStart(6,'0'),
            name:r.name,prefecture:r.prefecture,kyaku:r.kyaku,grade:''
          });
        }
        if(reload) await reload();
      }
      const src=_useServer?'サーバー':'CORSプロキシ';
      setFetchMsg({ok:true,text:`✓ 出走表取得完了 [${src}] (${n}車立て、${syumokuStr})${toAdd.length>0?` / 新規${toAdd.length}名を選手DBに追加`:''}`});
    }catch(e){
      setFetchMsg({ok:false,text:`✗ ${e.message}`});
    }finally{setFetching(false)}
  }

  return(
    <div>
      <div className="card">
        <div className="card-title">レース選択</div>
        <div className="row">
          <div>
            <span style={{color:'var(--text2)',fontSize:'12px',display:'block',marginBottom:'4px'}}>
              開催場
              {venuesLoading&&<span style={{color:'var(--accent)',fontSize:'10px',marginLeft:'6px'}}>⏳確認中...</span>}
              {!venuesLoading&&availableVenues&&availableVenues.length>0&&<span style={{color:'var(--green)',fontSize:'10px',marginLeft:'6px'}}>✓ {availableVenues.length}場</span>}
              {!venuesLoading&&availableVenues&&availableVenues.length===0&&<span style={{color:'var(--red)',fontSize:'10px',marginLeft:'6px'}}>開催なし</span>}
            </span>
            <select className="sel inp" value={venue} onChange={e=>setVenue(e.target.value)} style={{width:'100%'}}>
              {(availableVenues&&availableVenues.length>0?availableVenues.map(v=>v.name):VENUES).map(v=><option key={v}>{v}</option>)}
            </select>
          </div>
          <div style={{flex:'0 0 70px'}}>
            <span style={{color:'var(--text2)',fontSize:'12px',display:'block',marginBottom:'4px'}}>R</span>
            <select className="sel inp" value={raceNo} onChange={e=>setRaceNo(e.target.value)} style={{width:'100%'}}>
              {[...Array(12)].map((_,i)=><option key={i+1}>{i+1}</option>)}
            </select>
          </div>
          <div>
            <span style={{color:'var(--text2)',fontSize:'12px',display:'block',marginBottom:'4px'}}>日付</span>
            <input type="date" className="inp" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
        </div>
        <button className="btn btn-success" onClick={fetchRacelist} disabled={fetching}
          style={{width:'100%',marginTop:'10px',fontSize:'13px'}}>
          {fetching?'⏳ 取得中...':'🔍 出走表を自動取得 (KEIRIN.JP)'}
        </button>
        {fetchMsg&&(
          <div style={{
            marginTop:'8px',padding:'9px 11px',borderRadius:'7px',fontSize:'12px',lineHeight:'1.6',
            background:fetchMsg.ok?'rgba(58,122,42,0.07)':'rgba(187,34,0,0.07)',
            border:`1px solid ${fetchMsg.ok?'var(--green)':'var(--red)'}`,
            color:fetchMsg.ok?'var(--green)':'var(--red)',
            whiteSpace:'pre-wrap',
          }}>{fetchMsg.text}</div>
        )}
      </div>

      <div className="card">
        <div className="card-title">出走表 ({racerCount}車立て)</div>
        <table className="race-table">
          <thead>
            <tr>
              <th style={{width:'40px'}}>車番</th>
              <th>選手</th>
              <th style={{width:'50px'}}>脚質</th>
            </tr>
          </thead>
          <tbody>
            {entries.map(e=>{
              const p=pmByReg[String(e.regNo).padStart(6,'0')];
              return(
                <tr key={e.syaban}>
                  <td><Chip no={e.syaban} size="md"/></td>
                  <td>
                    <PlayerSearch players={players}
                      value={e.regNo}
                      onChange={v=>{
                        upd(e.syaban,'regNo',v);
                        if(v){
                          const pp=players.find(x=>String(x.regNo)===String(v));
                          if(pp){
                            upd(e.syaban,'name',pp.name);
                            upd(e.syaban,'kyaku',pp.kyaku);
                            upd(e.syaban,'prefecture',pp.prefecture);
                          }
                        }
                      }}/>
                  </td>
                  <td><KyakuBadge k={e.kyaku||p?.kyaku}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{marginTop:'10px',display:'flex',gap:'8px'}}>
          <select className="sel" value={racerCount} onChange={e=>{
            const n=Number(e.target.value);
            setRacerCount(n);
            setEntries(prev=>{
              const cur=[...prev];
              if(n>cur.length){
                for(let i=cur.length;i<n;i++) cur.push({syaban:i+1,regNo:null});
              }else{
                cur.length=n;
              }
              return cur;
            });
          }}>
            <option value={7}>7車立て</option>
            <option value={9}>9車立て</option>
          </select>
          <button className="btn btn-ghost btn-sm" onClick={clearAll}>クリア</button>

      <div className="card">

  );

function PlayersScreen({players,reload}){
  const[q,setQ]=useState('');
  const[edit,setEdit]=useState(null);
  const[showDup,setShowDup]=useState(false);

  // 重複検出: 同regNo or 同name
  const duplicates=useMemo(()=>{
    if(!showDup)return null;
    const byReg={}, byName={};
    players.forEach(p=>{
      const rn=String(p.regNo||'').trim();
      const nm=(p.name||'').replace(/\s|　/g,'');
      if(rn){(byReg[rn]=byReg[rn]||[]).push(p);}
      if(nm){(byName[nm]=byName[nm]||[]).push(p);}
    });
    const sameReg=Object.entries(byReg).filter(([k,v])=>v.length>=2).map(([k,v])=>({key:k,kind:'登録番号',entries:v}));
    const sameName=Object.entries(byName).filter(([k,v])=>v.length>=2&&new Set(v.map(p=>String(p.regNo||''))).size>=2).map(([k,v])=>({key:k,kind:'氏名',entries:v}));
    return {sameReg,sameName};
  },[players,showDup]);

  const mergeGroup=async(group)=>{
    // 最も情報量が多いものをマスターに、他を削除
    const master=group.entries.reduce((best,p)=>{
      const score=(p)=>(p.name?1:0)+(p.prefecture?1:0)+(p.kyaku?1:0)+(p.grade?1:0);
      return score(p)>score(best)?p:best;
    },group.entries[0]);
    if(!confirm(`「${master.name}」(登番${master.regNo}) をマスターにして他${group.entries.length-1}件を削除します。よろしいですか?`))return;
    for(const p of group.entries){
      if(p.id===master.id)continue;
      await dbDel('players',p.id);
    }
    reload();
  };

  const filtered=useMemo(()=>{
    const s=q.toLowerCase();
    return q?players.filter(p=>p.name?.toLowerCase().includes(s)||String(p.regNo||'').includes(s)):players;
  },[players,q]);

  const save=async()=>{
    if(!edit.name) return alert('名前が必要');
    await dbPut('players',edit);
    setEdit(null);
    reload();
  };
  const del=async()=>{
    if(!confirm('削除しますか?')) return;
    await dbDel('players',edit.id);
    setEdit(null);
    reload();
  };

  return(
    <div>
      <div className="card">
        <div className="card-title">選手DB ({players.length}名)</div>
        <input className="inp" placeholder="検索 (名前・登番)" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{display:'flex',gap:'8px',marginTop:'8px',flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-sm" onClick={()=>setEdit({regNo:'',name:'',prefecture:'',kyaku:'',grade:''})}>+ 追加</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowDup(!showDup)}>
            {showDup?'重複検出を閉じる':'🔍 重複を検出'}
          </button>
        </div>
      </div>

      {showDup&&duplicates&&(
        <div className="card">
          <div className="card-title">重複検出結果</div>
          {(duplicates.sameReg.length===0&&duplicates.sameName.length===0)&&(
            <div className="empty">重複なし ✓</div>
          )}
          {duplicates.sameReg.length>0&&(
            <div style={{marginBottom:'12px'}}>
              <div className="section-title" style={{color:'var(--red)'}}>同じ登録番号が複数 ({duplicates.sameReg.length}件)</div>
              {duplicates.sameReg.map((g,i)=>(
                <div key={i} className="hist-item" style={{borderColor:'var(--red)'}}>
                  <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'6px'}}>登番 <strong style={{color:'var(--text)'}}>{g.key}</strong></div>
                  {g.entries.map((p,j)=>(
                    <div key={j} style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'12px',padding:'3px 0',borderTop:j>0?'1px dashed var(--border)':'none'}}>
                      <span style={{fontWeight:'700'}}>{p.name||'(名前なし)'}</span>
                      <KyakuBadge k={p.kyaku}/>
                      <span style={{color:'var(--text2)',fontSize:'11px'}}>{p.prefecture}</span>
                      <span style={{color:'var(--text2)',fontSize:'10px',marginLeft:'auto'}}>id={p.id}</span>
                    </div>
                  ))}
                  <button className="btn btn-primary btn-sm" style={{marginTop:'6px'}} onClick={()=>mergeGroup(g)}>マージ (1件残す)</button>
                </div>
              ))}
            </div>
          )}
          {duplicates.sameName.length>0&&(
            <div>
              <div className="section-title" style={{color:'var(--yellow)'}}>同じ氏名で異なる登番 ({duplicates.sameName.length}件)</div>
              {duplicates.sameName.map((g,i)=>(
                <div key={i} className="hist-item" style={{borderColor:'var(--yellow)'}}>
                  <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'6px'}}>氏名 <strong style={{color:'var(--text)'}}>{g.key}</strong></div>
                  {g.entries.map((p,j)=>(
                    <div key={j} style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'12px',padding:'3px 0',borderTop:j>0?'1px dashed var(--border)':'none'}}>
                      <span style={{fontWeight:'700',color:'var(--text2)',width:'60px',fontSize:'11px'}}>{p.regNo}</span>
                      <span style={{fontWeight:'700'}}>{p.name}</span>
                      <KyakuBadge k={p.kyaku}/>
                      <span style={{color:'var(--text2)',fontSize:'11px'}}>{p.prefecture}</span>
                    </div>
                  ))}
                  <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px'}}>
                    ※ 異なる登番なので別人の可能性あり。確認して個別に削除してください。
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {filtered.slice(0,200).map(p=>(
        <div key={p.id} className="hist-item" onClick={()=>setEdit(p)} style={{cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontSize:'11px',color:'var(--text2)',width:'56px'}}>{p.regNo}</span>
            <span style={{fontWeight:'700',flex:1}}>{p.name}</span>
            <KyakuBadge k={p.kyaku}/>
            <span style={{fontSize:'10px',color:'var(--text2)'}}>{p.prefecture}</span>
          </div>
        </div>
      ))}
      {filtered.length>200&&<div className="empty">… 他{filtered.length-200}名 (絞り込みしてください)</div>}

      {edit&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}}
          onClick={()=>setEdit(null)}>
          <div className="card" style={{width:'100%',maxWidth:'500px',margin:'10px',maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div className="card-title">{edit.id?'選手編集':'選手追加'}</div>
            <div className="field"><label>登録番号</label><input className="inp" value={edit.regNo||''} onChange={e=>setEdit({...edit,regNo:e.target.value})}/></div>
            <div className="field"><label>氏名</label><input className="inp" value={edit.name||''} onChange={e=>setEdit({...edit,name:e.target.value})}/></div>
            <div className="field"><label>府県</label><input className="inp" value={edit.prefecture||''} onChange={e=>setEdit({...edit,prefecture:e.target.value})}/></div>
            <div className="field"><label>脚質</label>
              <select className="sel inp" value={edit.kyaku||''} onChange={e=>setEdit({...edit,kyaku:e.target.value})}>
                <option value=""></option>
                <option>逃</option><option>両</option><option>追</option>
              </select>
            </div>
            <div className="field"><label>級班</label>
              <select className="sel inp" value={edit.grade||''} onChange={e=>setEdit({...edit,grade:e.target.value})}>
                <option value=""></option>
                <option>SS</option><option>S1</option><option>S2</option>
                <option>A1</option><option>A2</option><option>A3</option>
                <option>L級(ガールズ)</option>
              </select>
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button className="btn btn-primary" onClick={save} style={{flex:1}}>保存</button>
              <button className="btn btn-ghost" onClick={()=>setEdit(null)} style={{flex:1}}>キャンセル</button>
              {edit.id&&<button className="btn btn-danger" onClick={del}>削除</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
