                    💰 ベット{s.totalBet.toLocaleString()}円 / 払戻{s.totalPayout.toLocaleString()}円 / 平均配当 {s.avgPay}円<br/>
                    📊 {s.hitWithPayout}/{s.hits}件で配当データあり
                  </div>
                  <button className="btn btn-sm btn-primary" style={{marginTop:'6px'}} onClick={()=>adoptROISign(s)}>採用</button>
                </div>
              ))}
            </div>
          </div>
        )}
        {roiResults&&roiResults.length===0&&!roiRunning&&(
          <div className="empty" style={{marginTop:'10px'}}>条件 (80%+連動&100%+ROI) を満たすサインが見つかりませんでした</div>
        )}
      </div>

      <div className="card">
        <div className="card-title">データ検証</div>
        <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>
          A. データ整合性 (欠損・重複・範囲外)<br/>
          B. 採用サインの実DB再計算 (連動率の乖離検出)<br/>
          C. 異常配当・取得失敗・選手DB重複の検出
        </p>
        <button className="btn btn-primary" onClick={runChecks} disabled={running} style={{width:'100%'}}>
          {running?'⏳ 検証中...':'▶ 全検証を実行'}
        </button>
        {result&&<div style={{fontSize:'10px',color:'var(--text2)',marginTop:'6px'}}>最終検証: {new Date(result.timestamp).toLocaleString('ja-JP')}</div>}
      </div>

      {result&&(<>
        {/* A. データ整合性 */}
        <div className="section-title">A. データ整合性</div>
        <Card title={`重複レース ${result.A.duplicates.length}件`} status={result.A.duplicates.length===0?'ok':'warn'}>
          {result.A.duplicates.length>0&&<div style={{fontSize:'11px',color:'var(--text2)'}}>設定タブの「🧹 重複レースを削除」で除去できます</div>}
        </Card>
        <Card title={`結果未取得 (過去日) ${result.A.noResult.length}件`} status={result.A.noResult.length===0?'ok':'warn'}>
          <ListMini items={result.A.noResult.sort((a,b)=>(b.date||'').localeCompare(a.date||''))} render={r=>`${r.date} ${r.venue}${r.raceNo}R`}/>
        </Card>
        <Card title={`本日 結果未取得 ${result.A.todayMissing.length}件`} status={result.A.todayMissing.length===0?'ok':'warn'}>
          {result.A.todayMissing.length>0&&<div style={{fontSize:'11px',color:'var(--text2)'}}>レース未開催 or 取得待ち</div>}
        </Card>
        <Card title={`結果車番が範囲外 ${result.A.invalidResult.length}件`} status={result.A.invalidResult.length===0?'ok':'err'}>
          <ListMini items={result.A.invalidResult} render={r=>`${r.date} ${r.venue}${r.raceNo}R: ${r.result1}-${r.result2}-${r.result3}`}/>
          {result.A.invalidResult.length>0&&<button className="btn btn-sm btn-danger" style={{marginTop:'6px'}} onClick={removeAllInvalid}>不正データを一括削除</button>}
        </Card>
        <Card title={`車立て数不一致 ${result.A.countMismatch.length}件`} status={result.A.countMismatch.length===0?'ok':'warn'}>
          <ListMini items={result.A.countMismatch} render={r=>`${r.date} ${r.venue}${r.raceNo}R: entries=${r.entries.length} racerCount=${r.racerCount}`}/>
        </Card>
        <Card title={`結果あるが配当なし ${result.A.noPayoutWithResult.length}件`} status={result.A.noPayoutWithResult.length===0?'ok':'warn'}>
          <div style={{fontSize:'11px',color:'var(--text2)'}}>古いデータでは配当情報が無い場合あり (再取得で改善)</div>
        </Card>

        {/* B. サイン信頼性 */}
        <div className="section-title" style={{marginTop:'18px'}}>B. サイン信頼性再検証</div>
        <Card title={`正常 ${result.B.ok.length}件`} status='ok'>
          <div style={{fontSize:'11px',color:'var(--text2)'}}>連動率が保存時と±10%以内</div>
        </Card>
        <Card title={`連動率の乖離 ${result.B.drifted.length}件`} status={result.B.drifted.length===0?'ok':'warn'}>
          {result.B.drifted.map((it,i)=>(
            <div key={i} style={{padding:'7px 9px',marginBottom:'4px',background:'rgba(160,106,10,0.06)',borderRadius:'5px',fontSize:'12px'}}>
              <div>{describeSign(it.sign)}</div>
              <div style={{marginTop:'4px',color:'var(--text2)'}}>
                保存 <strong style={{color:'var(--text)'}}>{it.saved}%</strong> → 現在 <strong style={{color:it.current>=it.saved?'var(--green)':'var(--red)'}}>{it.current}%</strong> ({it.hits}/{it.trials}回)
              </div>
              <button className="btn btn-sm btn-primary" style={{marginTop:'5px'}} onClick={()=>updateSignRate(it)}>現在値で更新</button>
            </div>
          ))}
        </Card>
        <Card title={`試行回数不足 ${result.B.lowTrials.length}件`} status={result.B.lowTrials.length===0?'ok':'warn'}>
          <ListMini items={result.B.lowTrials} render={it=>`試行${it.trials}回 (5回未満) - ${describeSign(it.sign).slice(0,40)}...`}/>
          <div style={{fontSize:'10px',color:'var(--text2)',marginTop:'4px'}}>※ 試行5回未満のサインは統計的に弱い (慎重に運用)</div>
        </Card>

        {/* C. 異常値 */}
        <div className="section-title" style={{marginTop:'18px'}}>C. 異常値検出</div>
        <Card title={`2車単 超高配当 ${result.C.highExacta.length}件`} status={result.C.highExacta.length===0?'ok':'warn'}>
          <div style={{fontSize:'10px',color:'var(--text2)',marginBottom:'4px'}}>中央値 {result.C.medianExacta.toLocaleString()}円 の10倍以上</div>
          <ListMini items={result.C.highExacta} render={r=>`${r.date} ${r.venue}${r.raceNo}R: ${r.exactaCombo} ${r.exactaPayout.toLocaleString()}円${r.exactaNinki?` (${r.exactaNinki}人気)`:''}`}/>
        </Card>
        <Card title={`3連単 超高配当 ${result.C.highTrifecta.length}件`} status={result.C.highTrifecta.length===0?'ok':'warn'}>
          <div style={{fontSize:'10px',color:'var(--text2)',marginBottom:'4px'}}>中央値 {result.C.medianTrifecta.toLocaleString()}円 の15倍以上</div>
          <ListMini items={result.C.highTrifecta} render={r=>`${r.date} ${r.venue}${r.raceNo}R: ${r.trifectaCombo} ${r.trifectaPayout.toLocaleString()}円${r.trifectaNinki?` (${r.trifectaNinki}人気)`:''}`}/>
        </Card>
        <Card title={`出走数が異常に少ない ${result.C.tooFewEntries.length}件`} status={result.C.tooFewEntries.length===0?'ok':'warn'}>
          <ListMini items={result.C.tooFewEntries} render={r=>`${r.date} ${r.venue}${r.raceNo}R: ${r.entries.length}車`}/>
          <div style={{fontSize:'10px',color:'var(--text2)',marginTop:'4px'}}>※ 取得失敗の可能性。再取得で改善するかも</div>
        </Card>
        <Card title={`同登番の選手が複数 ${result.C.dupPlayers.length}件`} status={result.C.dupPlayers.length===0?'ok':'err'}>
          <ListMini items={result.C.dupPlayers} render={g=>`登番${g.regNo}: ${g.entries.length}件 (${g.entries.map(p=>p.name).join(', ')})`}/>
          {result.C.dupPlayers.length>0&&<div style={{fontSize:'10px',color:'var(--text2)',marginTop:'4px'}}>選手タブの「🔍 重複を検出」で個別マージしてください</div>}
        </Card>
      </>)}
    </div>
  );
}

/* ====================================================================
   設定画面
==================================================================== */
function SettingsScreen({connected,reload,autoEnabled,setAutoEnabled,runAutoFetch}){
  const[stats,setStats]=useState(null);
  useEffect(()=>{
    const load=async()=>{
      if(_useServer){
        try{
          const r=await fetch(`${_serverBase}/api/stats`);
          const ct=r.headers.get('content-type')||'';
          if(ct.includes('json')){const d=await r.json();if(d.ok)setStats(d);}
        }catch(e){}
      }else{
        const[races,players]=await Promise.all([dbAll('raceResults'),dbAll('players')]);
        const withResult=races.filter(r=>r.result1).length;
        const dates=Array.from(new Set(races.map(r=>r.date).filter(Boolean))).sort();
        setStats({total_races:races.length,with_result:withResult,
          total_players:players.length,date_from:dates[0]||null,date_to:dates[dates.length-1]||null});
      }
    };
    load();
  },[]);

  const exportData=async()=>{
    const stores=['players','raceResults','signConditions','discoveries','predictionLogs'];
    const data={};
    let totalRecords=0;
    for(const s of stores){
      try{
        const rows=await dbAll(s);
        data[s]=rows;
        totalRecords+=rows.length;
      }catch(e){data[s]=[];}
    }
    data._exportedAt=new Date().toISOString();
    data._version='1.5';
    const json=JSON.stringify(data);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`keirin-data-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    alert(`✓ エクスポート完了\n総レコード: ${totalRecords}件\nファイルサイズ: ${(blob.size/1024/1024).toFixed(1)}MB\n\nこのファイルを他端末に転送 (AirDrop/Drive等) して「インポート」してください`);
  };

  const importData=async()=>{
    const input=document.createElement('input');
    input.type='file';
    input.accept='.json,application/json';
    input.onchange=async(e)=>{
      const file=e.target.files[0];
      if(!file)return;
      try{
        const text=await file.text();
        const data=JSON.parse(text);
        const stores=['players','raceResults','signConditions','discoveries','predictionLogs'];
        const counts={};
        if(!confirm(`このファイルから取り込みます:\n${stores.map(s=>`${s}: ${(data[s]||[]).length}件`).join('\n')}\n\n既存データは保持され、重複は上書きされます。続行しますか?`))return;
        for(const s of stores){
          const records=data[s]||[];
          counts[s]=0;
          for(const r of records){
            try{
              const{id,...rest}=r;
              await dbPut(s,rest);  // id除外で上書き処理に任せる
              counts[s]++;
            }catch(e){console.warn('import skip:',s,e.message);}
          }
        }
        alert(`✓ インポート完了\n${stores.map(s=>`${s}: ${counts[s]}件`).join('\n')}`);
        await reload();
      }catch(e){
        alert('インポート失敗: '+e.message);
      }
    };
    input.click();
  };

  const resetAndReseed=async()=>{
    if(!confirm('現在の全データを削除して、GitHubの初期データから再ロードします。\n本当に実行しますか? (元に戻せません)'))return;
    const db=await _getIDB();
    const stores=['players','raceResults','signConditions','discoveries','predictionLogs'];
    for(const s of stores){
      await new Promise((res,rej)=>{
        const t=db.transaction(s,'readwrite');
        const r=t.objectStore(s).clear();
        r.onsuccess=()=>res();r.onerror=()=>rej(r.error);
      });
    }
    alert('クリア完了。ページをリロードします。');
    location.reload();
  };

  const dedupDB=async()=>{
    const races=await dbAll('raceResults');
    const byKey={};
    let dupCount=0;
    races.forEach(r=>{
      const k=`${r.date||''}|${r.venue||''}|${r.raceNo||''}`;
      if(byKey[k])dupCount++;
      else byKey[k]=r;
    });
    if(dupCount===0)return alert('重複レースはありませんでした');
    if(!confirm(`重複レース ${dupCount.toLocaleString()}件 を削除します。\n(${races.length.toLocaleString()}件 → ${(races.length-dupCount).toLocaleString()}件)`))return;
    const deleted=await dedupRaceResultsDB();
    alert(`${deleted.toLocaleString()}件の重複レースを削除しました`);
    reload();
  };

  const dedupSignDB=async()=>{
    const discs=await dbAll('discoveries');
    const seen=new Map();
    const toDelete=[];
    discs.forEach(d=>{
      const k=signKey(d);
      if(seen.has(k)){
        // 既存より新しい(id大)なら新しい方を残す
        const prev=seen.get(k);
        if((d.id||0)>(prev.id||0)){toDelete.push(prev.id);seen.set(k,d);}
        else toDelete.push(d.id);
      }else seen.set(k,d);
    });
    if(toDelete.length===0)return alert('重複サインはありませんでした');
    if(!confirm(`重複サイン ${toDelete.length}件 を削除します (${discs.length}件 → ${discs.length-toDelete.length}件)`))return;
    for(const id of toDelete){await dbDel('discoveries',id);}
    alert(`${toDelete.length}件の重複サインを削除しました`);
    reload();
  };

  const autoRegister=async()=>{
    if(!_useServer){
      // クライアントサイド実装
      const races=await dbAll('raceResults');
      const existing=new Set((await dbAll('players')).filter(p=>p.regNo).map(p=>String(p.regNo).padStart(6,'0')));
      const toAdd=new Map();
      races.forEach(r=>{
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          if(!rn||existing.has(rn)||toAdd.has(rn))return;
          toAdd.set(rn,{regNo:rn,name:e.name,prefecture:e.prefecture,kyaku:e.kyaku,grade:''});
        });
      });
      for(const p of toAdd.values()){await dbPut('players',p);}
      alert(`選手を${toAdd.size}名追加しました`);
      reload();
      return;
    }
    try{
      const r=await fetch(`${_serverBase}/api/auto_register`,{method:'POST'});
      const ct=r.headers.get('content-type')||'';
      if(!ct.includes('json'))return alert('サーバー応答が不正');
      const d=await r.json();
      alert(`選手を${d.added}名追加しました`);
      reload();
    }catch(e){alert('失敗: '+e.message);}
  };

  return(
    <div>
      <div className="card" style={{borderColor:'var(--accent)',borderWidth:'2px'}}>
        <div className="card-title" style={{color:'var(--accent)'}}>📲 データの引き継ぎ (端末間共有)</div>
        <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>
          IndexedDBは端末ごとに独立しています。PCで蓄積したデータをスマホでも使うには、エクスポートしたファイルを転送して(AirDrop/Drive/メール等)、スマホでインポートしてください。
        </p>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-sm" onClick={exportData}>📤 エクスポート (DLする)</button>
          <button className="btn btn-success btn-sm" onClick={importData}>📥 インポート (取り込む)</button>
          <button className="btn btn-danger btn-sm" onClick={resetAndReseed}>♻️ 全消去して初期データから</button>
        </div>
        <div style={{fontSize:'10px',color:'var(--text2)',marginTop:'8px',lineHeight:'1.5'}}>
          📤 全データをJSONファイルとしてダウンロード<br/>
          📥 ファイルから取り込む (既存データは保持・重複は上書き)<br/>
          ♻️ 全削除してGitHub上の初期データ (5424レース) から再ロード
        </div>
      </div>

      <div className="card">
        <div className="card-title">自動取得</div>
        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
          <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',flex:1}}>
            <input type="checkbox" checked={autoEnabled} onChange={e=>setAutoEnabled(e.target.checked)} style={{width:'18px',height:'18px'}}/>
            <span style={{fontWeight:'700'}}>本日データを自動取得</span>
          </label>
          <button className="btn btn-sm btn-primary" onClick={()=>runAutoFetch(true)} disabled={!autoEnabled}>
            今すぐ取得
          </button>
        </div>
        <div style={{fontSize:'11px',color:'var(--text2)',lineHeight:'1.6'}}>
          ✓ アプリ起動時に本日の出走表と結果を自動取得<br/>
          ✓ <strong>10分ごとに自動更新</strong> (レース結果が出次第DBに反映)<br/>
          ✓ 既に結果が揃っている場合はスキップ (帯域節約)
        </div>
      </div>

      <div className="card">
        <div className="card-title">接続状態</div>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{width:'10px',height:'10px',borderRadius:'50%',background:connected?'var(--green)':'var(--red)'}}/>
          <span>{connected?'サーバー接続中 (SQLite)':'ローカルモード (IndexedDB)'}</span>
        </div>
        {!connected&&<div style={{fontSize:'12px',color:'var(--text2)',marginTop:'8px'}}>
          サーバー(start_server.command)が起動していません。スクレイピング機能と一括処理が使えません。
        </div>}
      </div>
      <div className="card">
        <div className="card-title">データ統計</div>
        {stats?(
          <div style={{fontSize:'13px',lineHeight:'2'}}>
            <div>総レース数: <strong>{stats.total_races}</strong></div>
            <div>結果ありレース: <strong>{stats.with_result}</strong></div>
            <div>選手数: <strong>{stats.total_players}</strong></div>
            <div>期間: <strong>{stats.date_from||'-'}〜{stats.date_to||'-'}</strong></div>
          </div>
        ):<div className="empty">統計取得中...</div>}
        <div style={{display:'flex',gap:'8px',marginTop:'10px',flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-sm" onClick={autoRegister}>
            蓄積レースから選手DBを自動更新
          </button>
          <button className="btn btn-ghost btn-sm" onClick={dedupDB}>
            🧹 重複レースを削除
          </button>
          <button className="btn btn-ghost btn-sm" onClick={dedupSignDB}>
            🧹 重複サインを削除
          </button>
        </div>
      </div>
      <div className="card">
        <div className="card-title">アプリ情報</div>
        <div style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.8'}}>
          競輪サイン予想 v2.8<br/>
          データソース: KEIRIN.JP<br/>
          サポート: F1/F2/G1/G2/G3, 7車立て・9車立て
        </div>
      </div>
    </div>
  );
}

/* ====================================================================
   メインApp
==================================================================== */
function App(){
  const[tab,setTab]=useState('today');
  const[players,setPlayers]=useState([]);
  const[raceResults,setRaceResults]=useState([]);
  const[signConditions,setSignConditions]=useState([]);
  const[discoveries,setDiscoveries]=useState([]);
  const[connected,setConnected]=useState(false);
  const[loaded,setLoaded]=useState(false);
  const[autoFetchStatus,setAutoFetchStatus]=useState(null);
  const[autoEnabled,setAutoEnabled]=useState(()=>localStorage.getItem('autoFetch')!=='off');

  const reload=useCallback(async()=>{
    const[p,r,s,d]=await Promise.all([
      dbAll('players'),dbAll('raceResults'),dbAll('signConditions'),dbAll('discoveries')
    ]);
    setPlayers(p); setRaceResults(r); setSignConditions(s); setDiscoveries(d);
  },[]);

  // 本日データの自動取得 (起動時 & 定期更新)
  const runAutoFetch=useCallback(async(force=false)=>{
    if(!autoEnabled)return;
    const result=await autoFetchTodayData({
      force,
      onProgress:(p)=>{setAutoFetchStatus(p);},
    });
    if(result.saved>0)await reload();
    // 5秒後にステータス非表示
    setTimeout(()=>setAutoFetchStatus(null),5000);
    return result;
  },[autoEnabled,reload]);

  useEffect(()=>{
    initStorage().then(async m=>{
      setConnected(m==='local');
      // 起動時に重複レースを自動クリーンアップ (高速一括削除版)
      try{
        const deleted=await dedupRaceResultsDB((done,tot)=>{
          if(done%2000===0)console.log(`[startup] 重複削除 ${done}/${tot}`);
        });
        if(deleted>0)console.log(`[startup] 重複レース ${deleted}件 を自動削除完了`);
        // 同様にdiscoveriesも重複削除
        const discs=await dbAll('discoveries');
        const seenKeys=new Map();
        const toDel2=[];
        discs.forEach(d=>{
          const k=signKey(d);
          if(seenKeys.has(k))toDel2.push(d.id);
          else seenKeys.set(k,d.id);
        });
        if(toDel2.length>0){
          console.log(`[startup] 重複サイン ${toDel2.length}件 を自動削除`);
          for(const id of toDel2){await dbDel('discoveries',id);}
        }
      }catch(e){console.warn('startup dedup failed:',e);}
      await reload();
      setLoaded(true);
      // 起動時に本日データを自動取得 (バックグラウンドで)
      if(autoEnabled){
        setTimeout(()=>runAutoFetch(false),500);
      }
    });
  },[reload,autoEnabled,runAutoFetch]);

  // 定期自動取得 (10分ごと)
  useEffect(()=>{
    if(!autoEnabled||!loaded)return;
    const interval=setInterval(()=>{
      console.log('[auto-fetch] 定期取得実行');
      runAutoFetch(true);  // forceで結果更新を取りに行く
    },10*60*1000);  // 10分
    return ()=>clearInterval(interval);
  },[autoEnabled,loaded,runAutoFetch]);

  if(!loaded) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--text2)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'40px',marginBottom:'14px'}}>🚴</div>
        <div>読み込み中...</div>
      </div>
    </div>
  );

  const tabs=[
    {id:'today',icon:'📋',label:'本日'},
    {id:'tally',icon:'📊',label:'集計'},
    {id:'perf',icon:'📈',label:'成績'},
    {id:'race',icon:'🔬',label:'予想'},
    {id:'input',icon:'📥',label:'入力'},
    {id:'sign',icon:'🌟',label:'サイン'},
    {id:'players',icon:'🚴',label:'選手'},
    {id:'check',icon:'🔍',label:'検証'},
    {id:'settings',icon:'⚙️',label:'設定'},
  ];

  return(
    <div className="app">
      <div className="header">
        <h1>競輪サイン予想 <span style={{fontSize:'10px',color:'var(--text2)',fontWeight:'400'}}>v2.8</span></h1>
        <span className="sub">{connected?'🟢':'⚪️'} {players.length}名 / {raceResults.length}R</span>
      </div>
      {autoFetchStatus&&(
        <div style={{
          position:'sticky',top:'56px',zIndex:99,padding:'6px 12px',fontSize:'11px',
          background:autoFetchStatus.status==='error'?'rgba(187,34,0,0.1)':
                     autoFetchStatus.status==='done'?'rgba(58,122,42,0.1)':
                     'rgba(184,101,26,0.1)',
          color:autoFetchStatus.status==='error'?'var(--red)':
                autoFetchStatus.status==='done'?'var(--green)':'var(--accent)',
          borderBottom:'1px solid var(--border)',
          textAlign:'center',
        }}>
          {autoFetchStatus.status==='fetching'?'⏳':autoFetchStatus.status==='done'?'✓':'⚠️'} {autoFetchStatus.message}
        </div>
      )}
      <div className="content">
        {tab==='today'&&<TodayRacesScreen players={players} raceResults={raceResults} signConditions={signConditions} discoveries={discoveries}/>}
        {tab==='tally'&&<TallyScreen players={players} raceResults={raceResults} signConditions={signConditions} discoveries={discoveries}/>}
        {tab==='perf'&&<PerformanceScreen raceResults={raceResults} signConditions={signConditions} discoveries={discoveries} reload={reload}/>}
        {tab==='race'&&<TodayScreen players={players} raceResults={raceResults} signConditions={signConditions} discoveries={discoveries} reload={reload}/>}
        {tab==='input'&&<InputScreen reload={reload}/>}
        {tab==='sign'&&<SignConditionsScreen players={players} signConditions={signConditions} discoveries={discoveries} raceResults={raceResults} reload={reload}/>}
        {tab==='players'&&<PlayersScreen players={players} reload={reload}/>}
        {tab==='check'&&<ValidationScreen raceResults={raceResults} signConditions={signConditions} discoveries={discoveries} players={players} reload={reload}/>}
        {tab==='settings'&&<SettingsScreen connected={connected} reload={reload}
          autoEnabled={autoEnabled} setAutoEnabled={(v)=>{setAutoEnabled(v);localStorage.setItem('autoFetch',v?'on':'off');}}
          runAutoFetch={runAutoFetch}
        />}
      </div>
      <div className="tab-bar">
        {tabs.map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            <span className="icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
