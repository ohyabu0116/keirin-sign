function RoiButton({sign,raceResults}){
  const[roi,setRoi]=useState(null);
  const[running,setRunning]=useState(false);
  const calculate=async()=>{
    setRunning(true);
    try{
      const pair=Array.isArray(sign.linkedPair)?sign.linkedPair.map(Number).sort((a,b)=>a-b):null;
      if(!pair||pair.length!==2){alert('ワイド検証は2車連動サインのみ対応');setRunning(false);return;}
      const key=pair.join('-');
      // 該当する過去レースを抽出
      const dedup=dedupRaces(raceResults);
      const matched=[];
      for(const r of dedup){
        if(!r.result1||!r.entries)continue;
        const myE=(r.entries||[]).find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
        if(!myE)continue;
        const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
        const isHit=pair.every(n=>top3.includes(n));
        matched.push({race:r,isHit});
      }
      // 各的中レースについてワイド配当を取得 (キャッシュなければCORSプロキシ経由でJSJ012)
      let totalPayout=0,hitCount=0,fetchedNew=0;
      const enriched=[];
      const venueEncCache={};  // (date,venue) → race-level enc map
      for(const m of matched){
        if(!m.isHit){enriched.push(m);continue;}
        let pay=null;
        if(m.race.widePayouts&&m.race.widePayouts[key]!=null){
          pay=m.race.widePayouts[key];
        }else{
          let rvPrm=m.race.raceRVPrm;
          if(!rvPrm){
            // 過去レースで raceRVPrm がない場合は会場のJSJ018から取得
            const cacheKey=`${m.race.date}|${m.race.venue}`;
            if(!venueEncCache[cacheKey]){
              try{
                const venues=await clientFetchVenues(m.race.date);
                const v=venues.find(x=>x.name===m.race.venue);
                if(v&&v.encPrm){
                  const j=await _proxyFetch({type:'JSJ018',encp:v.encPrm});
                  const map={};
                  (j.resultList||[]).forEach(r=>{
                    const rno=parseInt((r.rclblRaceNo||'').replace('R',''));
                    if(rno&&(r.raceRVPrm||r.raceTanpyoPrm))map[rno]=r.raceRVPrm||r.raceTanpyoPrm;
                  });
                  venueEncCache[cacheKey]=map;
                }else{venueEncCache[cacheKey]={};}
              }catch(e){venueEncCache[cacheKey]={};}
            }
            rvPrm=venueEncCache[cacheKey][m.race.raceNo];
          }
          if(rvPrm){
            try{
              const w=await clientFetchWideForRace(rvPrm);
              pay=w.widePayouts[key];
              if(pay!=null||Object.keys(w.widePayouts).length>0){
                const updated={...m.race,widePayouts:w.widePayouts,wideNinki:w.wideNinki,raceRVPrm:rvPrm};
                await dbPut('raceResults',updated);
                fetchedNew++;
              }
            }catch(e){console.warn('wide fetch failed',e);}
          }
        }
        if(pay!=null){totalPayout+=pay;hitCount++;}
        enriched.push({...m,pay});
      }
      const totalBets=matched.length*100;
      const totalReturn=totalPayout;
      const roi=totalBets>0?(totalReturn/totalBets*100):0;
      setRoi({trials:matched.length,hits:hitCount,totalPayout,totalBets,roi,enriched,fetchedNew});
    }catch(e){
      alert('検証失敗: '+e.message);
    }finally{setRunning(false);}
  };
  return(
    <>
      <button className="btn btn-sm btn-ghost" onClick={calculate} disabled={running}
        style={{fontSize:'11px',padding:'3px 8px',minHeight:'28px',marginTop:'4px'}}>
        {running?'⏳ 計算中...':'💰 ワイド回収率を検証'}
      </button>
      {roi&&(
        <div style={{marginTop:'8px',padding:'9px 11px',background:roi.roi>=100?'rgba(58,122,42,0.07)':'rgba(187,34,0,0.05)',
          border:`1px solid ${roi.roi>=100?'var(--green)':'var(--red)'}`,borderRadius:'6px',fontSize:'12px'}}>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'6px'}}>
            <span><strong>該当{roi.trials}回</strong> ベット{roi.totalBets.toLocaleString()}円</span>
            <span>的中<strong style={{color:'var(--green)'}}>{roi.hits}回</strong></span>
            <span>払戻 <strong style={{color:'var(--green)'}}>{roi.totalPayout.toLocaleString()}円</strong></span>
            <span style={{marginLeft:'auto',fontWeight:'900',fontSize:'15px',color:roi.roi>=100?'var(--green)':'var(--red)'}}>回収率 {roi.roi.toFixed(1)}%</span>
          </div>
          {roi.fetchedNew>0&&<div style={{fontSize:'10px',color:'var(--text2)'}}>※ {roi.fetchedNew}件のワイド配当を新規取得しました</div>}
          <details style={{marginTop:'6px'}}>
            <summary style={{cursor:'pointer',fontSize:'11px',color:'var(--text2)'}}>個別の結果を見る ({roi.enriched.length}件)</summary>
            <div style={{maxHeight:'180px',overflowY:'auto',marginTop:'6px',fontSize:'10px'}}>
              {roi.enriched.slice(0,30).map((e,i)=>(
                <div key={i} style={{display:'flex',gap:'6px',padding:'2px 0',color:'var(--text2)'}}>
                  <span style={{minWidth:'76px'}}>{e.race.date}</span>
                  <span style={{minWidth:'56px'}}>{e.race.venue}{e.race.raceNo}R</span>
                  <span>結果 {e.race.result1}-{e.race.result2}-{e.race.result3}</span>
                  {e.isHit?<span style={{color:'var(--green)',fontWeight:'700'}}>✅ {e.pay?`${e.pay.toLocaleString()}円`:'(配当未取得)'}</span>:<span style={{color:'var(--red)'}}>❌</span>}
                </div>
              ))}
            </div>
          </details>
        </div>
      )}
    </>
  );
}

  const[discRunning,setDiscRunning]=useState(false);

  const save=async()=>{
    if(!edit.conditionType) return alert('種類が必要');
    await dbPut('signConditions',{...edit,active:edit.active!==false});
    setEdit(null);
    reload();
  };
  const del=async()=>{
    if(!confirm('削除しますか?')) return;
    await dbDel('signConditions',edit.id);
    setEdit(null);
    reload();
  };
  const toggleActive=async(c)=>{
    await dbPut('signConditions',{...c,active:!c.active});
    reload();
  };

  const runDiscover=async()=>{
    setDiscRunning(true);
    try{
      // 事前に選手DBを race.entries から自動補完
      const existingRegs=new Set(players.filter(p=>p.regNo).map(p=>String(p.regNo).padStart(6,'0')));
      const toAdd=new Map();
      raceResults.forEach(r=>{
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          if(!rn||existingRegs.has(rn)||toAdd.has(rn))return;
          if(e.name)toAdd.set(rn,{regNo:rn,name:e.name,prefecture:e.prefecture||'',kyaku:e.kyaku||'',grade:''});
        });
      });
      if(toAdd.size>0){
        for(const p of toAdd.values()){await dbPut('players',p);}
        await reload();
      }
      // サーバーがあればAPI、なければクライアントサイドで実行
      const updatedPlayers=toAdd.size>0?[...players,...Array.from(toAdd.values())]:players;
      if(_useServer){
        try{
          const r=await fetch(`${_serverBase}/api/discover?min_trials=5&min_rate=90`);

            setDiscResult({...d,_autoAdded:toAdd.size});
            return;
          }

      }
      // クライアントサイド実装 (蓄積データから計算)
      await new Promise(res=>setTimeout(res,50));
      const result=mineClientSide(raceResults,updatedPlayers,{minTrials:5,minRate:90});
      setDiscResult({ok:true,_autoAdded:toAdd.size,...result});

      alert('マイニング失敗: '+e.message);
    }finally{setDiscRunning(false)}

/* ====================================================================
   入力画面 (一括取得 + 当日取得)
==================================================================== */
function InputScreen({reload}){
  const today=new Date().toISOString().slice(0,10);
  const[fromDate,setFromDate]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);});
  const[toDate,setToDate]=useState(today);
  const[selectedVenues,setSelectedVenues]=useState([]);
  const[job,setJob]=useState(null);
  const[stats,setStats]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      if(!_useServer){
        // クライアントサイドで集計
        const[races,players]=await Promise.all([dbAll('raceResults'),dbAll('players')]);
        const withResult=races.filter(r=>r.result1).length;
        const dates=Array.from(new Set(races.map(r=>r.date).filter(Boolean))).sort();
        setStats({ok:true,total_races:races.length,with_result:withResult,
          total_players:players.length,date_from:dates[0]||null,date_to:dates[dates.length-1]||null});
        return;
      }
      try{
        const r=await fetch(`${_serverBase}/api/stats`);
        const ct=r.headers.get('content-type')||'';
        if(!ct.includes('json'))return;
        const d=await r.json();
        if(d.ok) setStats(d);
      }catch(e){}
    };
    load();
  },[job?.status]);

  const noServer=!_useServer;

  // クライアントサイドで1日分を処理
  const processDayClient=async(ds,jobState)=>{
    const venues=await clientFetchVenues(ds);
    let saved=0;
    for(const v of venues){
      if(jobState.cancel)break;
      if(selectedVenues.length>0&&!selectedVenues.includes(v.name))continue;
      try{
        const [entriesJson,resultsMap]=await Promise.all([
          _proxyFetch({type:'JSJ017',encp:v.encPrm}),
          _proxyFetch({type:'JSJ018',encp:v.encPrm}).catch(()=>({}))
        ]);
        const resMap={};
        ((resultsMap||{}).resultList||[]).forEach(r=>{
          const rno=parseInt((r.rclblRaceNo||'').replace('R',''));
          if(!rno)return;
          const get=(lst,k,d='')=>lst&&lst[0]?lst[0][k]:d;
          const pay3raw=(r.harai3renList?.[0]?.kingaku||'').replace(/[,円]/g,'');
          const pay2raw=(r.harai2syaList?.[0]?.kingaku||'').replace(/[,円]/g,'');
          const ninki3=(r.harai3renList?.[0]?.ninki||'').replace(/[()]/g,'');
          const ninki2=(r.harai2syaList?.[0]?.ninki||'').replace(/[()]/g,'');
          resMap[rno]={
            result1:get(r.tyakui1List||[],'rclblSyaban'),
            result2:get(r.tyakui2List||[],'rclblSyaban'),
            result3:get(r.tyakui3List||[],'rclblSyaban'),
            kimari1:get(r.tyakui1List||[],'rclblKimari',''),
            kimari2:get(r.tyakui2List||[],'rclblKimari',''),
            kimari3:get(r.tyakui3List||[],'rclblKimari',''),
            trifectaCombo:r.harai3renList?.[0]?.kumi||'',
            exactaCombo:r.harai2syaList?.[0]?.kumi||'',
            trifectaPayout:pay3raw?Number(pay3raw):null,
            exactaPayout:pay2raw?Number(pay2raw):null,
            trifectaNinki:ninki3?Number(ninki3):null,
            exactaNinki:ninki2?Number(ninki2):null,
            raceRVPrm:r.raceRVPrm||r.raceTanpyoPrm||'',
          };
        });
        // 各レースのワイド配当を取得 (JSJ012) - 結果ありのレースのみ並列実行
        const racesWithResult=Object.entries(resMap).filter(([_,r])=>r.result1&&r.raceRVPrm);
        const wideResults=await Promise.all(racesWithResult.map(async([rno,r])=>{
          const w=await clientFetchWideForRace(r.raceRVPrm);
          return [rno,w];
        }));
        wideResults.forEach(([rno,w])=>{
          if(resMap[rno]){
            resMap[rno].widePayouts=w.widePayouts;
            resMap[rno].wideNinki=w.wideNinki;
          }
        });
        const races=(entriesJson.rInfo||[]).map(r=>({
          date:ds, venue:v.name, raceNo:Number(r.raceNo),
          grade:v.grade||'', syumoku:r.syumoku||'',
          denTime:r.denTime||'', stTime:r.stTime||'',
          entries:(r.sInfo||[]).map(s=>({
            syaban:Number(s.syaban),
            regNo:String(s.senNo||'').padStart(6,'0'),
            name:(s.senName||'').replace('　',' ').trim(),
            prefecture:(s.huken||'').replace(/　/g,'').trim(),
            kyaku:s.kyaku||'', note:s.assen||'',
          })),
          racerCount:(r.sInfo||[]).length,
          ...(resMap[Number(r.raceNo)]||{})
        }));
        for(const race of races){
          await dbPut('raceResults',race);
          saved++;
          jobState.saved=(jobState.saved||0)+1;
        }
      }catch(e){
        console.warn('day venue failed:',ds,v.name,e);
        jobState.errors=(jobState.errors||0)+1;
      }
    }
    return saved;
  };

  const startBulk=async()=>{
    if(noServer){
      // クライアントサイド一括取得 (重い)
      const d0=new Date(fromDate), d1=new Date(toDate);
      const days=Math.round((d1-d0)/86400000)+1;
      if(days>14&&!confirm(`${days}日分をCORSプロキシ経由で取得します。\n時間がかかり(${Math.ceil(days*30/60)}分目安)、レート制限の可能性もあります。\n続行しますか?`))return;
      const jobState={status:'running',done:0,saved:0,errors:0,total_days:days};
      setJob({id:'client',...jobState});
      const allDays=[];
      const cur=new Date(d0);
      while(cur<=d1){allDays.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
      for(const ds of allDays){
        if(jobState.cancel)break;
        await processDayClient(ds,jobState);
        jobState.done++;
        setJob({id:'client',...jobState});
      }
      jobState.status='done';
      setJob({id:'client',...jobState});
      reload();
      return;
    }
    try{
      const r=await fetch(`${_serverBase}/api/bulk_fetch`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date_from:fromDate,date_to:toDate,venues:selectedVenues.length>0?selectedVenues:null})
      });
      const ct=r.headers.get('content-type')||'';
      if(!ct.includes('json'))return alert('サーバー応答が不正');
      const d=await r.json();
      if(!d.ok) return alert('開始失敗: '+(d.error||''));
      pollJob(d.jobId);
    }catch(e){alert('エラー: '+e.message);}
  };

  const startToday=async()=>{
    if(noServer){
      const jobState={status:'running',done:0,saved:0,errors:0,total:1};
      setJob({id:'client',...jobState});
      await processDayClient(today,jobState);
      jobState.done=1;
      jobState.status='done';
      setJob({id:'client',...jobState});
      reload();
      return;
    }
    try{
      const r=await fetch(`${_serverBase}/api/today_fetch`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date:today})
      });
      const ct=r.headers.get('content-type')||'';
      if(!ct.includes('json'))return alert('サーバー応答が不正');
      const d=await r.json();
      if(!d.ok) return alert('開始失敗');
      pollJob(d.jobId);
    }catch(e){alert('エラー: '+e.message);}
  };

  const pollJob=async(jid)=>{
    setJob({id:jid,status:'pending'});
    const interval=setInterval(async()=>{
      try{
        const r=await fetch(`${_serverBase}/api/job/${jid}`);
        const d=await r.json();
        if(d.ok){
          setJob({id:jid,...d});
          if(d.status==='done'||d.status==='error'){
            clearInterval(interval);
            reload();
          }
        }
      }catch(e){clearInterval(interval);}
    },1500);
  };

  const toggleVenue=v=>{
    setSelectedVenues(prev=>prev.includes(v)?prev.filter(x=>x!==v):[...prev,v]);
  };

  return(
    <div>
      {stats&&(
        <div className="card">
          <div className="card-title">蓄積データ</div>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'13px'}}>
            <div><span style={{color:'var(--text2)',fontSize:'11px'}}>総レース</span><br/><strong style={{fontSize:'18px'}}>{stats.total_races}</strong></div>
            <div><span style={{color:'var(--text2)',fontSize:'11px'}}>結果あり</span><br/><strong style={{fontSize:'18px',color:'var(--green)'}}>{stats.with_result}</strong></div>
            <div><span style={{color:'var(--text2)',fontSize:'11px'}}>選手数</span><br/><strong style={{fontSize:'18px'}}>{stats.total_players}</strong></div>
            <div><span style={{color:'var(--text2)',fontSize:'11px'}}>期間</span><br/><strong style={{fontSize:'12px'}}>{stats.date_from||'-'}<br/>{stats.date_to||'-'}</strong></div>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-title">当日のレース取得</div>
        <p style={{fontSize:'12px',color:'var(--text2)',marginBottom:'10px'}}>
          本日({today})開催全競輪場の出走表と結果を一括取得します。
        </p>
        <button className="btn btn-success" onClick={startToday} disabled={!!job&&job.status==='running'} style={{width:'100%'}}>
          📥 本日の全レースを取得
        </button>
      </div>

      <div className="card">
        <div className="card-title">過去レース一括取得</div>
        <div className="row">
          <div className="field"><label>開始日</label><input type="date" className="inp" value={fromDate} onChange={e=>setFromDate(e.target.value)}/></div>
          <div className="field"><label>終了日</label><input type="date" className="inp" value={toDate} onChange={e=>setToDate(e.target.value)}/></div>
        </div>
        <div style={{marginTop:'10px'}}>
          <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'6px'}}>競輪場フィルタ (空=全場)</div>
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap',maxHeight:'140px',overflowY:'auto'}}>
            {VENUES.map(v=>(
              <button key={v} className={`btn btn-sm ${selectedVenues.includes(v)?'btn-primary':'btn-ghost'}`}
                onClick={()=>toggleVenue(v)} style={{padding:'4px 8px',fontSize:'11px'}}>{v}</button>
            ))}
          </div>
          {selectedVenues.length>0&&
            <button className="btn btn-sm btn-ghost" style={{marginTop:'5px'}} onClick={()=>setSelectedVenues([])}>クリア</button>
          }
        </div>
        <button className="btn btn-primary" onClick={startBulk} disabled={!!job&&job.status==='running'} style={{width:'100%',marginTop:'12px'}}>
          📥 取得開始
        </button>
      </div>

      {job&&(
        <div className="card">
          <div className="card-title">ジョブ状態</div>
          <div style={{fontSize:'13px'}}>
            <div>状態: <strong style={{color:job.status==='done'?'var(--green)':job.status==='error'?'var(--red)':'var(--accent)'}}>{job.status}</strong></div>
            <div>処理済: {job.done||0}{job.total?` / ${job.total}`:''}</div>
            <div>保存: <strong style={{color:'var(--green)'}}>{job.saved||0}</strong></div>
            <div>スキップ: {job.skipped||0}</div>
            <div>エラー: {job.errors||0}</div>
            {job.total_days&&<div>日数: {job.total_days}</div>}
            {job.error_msg&&<div style={{color:'var(--red)'}}>{job.error_msg}</div>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ====================================================================
   本日のレース判定画面
==================================================================== */
function TodayRacesScreen({players,raceResults,signConditions,discoveries=[]}){
  const today=new Date().toISOString().slice(0,10);
  const[shareHandle,setShareHandle]=useState(()=>localStorage.getItem('keirinSignHandle')||'@your_handle');
  const analyzed=useMemo(()=>{
    const todayRaces=dedupRaces(raceResults.filter(r=>r.date===today));
    return todayRaces.map(r=>{
      const {alerts,linked,killed,tickets}=runAnalysis({
        entries:r.entries||[],raceResults,signConditions,players,discoveries,venue:r.venue
      });
      const withResult=alerts.map(a=>{
        const top3=[r.result1,r.result2,r.result3].filter(v=>v!=null).map(Number);
        if(top3.length===0)return{...a,connected:null};
        // サインタイプ別に「連動」判定を変える
        let connected=null;
        if(a.type==='PLAYER_SYABAN_PAIR_LINK'||a.type==='PLAYER_SYABAN_PAIR_LINK_AUTO'){
          // 2車連動: linkedPair の両方が3着内
          const pair=Array.isArray(a.linkedPair)?a.linkedPair.map(Number):[];
          if(pair.length===2)connected=pair.every(n=>top3.includes(n));
          else connected=top3.includes(Number(a.syaban));
        }else if(a.type==='PLAYER_SYABAN_LINK'||a.type==='PLAYER_SYABAN_LINK_AUTO'){
          // 単独連動: linkedSyaban が3着内
          if(a.linkedSyaban!=null)connected=top3.includes(Number(a.linkedSyaban));
          else connected=top3.includes(Number(a.syaban));
        }else if(a.type==='PLAYER_COMBO_PAIR_LINK'||a.type==='PLAYER_COMBO_PAIR_LINK_AUTO'){
          const pair=Array.isArray(a.linkedPair)?a.linkedPair.map(Number):[];
          if(pair.length===2)connected=pair.every(n=>top3.includes(n));
          else connected=null;
        }else if(a.type==='PLAYER_COMBO_LINK'||a.type==='PLAYER_COMBO_LINK_AUTO'){
          if(a.linkedSyaban!=null)connected=top3.includes(Number(a.linkedSyaban));
          else connected=null;
        }else if(a.type==='COURSE_LINK_AUTO'||a.type==='COURSE_LINK'){
          // 参照レースの3着内2艇以上が今日の3着内に
          const refBoats=a.refBoats||[];
          if(refBoats.length>0){
            const inTop=refBoats.filter(n=>top3.includes(Number(n))).length;
            connected=inTop>=2;
          }else connected=null;
        }else if(a.type==='VENUE_CAR_HABIT'||a.type==='KYAKU_CAR_HABIT'){
          // 軸=その車が3着内 / 消し=その車が3着内に入らなければルール成立
          const inT=top3.includes(Number(a.syaban));
          connected=a.side==='kill'?!inT:inT;
        }else{
          // フォールバック: 選手の車番が3着内
          connected=top3.includes(Number(a.syaban));
        }
        return{...a,connected};
      });
      return{...r,alerts:withResult,linked,killed,tickets};
    }).filter(r=>r.alerts.length>0).sort((a,b)=>(a.venue||'').localeCompare(b.venue)||a.raceNo-b.raceNo);
  },[raceResults,signConditions,players,discoveries,today]);

  const confirmed=analyzed.flatMap(r=>r.alerts.filter(a=>a.connected!==null));
  const hits=confirmed.filter(a=>a.connected===true).length;

  // 過去30日トータル成績 (フッター用)
  const allHistMap=useMemo(()=>{
    const allSigns=[
      ...signConditions.filter(c=>c.active),
      ...discoveries.filter(d=>d.active!==false),
    ];
    return buildSignHitMap(raceResults,allSigns);
  },[raceResults,signConditions,discoveries]);
  const lastDays=Object.keys(allHistMap).sort((a,b)=>b.localeCompare(a)).slice(0,30);
  let allHits=0,allWith=0;
  lastDays.forEach(d=>{allHits+=allHistMap[d].hits;allWith+=allHistMap[d].withResult;});
  const allRate=allWith>0?Math.round(allHits/allWith*100):null;

  const buildTodayItems=()=>{
    const items=[];
    analyzed.forEach(r=>{
      r.alerts.forEach(a=>{
        const chips=[];
        if(a.linkedPair&&Array.isArray(a.linkedPair))chips.push(...a.linkedPair);
        else if(a.linkedSyaban)chips.push(Number(a.linkedSyaban));
        else if(a.syaban)chips.push(Number(a.syaban));
        items.push({
          venue:r.venue, raceNo:r.raceNo, chips,
          label:a.pName||'',
          confidence:a.rate||null,
        });
      });
    });
    return items;
  };

  const exportImage=async()=>{
    const items=buildTodayItems();
    if(items.length===0)return alert('サイン該当レースがありません');
    const dataURL=await generateShareImage({
      title:'本日の高信頼サイン',
      date:today,
      items,
      footer:allRate!=null?`過去30日 的中率 ${allRate}% (${allHits}/${allWith})`:'',
      handle:shareHandle,
    });
    downloadDataURL(dataURL,`keirin-sign-${today}.png`);
  };


  const savePrediction=async()=>{
    // 当日の予想スナップショットを保存 (改竄防止用ハッシュ付き)
    const snapshot={
      date:today,
      savedAt:new Date().toISOString(),
      races:analyzed.map(r=>({
        venue:r.venue,raceNo:r.raceNo,grade:r.grade,
        stTime:r.stTime||'',
        alerts:r.alerts.map(a=>({
          type:a.type,pName:a.pName,syaban:a.syaban,
          linkedSyaban:a.linkedSyaban,linkedPair:a.linkedPair,
          rate:a.rate,desc:a.desc,
        })),
      })),
    };
    // SHA-256 hash for tamper evidence
    const enc=new TextEncoder();
    const buf=enc.encode(JSON.stringify(snapshot));
    const digest=await crypto.subtle.digest('SHA-256',buf);
    const hash=Array.from(new Uint8Array(digest)).map(b=>b.toString(16).padStart(2,'0')).join('');
    await dbPut('predictionLogs',{...snapshot,hash});
    alert(`✓ 予想を記録しました\n${snapshot.races.length}レース ${snapshot.races.reduce((s,r)=>s+r.alerts.length,0)}サイン\n\nハッシュ: ${hash.slice(0,16)}...`);
  };

  const exportResultImage=async()=>{
    // 結果が出ているもの中心
    const items=[];
    let totalPayout=0;
    analyzed.forEach(r=>{
      r.alerts.filter(a=>a.connected!==null).forEach(a=>{
        const chips=[];
        if(a.linkedPair&&Array.isArray(a.linkedPair))chips.push(...a.linkedPair);
        else if(a.linkedSyaban)chips.push(Number(a.linkedSyaban));
        else if(a.syaban)chips.push(Number(a.syaban));
        const ninkiLabel=r.exactaNinki?` (${r.exactaNinki}人気)`:'';
        const payLabel=r.exactaPayout?` / 2車単 ${r.exactaPayout.toLocaleString()}円${ninkiLabel}`:'';
        items.push({
          venue:r.venue, raceNo:r.raceNo, chips,
          label:`${r.result1||'?'}-${r.result2||'?'}-${r.result3||'?'} ${a.connected?'✅':'❌'}${payLabel}`,
          confidence:a.rate||null,
        });
        if(a.connected&&r.exactaPayout)totalPayout+=r.exactaPayout;
      });
    });
    if(items.length===0)return alert('結果が出ているサイン該当レースがありません');
    const todayRate=confirmed.length>0?Math.round(hits/confirmed.length*100):0;
    const footerExtra=totalPayout>0?` / 的中配当合計 ${totalPayout.toLocaleString()}円`:'';
    const dataURL=await generateShareImage({
      title:'本日の結果報告',
      date:today,
      items,
      footer:`本日 ${hits}/${confirmed.length} 的中 (${todayRate}%)${footerExtra}`,
      handle:shareHandle,
    });
    downloadDataURL(dataURL,`keirin-result-${today}.png`);
  };

  if(analyzed.length===0) return(
    <div className="card" style={{textAlign:'center',padding:'44px 20px'}}>
      <div style={{fontSize:'44px',marginBottom:'14px'}}>🚴</div>
      <div style={{fontWeight:'700',marginBottom:'8px'}}>本日のサインレースなし</div>
      <div style={{color:'var(--text2)',fontSize:'12px'}}>「入力」タブで本日のレースを取得し、<br/>「サイン条件」を登録してください</div>
    </div>
  );

  return(
    <div>
      <div className="card">
        <div style={{display:'flex',gap:'5px',alignItems:'center',flexWrap:'wrap'}}>
          <input className="inp" style={{flex:1,minWidth:'140px',fontSize:'13px'}} value={shareHandle}
            onChange={e=>{setShareHandle(e.target.value);localStorage.setItem('keirinSignHandle',e.target.value);}}
            placeholder="@your_handle (Xアカウント)"/>
          <button className="btn btn-primary btn-sm" onClick={exportImage}>📸 予想画像</button>
          <button className="btn btn-ghost btn-sm" onClick={exportResultImage}>🏆 結果画像</button>
          <button className="btn btn-success btn-sm" onClick={savePrediction}>💾 予想を記録</button>
        </div>
        <div style={{fontSize:'10px',color:'var(--text2)',marginTop:'5px'}}>
          📸 X投稿用1080×1350画像 / 💾 ハッシュ付き予想記録 (後出し否定の証拠)
        </div>
      </div>
      {confirmed.length>0&&(
        <div className="card" style={{textAlign:'center',padding:'16px',
          border:`2px solid ${hits/confirmed.length>=0.5?'var(--green)':'var(--border)'}`}}>
          <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'6px',fontWeight:'600',textTransform:'uppercase'}}>本日の連動率</div>
          <div style={{fontSize:'32px',fontWeight:'900',color:hits/confirmed.length>=0.5?'var(--green)':'var(--red)'}}>
            {hits}<span style={{fontSize:'18px',color:'var(--text2)'}}>/{confirmed.length}</span>
            <span style={{fontSize:'16px',marginLeft:'8px'}}>{Math.round(hits/confirmed.length*100)}%</span>
          </div>
        </div>
      )}
      {analyzed.map((race,i)=>{
        const hasResult=race.result1!=null;
        const linkedHit=race.alerts.some(a=>a.connected===true);
        const borderColor=hasResult?(linkedHit?'var(--green)':'var(--red)'):'var(--border)';
        return(
          <div key={i} className="card" style={{borderColor,borderWidth:'2px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px',flexWrap:'wrap'}}>
              <span style={{fontWeight:'900',fontSize:'16px'}}>{race.venue}</span>
              <span style={{fontWeight:'800',fontSize:'13px',color:'var(--accent)',background:'var(--bg3)',borderRadius:'6px',padding:'2px 8px'}}>{race.raceNo}R</span>
              {race.grade&&<span className={`grade-cls ${race.grade.startsWith('S')?'s':race.grade.startsWith('A')?'a':'c'}`}>{race.grade}</span>}
              {hasResult?(
                <>
                  <span style={{marginLeft:'auto',fontSize:'12px',color:'var(--text2)'}}>
                    結果 <strong style={{color:'var(--text)',fontSize:'14px'}}>{race.result1}-{race.result2}-{race.result3}</strong>
                  </span>

/* ====================================================================
   集計画面 (採用サイン × 本日のレース)
==================================================================== */
function TallyScreen({players,raceResults,signConditions,discoveries=[]}){
  const today=new Date().toISOString().slice(0,10);
  const todayRaces=useMemo(()=>dedupRaces(raceResults.filter(r=>r.date===today)),[raceResults,today]);

  // 各サイン (条件+発見) の本日該当一覧を作成
  const tally=useMemo(()=>{
    const items=[];
    const allSigns=dedupSigns([
      ...signConditions.filter(c=>c.active).map(c=>({...c,_source:'manual'})),
      ...discoveries.filter(d=>d.active!==false).map(d=>({...d,_source:'auto'})),
    ]);
    const seenSignKeys=new Set();
    for(const sign of allSigns){
      const sk=signKey(sign);
      if(seenSignKeys.has(sk))continue;
      seenSignKeys.add(sk);
      // 各今日のレースについてマッチ判定
      const matchedRaces=[];
      const seenRaceKeys=new Set();
      for(const r of todayRaces){
        const ents=r.entries||[];
        let isMatch=false, linkedNums=[], hitLinkedNums=[], missLinkedNums=[];
        const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
        const hasResult=top3.length>=3;

        if(sign.type==='PLAYER_SYABAN_LINK'||sign.conditionType==='PLAYER_SYABAN_LINK'){
          const sy=Number(sign.syaban);
          const linkedNo=Number(sign.linkedSyaban);
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===sy);
          if(myE){
            isMatch=true;
            linkedNums=[linkedNo];
            if(hasResult){
              if(top3.includes(linkedNo))hitLinkedNums.push(linkedNo);
              else missLinkedNums.push(linkedNo);
            }
          }
        }else if(sign.type==='PLAYER_SYABAN_PAIR_LINK'||sign.conditionType==='PLAYER_SYABAN_PAIR_LINK'){
          const sy=Number(sign.syaban);
          const pair=Array.isArray(sign.linkedPair)?sign.linkedPair.map(Number):(sign.linkedPair||'').toString().split(',').map(Number);
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===sy);
          if(myE&&pair.length===2){
            isMatch=true;
            linkedNums=pair;
            if(hasResult){
              const bothIn=pair.every(n=>top3.includes(n));
              if(bothIn)hitLinkedNums=pair;
              else missLinkedNums=pair.filter(n=>!top3.includes(n));
            }
          }
        }else if(sign.type==='COURSE_LINK'||sign.conditionType==='COURSE_LINK'){
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&String(e.syaban)===String(sign.syaban));
          if(myE&&(!sign.venue||r.venue===sign.venue))isMatch=true;
        }

        if(isMatch){
          const rk=`${r.venue}|${r.raceNo}`;
          if(seenRaceKeys.has(rk))continue;
          seenRaceKeys.add(rk);
          matchedRaces.push({
            venue:r.venue,raceNo:r.raceNo,
            linkedNums,hitLinkedNums,missLinkedNums,
            hasResult,result:hasResult?top3.join('-'):null,
            connected:hasResult?(hitLinkedNums.length===linkedNums.length&&linkedNums.length>0):null,
            trifectaPayout:r.trifectaPayout,trifectaCombo:r.trifectaCombo,trifectaNinki:r.trifectaNinki,
            exactaPayout:r.exactaPayout,exactaCombo:r.exactaCombo,exactaNinki:r.exactaNinki,
          });
        }
      }
      if(matchedRaces.length>0){
        const withResult=matchedRaces.filter(m=>m.hasResult);
        const connected=withResult.filter(m=>m.connected);
        items.push({sign,matchedRaces,
          totalMatches:matchedRaces.length,
          withResult:withResult.length,
          connectedCount:connected.length,
          waitingCount:matchedRaces.length-withResult.length,
        });
      }
    }
    return items.sort((a,b)=>{
      const ra=a.withResult>0?a.connectedCount/a.withResult:0;
      const rb=b.withResult>0?b.connectedCount/b.withResult:0;
      return rb-ra||b.totalMatches-a.totalMatches;
    });
  },[todayRaces,signConditions,discoveries]);

  // 全体サマリ
  const totalMatches=tally.reduce((s,t)=>s+t.totalMatches,0);
  const totalWith=tally.reduce((s,t)=>s+t.withResult,0);
  const totalConn=tally.reduce((s,t)=>s+t.connectedCount,0);

  // 該当なし採用サイン (今日に出ていない/該当しないもの)
  const activeSigns=dedupSigns([
    ...signConditions.filter(c=>c.active),
    ...discoveries.filter(d=>d.active!==false),
  ]);
  const usedKeys=new Set(tally.map(t=>signKey(t.sign)));
  const notMatched=activeSigns.filter(s=>!usedKeys.has(signKey(s)));

  if(tally.length===0&&activeSigns.length===0)return(
    <div className="card" style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:'40px',marginBottom:'10px'}}>📊</div>
      <div style={{fontWeight:'700'}}>採用サインなし</div>
      <div style={{color:'var(--text2)',fontSize:'12px',marginTop:'8px'}}>
        「サイン」タブで自動マイニング→「採用」を押してください
      </div>
    </div>
  );

  return(
    <div>
      {totalWith>0&&(
        <div className="card" style={{textAlign:'center',padding:'18px',border:`2px solid ${totalConn/totalWith>=0.5?'var(--green)':'var(--border)'}`}}>
          <div style={{fontSize:'12px',color:'var(--text2)',fontWeight:'600',textTransform:'uppercase',marginBottom:'6px'}}>本日のサイン的中</div>
          <div style={{fontSize:'32px',fontWeight:'900',color:totalConn/totalWith>=0.5?'var(--green)':'var(--red)'}}>
            {totalConn}<span style={{fontSize:'18px',color:'var(--text2)'}}>/{totalWith}</span>
            <span style={{fontSize:'16px',marginLeft:'8px'}}>{Math.round(totalConn/totalWith*100)}%</span>
          </div>
          <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px'}}>
            該当 {totalMatches}件 (結果待ち {totalMatches-totalWith}件)
          </div>
        </div>
      )}
      {totalWith===0&&totalMatches>0&&(
        <div className="card" style={{textAlign:'center',padding:'14px'}}>
          <div style={{fontSize:'13px',color:'var(--yellow)',fontWeight:'700'}}>⏳ {totalMatches}件 結果待ち</div>
        </div>
      )}

      {tally.length===0&&todayRaces.length===0&&(
        <div className="card" style={{textAlign:'center',padding:'18px',background:'rgba(160,106,10,0.05)',border:'1px dashed var(--yellow)'}}>
          <div style={{fontSize:'13px',fontWeight:'700',color:'var(--yellow)'}}>本日のレースデータ未取得</div>
          <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px'}}>「入力」タブで「本日の全レースを取得」してください</div>
        </div>
      )}

      {tally.length>0&&<div className="section-title" style={{marginTop:'10px'}}>本日該当のサイン</div>}
      {tally.map((t,i)=>{
        const hitRate=t.withResult>0?Math.round(t.connectedCount/t.withResult*100):null;
        const borderColor=hitRate==null?'var(--border)':(hitRate>=50?'var(--green)':'var(--red)');
        return(
          <div key={i} className="card" style={{borderColor,borderWidth:'2px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',marginBottom:'8px'}}>
              <span style={{fontSize:'14px'}}>{t.sign._source==='auto'?'🔬':'✋'}</span>
              <span style={{fontWeight:'700',fontSize:'13px',flex:1}}>{t.sign.desc||t.sign.description||t.sign.type||t.sign.conditionType}</span>
              {hitRate!=null&&(
                <span style={{fontWeight:'900',fontSize:'15px',color:hitRate>=50?'var(--green)':'var(--red)'}}>
                  {t.connectedCount}/{t.withResult} <span style={{fontSize:'11px'}}>({hitRate}%)</span>
                </span>
              )}
              {hitRate==null&&<span style={{fontSize:'12px',color:'var(--yellow)'}}>⏳結果待ち</span>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
              {t.matchedRaces.map((m,j)=>{
                const bg=m.connected===true?'rgba(58,122,42,0.08)':
                         m.connected===false?'rgba(187,34,0,0.06)':
                         'rgba(160,106,10,0.05)';
                const bdr=m.connected===true?'var(--green)':m.connected===false?'var(--red)':'var(--border)';
                return(
                  <div key={j} style={{padding:'6px 9px',background:bg,border:`1px solid ${bdr}`,borderRadius:'6px',marginBottom:'4px',fontSize:'12px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                      <span style={{fontWeight:'700',minWidth:'56px'}}>{m.venue}</span>
                      <span style={{minWidth:'30px'}}>{m.raceNo}R</span>
                      <span style={{display:'flex',gap:'3px'}}>
                        {m.linkedNums.map(n=>(
                          <Chip key={n} no={n} size="sm"/>
                        ))}
                      </span>
                      {m.hasResult?(
                        <>
                          <span style={{marginLeft:'auto',color:'var(--text2)'}}>結果 <strong style={{color:'var(--text)'}}>{m.result}</strong></span>
                          <span style={{color:m.connected?'var(--green)':'var(--red)',fontWeight:'700'}}>{m.connected?'✅':'❌'}</span>
                        </>
                      ):(
                        <span style={{marginLeft:'auto',color:'var(--yellow)',fontSize:'11px'}}>⏳</span>
                      )}
                    </div>
                    {m.hasResult&&(m.exactaPayout||m.trifectaPayout)&&(
                      <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'4px',fontSize:'10px',color:'var(--text2)'}}>
                        {m.exactaPayout&&<span>2車単 <strong style={{color:'var(--accent)'}}>{m.exactaPayout.toLocaleString()}円</strong>{m.exactaNinki&&` (${m.exactaNinki}人気)`}</span>}
                        {m.trifectaPayout&&<span>3連単 <strong style={{color:'var(--accent)'}}>{m.trifectaPayout.toLocaleString()}円</strong>{m.trifectaNinki&&` (${m.trifectaNinki}人気)`}</span>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {notMatched.length>0&&(
        <>
          <div className="section-title" style={{marginTop:'18px'}}>本日該当なし ({notMatched.length}件)</div>
          {notMatched.map((s,i)=>(
            <div key={'nm'+i} className="hist-item" style={{opacity:0.7}}>
              <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                <span style={{fontSize:'13px'}}>{s.type||s.conditionType?'🔬':'✋'}</span>
                <span style={{fontSize:'12px',fontWeight:'700',flex:1}}>{s.desc||s.description||s.type||s.conditionType}</span>
                <span style={{fontSize:'10px',color:'var(--text2)'}}>該当レース無し</span>
              </div>
              {s.rate&&<div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px'}}>過去 試行{s.trials}回 / 連動{s.rate}%</div>}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* ====================================================================
   配信用画像生成 (Canvas2D)
==================================================================== */
const CHIP_COLORS={1:['#ffffff','#000'],2:['#111','#fff'],3:['#dd0000','#fff'],4:['#1155cc','#fff'],
  5:['#f5c518','#111'],6:['#1aaa55','#fff'],7:['#ff5e15','#fff'],8:['#e870c0','#fff'],9:['#7a5cd9','#fff']};

function drawChip(ctx,x,y,size,no){
  const[bg,fg]=CHIP_COLORS[no]||['#888','#fff'];
  ctx.fillStyle=bg;
  ctx.fillRect(x,y,size,size);
  if(bg==='#ffffff'){ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,size-1,size-1);}
  ctx.fillStyle=fg;
  ctx.font=`bold ${Math.floor(size*0.65)}px Arial, sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(String(no),x+size/2,y+size/2+2);
}

async function generateShareImage(opts){
  /* opts: {
       title: '本日のサイン高信頼予想',
       date: '2026-05-26',
       items: [{venue, raceNo, label, chips:[1,2,...], confidence: 95}, ...],
       footer: '過去30日 的中率 68% (87/124)',
       handle: '@your_handle',
     }
     return: dataURL of PNG */
  const W=1080,H=1350;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // 背景
  ctx.fillStyle='#fffdf8';
  ctx.fillRect(0,0,W,H);

  // ヘッダー
  ctx.fillStyle='#b8651a';
  ctx.fillRect(0,0,W,120);
  ctx.fillStyle='#fff';
  ctx.font='bold 44px "Hiragino Sans","Noto Sans JP",sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText('🚴 競輪サイン予想',40,60);
  ctx.font='28px "Hiragino Sans",sans-serif';
  ctx.fillText(opts.date||'',40,100);

  // タイトル
  ctx.fillStyle='#2a1f10';
  ctx.font='bold 38px "Hiragino Sans",sans-serif';
  ctx.fillText(opts.title||'本日のサイン',40,170);
  ctx.font='24px "Hiragino Sans",sans-serif';
  ctx.fillStyle='#6b5530';
  ctx.fillText(`${(opts.items||[]).length}件 検出`,40,210);

  // 区切り線
  ctx.strokeStyle='#c8b89c';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(40,240);ctx.lineTo(W-40,240);ctx.stroke();

  // アイテム描画 (最大10件)
  const items=(opts.items||[]).slice(0,10);
  let y=270;
  const cardH=88;
  items.forEach((item,i)=>{
    // カード背景
    ctx.fillStyle=item.confidence>=90?'rgba(58,122,42,0.08)':'rgba(160,106,10,0.06)';
    ctx.fillRect(40,y,W-80,cardH-12);
    ctx.strokeStyle=item.confidence>=90?'#3a7a2a':'#a06a0a';
    ctx.lineWidth=2;
    ctx.strokeRect(40,y,W-80,cardH-12);

    // 会場・R番号
    ctx.fillStyle='#2a1f10';
    ctx.font='bold 28px "Hiragino Sans",sans-serif';
    ctx.textAlign='left';
    ctx.fillText(`${item.venue||''} ${item.raceNo||''}R`,60,y+34);

    // 信頼度
    if(item.confidence!=null){
      ctx.fillStyle=item.confidence>=90?'#3a7a2a':'#a06a0a';
      ctx.font='bold 28px "Hiragino Sans",sans-serif';
      ctx.textAlign='right';
      ctx.fillText(`${item.confidence}%`,W-60,y+34);
    }

    // チップ
    let cx=60;
    const chipSize=36;
    (item.chips||[]).forEach((no,j)=>{
      drawChip(ctx,cx,y+44,chipSize,no);
      cx+=chipSize+8;
      if(j<item.chips.length-1){
        ctx.fillStyle='#6b5530';
        ctx.font='bold 22px sans-serif';
        ctx.textAlign='left';
        ctx.textBaseline='middle';
        ctx.fillText('+',cx,y+44+chipSize/2);
        cx+=20;
      }
    });

    // ラベル
    if(item.label){
      ctx.fillStyle='#6b5530';
      ctx.font='20px "Hiragino Sans",sans-serif';
      ctx.textAlign='left';
      ctx.textBaseline='middle';
      ctx.fillText(item.label,cx+20,y+44+chipSize/2);
    }

    y+=cardH;
  });

  // フッター
  if(opts.footer){
    ctx.fillStyle='rgba(184,101,26,0.1)';
    ctx.fillRect(0,H-110,W,110);
    ctx.fillStyle='#b8651a';
    ctx.font='bold 32px "Hiragino Sans",sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(opts.footer,W/2,H-75);
  }
  if(opts.handle){
    ctx.fillStyle='#6b5530';
    ctx.font='24px "Hiragino Sans",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(opts.handle,W/2,H-30);
  }

  return cv.toDataURL('image/png');
}

  const a=document.createElement('a');
  a.href=dataURL; a.download=filename;
  document.body.appendChild(a); a.click();

/* ====================================================================
   成績集計画面 (期間別分析)
==================================================================== */
function buildSignHitMap(allRaces,signsRaw){
  /* 全レース×全サインでヒット状況を計算
     返値: { dateStr: {matches, hits, withResult, items:[{venue,raceNo,linked,top3,hit}]} } */
  const signs=dedupSigns(signsRaw);
  console.log(`[buildSignHitMap] 入力サイン ${signsRaw.length}件 → 重複排除後 ${signs.length}件`);
  const racesByDate={};
  allRaces.forEach(r=>{
    if(!r.date)return;
    (racesByDate[r.date]=racesByDate[r.date]||[]).push(r);
  });
  const dailyMap={};
  Object.entries(racesByDate).forEach(([date,races])=>{
    const dedup=dedupRaces(races);
    const seenItems=new Set();  // signKey + race-key で重複排除
    let matches=0, hits=0, withResult=0;
    const items=[];
    for(const sign of signs){
      const sk=signKey(sign);
      for(const r of dedup){
        const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
        const hasResult=top3.length>=3;
        let isMatch=false, linkedNums=[], isHit=null;
        const ents=r.entries||[];

        if(sign.type==='PLAYER_SYABAN_LINK'||sign.conditionType==='PLAYER_SYABAN_LINK'){
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
          if(myE){
            isMatch=true; linkedNums=[Number(sign.linkedSyaban)];
            if(hasResult)isHit=top3.includes(Number(sign.linkedSyaban));
          }
        }else if(sign.type==='PLAYER_SYABAN_PAIR_LINK'||sign.conditionType==='PLAYER_SYABAN_PAIR_LINK'){
          const pair=Array.isArray(sign.linkedPair)?sign.linkedPair.map(Number):(sign.linkedPair||'').toString().split(',').map(Number);
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
          if(myE&&pair.length===2){
            isMatch=true; linkedNums=pair;
            if(hasResult)isHit=pair.every(n=>top3.includes(n));
          }
        }else if(sign.type==='VENUE_CAR_HABIT'){
          const rc=ents.filter(e=>e.regNo).length||r.racerCount;
          if(r.venue===sign.venue&&Number(rc)===Number(sign.racerCount)&&ents.some(e=>Number(e.syaban)===Number(sign.syaban))){
            isMatch=true; linkedNums=[Number(sign.syaban)];
            if(hasResult){const inT=top3.includes(Number(sign.syaban));isHit=sign.side==='kill'?!inT:inT;}
          }
        }else if(sign.type==='KYAKU_CAR_HABIT'){
          const rc=ents.filter(e=>e.regNo).length||r.racerCount;
          if(Number(rc)===Number(sign.racerCount)&&ents.some(e=>Number(e.syaban)===Number(sign.syaban)&&e.kyaku===sign.kyaku)){
            isMatch=true; linkedNums=[Number(sign.syaban)];
            if(hasResult){const inT=top3.includes(Number(sign.syaban));isHit=sign.side==='kill'?!inT:inT;}
          }
        }

        if(isMatch){
          const itemKey=`${sk}|${r.venue}|${r.raceNo}`;
          if(seenItems.has(itemKey))continue;
          seenItems.add(itemKey);
          matches++;
          if(hasResult){withResult++; if(isHit)hits++;}
          items.push({
            sign,venue:r.venue,raceNo:r.raceNo,linked:linkedNums,
            top3:hasResult?top3:null,hit:isHit,
            exactaPayout:r.exactaPayout,trifectaPayout:r.trifectaPayout,
            exactaNinki:r.exactaNinki,trifectaNinki:r.trifectaNinki,
          });
        }
      }
    }
    dailyMap[date]={matches,hits,withResult,items};
  });
  return dailyMap;
}

function BetSimulator({raceResults,signConditions,discoveries,reload}){
  const[bet,setBet]=useState(()=>Number(localStorage.getItem('simBet'))||1000);
  const[running,setRunning]=useState(false);
  const[progress,setProgress]=useState(null);
  const[sim,setSim]=useState(null);
  const cancelRef=useRef({cancelled:false});

  const runSim=async()=>{
    setRunning(true); setSim(null); setProgress(null);
    cancelRef.current={cancelled:false};
    localStorage.setItem('simBet',String(bet));
    try{
      const allSigns=dedupSigns([
        ...signConditions.filter(c=>c.active),
        ...discoveries.filter(d=>d.active!==false),
      ]).filter(s=>{
        // 2車連動のみ (ワイド対応)
        const t=s.type||s.conditionType;
        return (t==='PLAYER_SYABAN_PAIR_LINK'||t==='PLAYER_COMBO_PAIR_LINK')&&Array.isArray(s.linkedPair)&&s.linkedPair.length===2;
      });
      if(allSigns.length===0){
        alert('採用済みの2車連動サインがありません');
        setRunning(false);return;
      }
      const dedup=dedupRaces(raceResults).filter(r=>r.result1&&r.entries);
      const venueEncCache={};
      const perSign=[];

      for(let si=0;si<allSigns.length;si++){
        if(cancelRef.current.cancelled)break;
        const sign=allSigns[si];
        const pair=sign.linkedPair.map(Number).sort((a,b)=>a-b);
        const key=pair.join('-');

        // 該当レース抽出
        const matched=[];
        for(const r of dedup){
          let isMatch=false;
          const ents=r.entries||[];
          const t=sign.type||sign.conditionType;
          if(t==='PLAYER_SYABAN_PAIR_LINK'){
            const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
            if(myE)isMatch=true;
          }else if(t==='PLAYER_COMBO_PAIR_LINK'){
            const a=ents.find(e=>String(e.regNo)===String(sign.regA)&&Number(e.syaban)===Number(sign.syaA));
            const b=ents.find(e=>String(e.regNo)===String(sign.regB)&&Number(e.syaban)===Number(sign.syaB));
            if(a&&b)isMatch=true;
          }
          if(!isMatch)continue;
          const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
          matched.push({race:r,top3,isHit:pair.every(n=>top3.includes(n))});
        }

        // 的中レースのワイド配当取得
        let totalBet=0,totalPayout=0,hitCount=0,missCount=0,unknownPayouts=0;
        const detail=[];
        for(let mi=0;mi<matched.length;mi++){
          if(cancelRef.current.cancelled)break;
          const m=matched[mi];
          totalBet+=bet;
          let pay=null;
          if(m.isHit){
            hitCount++;
            // ワイド配当を取得
            if(m.race.widePayouts&&m.race.widePayouts[key]!=null){
              pay=m.race.widePayouts[key];
            }else{
              let rvPrm=m.race.raceRVPrm;
              if(!rvPrm){
                const cacheKey=`${m.race.date}|${m.race.venue}`;
                if(!(cacheKey in venueEncCache)){
                  try{
                    const venues=await clientFetchVenues(m.race.date);
                    const v=venues.find(x=>x.name===m.race.venue);
                    if(v&&v.encPrm){
                      const j=await _proxyFetch({type:'JSJ018',encp:v.encPrm});
                      const map={};
                      (j.resultList||[]).forEach(rr=>{
                        const rno=parseInt((rr.rclblRaceNo||'').replace('R',''));
                        if(rno&&(rr.raceRVPrm||rr.raceTanpyoPrm))map[rno]=rr.raceRVPrm||rr.raceTanpyoPrm;
                      });
                      venueEncCache[cacheKey]=map;
                    }else{venueEncCache[cacheKey]={};}
                  }catch(e){venueEncCache[cacheKey]={};}
                }
                rvPrm=venueEncCache[cacheKey][m.race.raceNo];
              }
              if(rvPrm){
                try{
                  const w=await clientFetchWideForRace(rvPrm);
                  pay=w.widePayouts[key];
                  if(Object.keys(w.widePayouts).length>0){
                    await dbPut('raceResults',{...m.race,widePayouts:w.widePayouts,wideNinki:w.wideNinki,raceRVPrm:rvPrm});
                  }
                }catch(e){}
              }
            }
            if(pay!=null){
              const payout=pay*(bet/100);  // bet=1000円なら配当の10倍
              totalPayout+=payout;
            }else{
              unknownPayouts++;
            }
          }else{
            missCount++;
          }
          detail.push({...m,pay,payout:pay!=null?pay*(bet/100):null});
        }

        const roi=totalBet>0?totalPayout/totalBet*100:0;
        perSign.push({
          sign,trials:matched.length,hits:hitCount,misses:missCount,
          unknownPayouts,totalBet,totalPayout,
          profit:totalPayout-totalBet,
          roi:Math.round(roi*10)/10,
          detail,
        });
        setProgress({i:si+1,total:allSigns.length,message:`${si+1}/${allSigns.length} ${(sign.playerName||'?')} の集計中...`});
      }

      // 全体集計
      const grand={
        trials:perSign.reduce((s,x)=>s+x.trials,0),
        hits:perSign.reduce((s,x)=>s+x.hits,0),
        misses:perSign.reduce((s,x)=>s+x.misses,0),
        unknownPayouts:perSign.reduce((s,x)=>s+x.unknownPayouts,0),
        totalBet:perSign.reduce((s,x)=>s+x.totalBet,0),
        totalPayout:perSign.reduce((s,x)=>s+x.totalPayout,0),
      };
      grand.profit=grand.totalPayout-grand.totalBet;
      grand.roi=grand.totalBet>0?Math.round(grand.totalPayout/grand.totalBet*1000)/10:0;
      grand.hitRate=grand.trials>0?Math.round(grand.hits/grand.trials*1000)/10:0;

      // perSignをROI降順
      perSign.sort((a,b)=>b.roi-a.roi);

      setSim({grand,perSign,betAmount:bet});
      await reload();
    }catch(e){
      alert('シミュレーション失敗: '+e.message);
    }finally{
      setRunning(false);
    }
  };

  return(
    <div className="card" style={{borderColor:'var(--accent)',borderWidth:'2px'}}>
      <div className="card-title" style={{color:'var(--accent)'}}>💰 採用サイン ベットシミュレーション</div>
      <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'10px',lineHeight:'1.6'}}>
        採用済み全2車連動サインで毎回 <strong style={{color:'var(--accent)'}}>{bet.toLocaleString()}円</strong> を
        連動ワイドにベットしていた場合の総収支・回収率を計算
      </div>
      <div style={{display:'flex',gap:'8px',alignItems:'center',marginBottom:'10px',flexWrap:'wrap'}}>
        <label style={{fontSize:'12px',color:'var(--text2)'}}>1回あたり ベット額:</label>
        <input className="inp" type="number" value={bet} onChange={e=>setBet(Math.max(100,Number(e.target.value)))} step="100" style={{width:'120px'}}/>
        <span style={{fontSize:'11px',color:'var(--text2)'}}>円</span>
      </div>
      {!running?(
        <button className="btn btn-primary" onClick={runSim} style={{width:'100%'}}>
          ▶ シミュレーション実行
        </button>
      ):(
        <button className="btn btn-danger" onClick={()=>{cancelRef.current.cancelled=true;}} style={{width:'100%'}}>
          ⏹ キャンセル
        </button>
      )}
      {progress&&(
        <div style={{marginTop:'10px',padding:'8px',background:'var(--bg3)',borderRadius:'5px',fontSize:'11px'}}>
          ⏳ {progress.message}
          <div style={{height:'4px',background:'var(--bg)',borderRadius:'2px',marginTop:'4px',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${progress.i/progress.total*100}%`,background:'var(--accent)'}}/>
          </div>
        </div>
      )}
      {sim&&(<>
        {/* 全体集計カード */}
        <div style={{marginTop:'14px',padding:'14px',borderRadius:'8px',border:`2px solid ${sim.grand.profit>=0?'var(--green)':'var(--red)'}`,background:sim.grand.profit>=0?'rgba(58,122,42,0.06)':'rgba(187,34,0,0.05)'}}>
          <div style={{fontWeight:'700',fontSize:'14px',marginBottom:'8px'}}>🏆 全体集計 (1回 {sim.betAmount.toLocaleString()}円ベット)</div>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'8px',fontSize:'12px'}}>
            <span>該当 <strong>{sim.grand.trials}</strong>回</span>
            <span>的中 <strong style={{color:'var(--green)'}}>{sim.grand.hits}</strong>回</span>
            <span>不発 <strong style={{color:'var(--red)'}}>{sim.grand.misses}</strong>回</span>
            <span>的中率 <strong>{sim.grand.hitRate}%</strong></span>
          </div>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'8px',fontSize:'12px'}}>
            <span>ベット総額 <strong>{sim.grand.totalBet.toLocaleString()}円</strong></span>
            <span>払戻総額 <strong style={{color:'var(--green)'}}>{sim.grand.totalPayout.toLocaleString()}円</strong></span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'10px',padding:'8px',background:'rgba(0,0,0,0.04)',borderRadius:'6px'}}>
            <div>
              <div style={{fontSize:'11px',color:'var(--text2)'}}>収支</div>
              <div style={{fontSize:'24px',fontWeight:'900',color:sim.grand.profit>=0?'var(--green)':'var(--red)'}}>
                {sim.grand.profit>=0?'+':''}{sim.grand.profit.toLocaleString()}円
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'11px',color:'var(--text2)'}}>回収率</div>
              <div style={{fontSize:'28px',fontWeight:'900',color:sim.grand.roi>=100?'var(--green)':'var(--red)'}}>{sim.grand.roi}%</div>
            </div>
          </div>
          {sim.grand.unknownPayouts>0&&(
            <div style={{fontSize:'10px',color:'var(--yellow)',marginTop:'6px'}}>
              ⚠️ 配当不明: {sim.grand.unknownPayouts}件 (払戻計算から除外)
            </div>
          )}
        </div>

        {/* サイン別内訳 */}
        <div className="section-title" style={{marginTop:'14px'}}>サイン別内訳 ({sim.perSign.length}件)</div>
        <div style={{maxHeight:'500px',overflowY:'auto'}}>
          {sim.perSign.map((p,i)=>{
            const color=p.profit>=0?'var(--green)':'var(--red)';
            return(
              <div key={i} className="hist-item" style={{borderColor:color,borderWidth:'1px'}}>
                <div style={{fontSize:'11px',marginBottom:'5px',lineHeight:'1.4'}}>{describeSign(p.sign)}</div>
                <div style={{display:'flex',gap:'10px',flexWrap:'wrap',fontSize:'11px',color:'var(--text2)'}}>
                  <span>該当{p.trials}回 / 的中{p.hits} / 不発{p.misses}</span>
                  <span style={{color}}>収支 {p.profit>=0?'+':''}{p.profit.toLocaleString()}円</span>
                  <span style={{marginLeft:'auto',fontWeight:'700',color}}>ROI {p.roi}%</span>
                </div>
                {p.unknownPayouts>0&&<div style={{fontSize:'10px',color:'var(--yellow)',marginTop:'3px'}}>※ 配当不明{p.unknownPayouts}件</div>}
              </div>
            );
          })}
        </div>
      </>)}
    </div>
  );
}

function PerformanceScreen({raceResults,signConditions,discoveries=[],reload}){
  const today=new Date().toISOString().slice(0,10);
  const[period,setPeriod]=useState('day');
  const[selectedDate,setSelectedDate]=useState(today);
  const[logs,setLogs]=useState([]);
  const[showLogs,setShowLogs]=useState(false);
  useEffect(()=>{dbAll('predictionLogs').then(setLogs);},[showLogs]);

  const allSigns=[
    ...signConditions.filter(c=>c.active),
    ...discoveries.filter(d=>d.active!==false),
  ];

  const dailyMap=useMemo(()=>buildSignHitMap(raceResults,allSigns),[raceResults,allSigns.length]);

  // 全日付ソート (降順)
  const allDates=Object.keys(dailyMap).filter(d=>dailyMap[d].matches>0).sort((a,b)=>b.localeCompare(a));

  // 期間別集計
  const periodStats=useMemo(()=>{
    if(period==='day') return allDates.map(d=>({label:d,...dailyMap[d]}));
    if(period==='week'){
      const map={};
      allDates.forEach(d=>{
        const dt=new Date(d);
        const day=dt.getDay();
        const monday=new Date(dt);monday.setDate(dt.getDate()-((day+6)%7));
        const wk=monday.toISOString().slice(0,10);
        const e=map[wk]=map[wk]||{label:`${wk}〜`,matches:0,hits:0,withResult:0,items:[]};
        e.matches+=dailyMap[d].matches; e.hits+=dailyMap[d].hits;
        e.withResult+=dailyMap[d].withResult;
        e.items.push(...dailyMap[d].items);
      });
      return Object.values(map).sort((a,b)=>b.label.localeCompare(a.label));
    }
    if(period==='month'){
      const map={};
      allDates.forEach(d=>{
        const mo=d.slice(0,7);
        const e=map[mo]=map[mo]||{label:mo,matches:0,hits:0,withResult:0,items:[]};
        e.matches+=dailyMap[d].matches; e.hits+=dailyMap[d].hits;
        e.withResult+=dailyMap[d].withResult;
        e.items.push(...dailyMap[d].items);
      });
      return Object.values(map).sort((a,b)=>b.label.localeCompare(a.label));
    }
    return[];
  },[period,allDates,dailyMap]);

  // 全期間合計
  const totalMatches=periodStats.reduce((s,d)=>s+d.matches,0);
  const totalHits=periodStats.reduce((s,d)=>s+d.hits,0);
  const totalWith=periodStats.reduce((s,d)=>s+d.withResult,0);
  const totalRate=totalWith>0?Math.round(totalHits/totalWith*100):null;
  // 的中時の配当合計
  const totalPayout=periodStats.reduce((s,d)=>{
    return s+(d.items||[]).filter(it=>it.hit).reduce((ss,it)=>ss+(it.exactaPayout||0),0);
  },0);
  const totalTrifecta=periodStats.reduce((s,d)=>{
    return s+(d.items||[]).filter(it=>it.hit).reduce((ss,it)=>ss+(it.trifectaPayout||0),0);
  },0);

  // 選択日の詳細
  const selectedDetail=dailyMap[selectedDate];

  if(allSigns.length===0)return(
    <div className="card" style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:'40px',marginBottom:'10px'}}>📈</div>
      <div style={{fontWeight:'700'}}>採用サインなし</div>
      <div style={{color:'var(--text2)',fontSize:'12px',marginTop:'8px'}}>「サイン」タブで採用してください</div>
    </div>
  );

  return(
    <div>
      <BetSimulator raceResults={raceResults} signConditions={signConditions} discoveries={discoveries} reload={reload}/>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <div style={{flex:1,fontWeight:'700',fontSize:'12px',color:'var(--text2)',letterSpacing:'.5px',textTransform:'uppercase'}}>予想記録履歴 ({logs.length}件)</div>
          <button className="btn btn-sm btn-ghost" onClick={()=>setShowLogs(!showLogs)}>{showLogs?'閉じる':'表示'}</button>
        </div>
        {showLogs&&(

                    {l.races?.length||0}R / {(l.races||[]).reduce((s,r)=>s+(r.alerts?.length||0),0)}サイン

                  onClick={async()=>{if(confirm('削除しますか?')){await dbDel('predictionLogs',l.id);setLogs(logs.filter(x=>x.id!==l.id));}}}>削除</button>
              </div>
            ))}
          </div>
        )}
