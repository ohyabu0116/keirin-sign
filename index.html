      <div className="card">
        <div className="card-title">トータル成績 ({allSigns.length}サイン)</div>
        <div style={{display:'flex',gap:'10px',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:'10px',color:'var(--text2)'}}>該当レース</div>
            <div style={{fontSize:'22px',fontWeight:'900'}}>{totalMatches}</div>
          </div>
          <div>
            <div style={{fontSize:'10px',color:'var(--text2)'}}>的中</div>
            <div style={{fontSize:'22px',fontWeight:'900',color:'var(--green)'}}>{totalHits}</div>
          </div>
          <div>
            <div style={{fontSize:'10px',color:'var(--text2)'}}>結果あり</div>
            <div style={{fontSize:'22px',fontWeight:'900'}}>{totalWith}</div>
          </div>
          <div>
            <div style={{fontSize:'10px',color:'var(--text2)'}}>的中率</div>
            <div style={{fontSize:'30px',fontWeight:'900',color:totalRate>=50?'var(--green)':'var(--red)'}}>
              {totalRate!=null?totalRate+'%':'-'}
            </div>
          </div>
        </div>
        {(totalPayout>0||totalTrifecta>0)&&(
          <div style={{display:'flex',gap:'14px',marginTop:'8px',paddingTop:'8px',borderTop:'1px dashed var(--border)',fontSize:'11px',color:'var(--text2)',flexWrap:'wrap'}}>
            {totalPayout>0&&<span>的中時2車単合計 <strong style={{color:'var(--accent)',fontSize:'13px'}}>{totalPayout.toLocaleString()}円</strong></span>}
            {totalTrifecta>0&&<span>3連単合計 <strong style={{color:'var(--accent)',fontSize:'13px'}}>{totalTrifecta.toLocaleString()}円</strong></span>}
            {totalHits>0&&totalPayout>0&&<span>平均 <strong>{Math.round(totalPayout/totalHits).toLocaleString()}円/的中</strong></span>}
          </div>
        )}
      </div>

      <div className="card">
        <div style={{display:'flex',gap:'5px',marginBottom:'10px'}}>
          <button className={`btn btn-sm ${period==='day'?'btn-primary':'btn-ghost'}`} onClick={()=>setPeriod('day')}>日別</button>
          <button className={`btn btn-sm ${period==='week'?'btn-primary':'btn-ghost'}`} onClick={()=>setPeriod('week')}>週別</button>
          <button className={`btn btn-sm ${period==='month'?'btn-primary':'btn-ghost'}`} onClick={()=>setPeriod('month')}>月別</button>
        </div>
        {periodStats.length===0?<div className="empty">データなし</div>:
          <div style={{maxHeight:'420px',overflowY:'auto'}}>
            {periodStats.slice(0,60).map((d,i)=>{
              const rate=d.withResult>0?Math.round(d.hits/d.withResult*100):null;
              const isSelected=selectedDate===d.label;
              return(
                <div key={i} onClick={()=>period==='day'&&setSelectedDate(d.label)}
                  style={{display:'flex',gap:'8px',alignItems:'center',padding:'8px 10px',borderBottom:'1px solid var(--border)',cursor:period==='day'?'pointer':'default',
                    background:isSelected?'rgba(184,101,26,0.08)':'transparent'}}>
                  <span style={{minWidth:'110px',fontSize:'12px',fontWeight:'700'}}>{d.label}</span>
                  <span style={{flex:1,fontSize:'11px',color:'var(--text2)'}}>該当{d.matches} / 結果{d.withResult}</span>
                  {rate!=null&&(
                    <span style={{fontWeight:'900',fontSize:'14px',color:rate>=50?'var(--green)':'var(--red)',minWidth:'62px',textAlign:'right'}}>
                      {d.hits}/{d.withResult} <span style={{fontSize:'11px'}}>({rate}%)</span>
                    </span>
                  )}
                  {rate==null&&<span style={{fontSize:'11px',color:'var(--yellow)'}}>⏳待</span>}
                </div>
              );
            })}
          </div>
        }
      </div>

      {period==='day'&&selectedDetail&&selectedDetail.items.length>0&&(
        <div className="card">
          <div className="card-title">{selectedDate} の該当レース詳細 ({selectedDetail.matches}件)</div>
          <div style={{maxHeight:'480px',overflowY:'auto'}}>
            {selectedDetail.items.map((it,i)=>(
              <div key={i} style={{padding:'7px 9px',marginBottom:'4px',
                borderRadius:'6px',fontSize:'12px',
                background:it.hit===true?'rgba(58,122,42,0.08)':it.hit===false?'rgba(187,34,0,0.06)':'rgba(160,106,10,0.05)',
                border:`1px solid ${it.hit===true?'var(--green)':it.hit===false?'var(--red)':'var(--border)'}`}}>
                <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                  <span style={{fontWeight:'700',minWidth:'56px'}}>{it.venue}</span>
                  <span style={{minWidth:'30px'}}>{it.raceNo}R</span>
                  <span style={{display:'flex',gap:'3px'}}>{it.linked.map(n=><Chip key={n} no={n} size="sm"/>)}</span>
                  <span style={{flex:1,fontSize:'11px',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {it.sign.desc||it.sign.description||''}
                  </span>
                  {it.top3?(
                    <><span style={{color:'var(--text2)'}}>{it.top3.join('-')}</span>
                    <span style={{fontWeight:'700',color:it.hit?'var(--green)':'var(--red)'}}>{it.hit?'✅':'❌'}</span></>
                  ):<span style={{color:'var(--yellow)'}}>⏳</span>}
                </div>
                {it.top3&&(it.exactaPayout||it.trifectaPayout)&&(
                  <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'3px',fontSize:'10px',color:'var(--text2)',paddingLeft:'56px'}}>
                    {it.exactaPayout&&<span>2車単 <strong style={{color:'var(--accent)'}}>{it.exactaPayout.toLocaleString()}円</strong>{it.exactaNinki&&` (${it.exactaNinki}人気)`}</span>}
                    {it.trifectaPayout&&<span>3連単 <strong style={{color:'var(--accent)'}}>{it.trifectaPayout.toLocaleString()}円</strong>{it.trifectaNinki&&` (${it.trifectaNinki}人気)`}</span>}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ====================================================================
   データ検証画面 (A整合性 + B信頼性 + C異常値)
==================================================================== */
function AnomalyHunter({raceResults,players,discoveries,reload}){
  const[running,setRunning]=useState(false);
  const[progress,setProgress]=useState(null);
  const[results,setResults]=useState(null);
  const[minTrials,setMinTrials]=useState(3);
  const[minRate,setMinRate]=useState(100);
  const[habitRunning,setHabitRunning]=useState(false);
  const[habitResults,setHabitResults]=useState(null);
  const[habitStrict,setHabitStrict]=useState('extreme');
  const[linkAdopting,setLinkAdopting]=useState(false);
  const cancelRef=useRef({cancelled:false});

  // ① 場・脚質の「車番グセ」を抽出 (集計型・高速・全データで頑健)
  const runHabits=async()=>{
    setHabitRunning(true); setHabitResults(null);
    try{
      // 厳選度: extreme=極端のみ / standard=標準 / all=全部
      const TH={
        extreme:{vDev:0.25,vTrials:50,vDays:7,kDev:0.22,kTrials:150},
        standard:{vDev:0.20,vTrials:40,vDays:5,kDev:0.18,kTrials:80},
        all:{vDev:0.15,vTrials:30,vDays:4,kDev:0.13,kTrials:60},
      }[habitStrict]||{vDev:0.25,vTrials:50,vDays:7,kDev:0.22,kTrials:150};
      const validRaces=dedupRaces(raceResults).filter(r=>r.result1&&r.entries&&r.entries.length>0);
      const vmap={}; // venue|rc|car
      const kmap={}; // kyaku|rc|car
      validRaces.forEach(r=>{
        const rc=(r.entries||[]).filter(e=>e.regNo).length||r.racerCount;
        if(!rc)return;
        const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
        (r.entries||[]).forEach(e=>{
          const c=Number(e.syaban); if(!c)return;
          const vk=`${r.venue}|${rc}|${c}`;
          const v=vmap[vk]=vmap[vk]||{h:0,t:0,days:new Set()};
          v.t++; v.days.add(r.date); if(top3.has(c))v.h++;
          if(e.kyaku){
            const kk=`${e.kyaku}|${rc}|${c}`;
            const k=kmap[kk]=kmap[kk]||{h:0,t:0};
            k.t++; if(top3.has(c))k.h++;
          }
        });
      });
      const r1=n=>Math.round(n*1000)/10;
      const venueHabit=[],kyakuHabit=[];
      Object.entries(vmap).forEach(([key,v])=>{
        if(v.t<TH.vTrials||v.days.size<TH.vDays)return; // 1開催だけの偽物を除外
        const[venue,rcStr,cStr]=key.split('|');
        const rc=Number(rcStr),c=Number(cStr),base=3/rc,rate=v.h/v.t,dev=rate-base;
        if(dev>=TH.vDev)venueHabit.push({type:'VENUE_CAR_HABIT',venue,racerCount:rc,syaban:c,side:'axis',
          rate:r1(rate),top3rate:r1(rate),trials:v.t,hits:v.h,baseline:r1(base),dev:r1(dev),days:v.days.size,
          desc:`${venue}の${rc}車立て ${c}番車は3着内 ${r1(rate)}% (${v.h}/${v.t}) 基準${r1(base)}%＝軸`});
        else if(dev<=-TH.vDev)venueHabit.push({type:'VENUE_CAR_HABIT',venue,racerCount:rc,syaban:c,side:'kill',
          rate:r1(1-rate),top3rate:r1(rate),trials:v.t,hits:v.t-v.h,baseline:r1(base),dev:r1(dev),days:v.days.size,
          desc:`${venue}の${rc}車立て ${c}番車は3着内 ${r1(rate)}%しかない (${v.h}/${v.t}) 基準${r1(base)}%＝消し`});
      });
      Object.entries(kmap).forEach(([key,v])=>{
        if(v.t<TH.kTrials)return;
        const[kyaku,rcStr,cStr]=key.split('|');
        const rc=Number(rcStr),c=Number(cStr),base=3/rc,rate=v.h/v.t,dev=rate-base;
        if(dev>=TH.kDev)kyakuHabit.push({type:'KYAKU_CAR_HABIT',kyaku,racerCount:rc,syaban:c,side:'axis',
          rate:r1(rate),top3rate:r1(rate),trials:v.t,hits:v.h,baseline:r1(base),dev:r1(dev),
          desc:`${rc}車立て「${kyaku}」が${c}番車→3着内 ${r1(rate)}% (${v.h}/${v.t}) 基準${r1(base)}%＝軸`});
        else if(dev<=-TH.kDev)kyakuHabit.push({type:'KYAKU_CAR_HABIT',kyaku,racerCount:rc,syaban:c,side:'kill',
          rate:r1(1-rate),top3rate:r1(rate),trials:v.t,hits:v.t-v.h,baseline:r1(base),dev:r1(dev),
          desc:`${rc}車立て「${kyaku}」が${c}番車→3着内 ${r1(rate)}%しかない (${v.h}/${v.t}) 基準${r1(base)}%＝消し`});
      });
      venueHabit.sort((a,b)=>Math.abs(b.dev)-Math.abs(a.dev));
      kyakuHabit.sort((a,b)=>Math.abs(b.dev)-Math.abs(a.dev));
      const adopted=new Set(discoveries.filter(d=>d.active!==false).map(d=>signKey(d)));
      setHabitResults({
        venueHabit:venueHabit.filter(c=>!adopted.has(signKey(c))),
        kyakuHabit:kyakuHabit.filter(c=>!adopted.has(signKey(c))),
      });
    }catch(e){alert('エラー: '+e.message);}
    finally{setHabitRunning(false);}
  };

  // ② 複数会場(3会場以上)で100%成立する連動サインを一括採用
  const autoAdoptLinks=async()=>{
    setLinkAdopting(true);
    try{
      const validRaces=dedupRaces(raceResults).filter(r=>r.result1&&r.entries&&r.entries.length>0);
      const playerMap={};
      players.forEach(p=>{if(p.regNo)playerMap[String(p.regNo).padStart(6,'0')]=p;});
      validRaces.forEach(r=>{(r.entries||[]).forEach(e=>{
        const rn=String(e.regNo||'').padStart(6,'0');
        if(rn&&!playerMap[rn]&&e.name)playerMap[rn]={regNo:rn,name:e.name};
      });});
      const histByKey={};
      validRaces.forEach(r=>{
        const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          const sy=Number(e.syaban);
          if(!rn||!sy)return;
          (histByKey[`${rn}|${sy}`]=histByKey[`${rn}|${sy}`]||[]).push({top3,venue:r.venue});
        });
      });
      const found=[],seen=new Set();
      Object.entries(histByKey).forEach(([key,hist])=>{
        if(hist.length<5)return;
        const[rn,syStr]=key.split('|');const sy=Number(syStr);
        const pName=(playerMap[rn]||{name:'?'}).name;
        for(let n=1;n<=9;n++){
          if(n===sy)continue;
          let hits=0;const venues=new Set();
          hist.forEach(h=>{if(h.top3.has(n)){hits++;venues.add(h.venue);}});
          if(hits===hist.length&&hits>=5&&venues.size>=3){
            const c={type:'PLAYER_SYABAN_LINK',regNo:rn,playerName:pName,syaban:sy,linkedSyaban:n,
              trials:hist.length,hits,rate:100,venueCount:venues.size,
              desc:`${pName} が${sy}番のとき → ${n}番が3着以内 100% (${hits}/${hist.length}) [${venues.size}会場]`};
            const sk=signKey(c);
            if(!seen.has(sk)){seen.add(sk);found.push(c);}
          }
        }
      });
      found.sort((a,b)=>b.trials-a.trials||b.venueCount-a.venueCount);
      const adopted=new Set(discoveries.filter(d=>d.active!==false).map(d=>signKey(d)));
      const toAdopt=found.filter(c=>!adopted.has(signKey(c)));
      if(toAdopt.length===0){alert('新たに採用できる「複数会場100%連動」サインはありませんでした');return;}
      if(!confirm(`複数会場(3会場以上)で100%成立する連動サイン ${toAdopt.length}件 を一括採用しますか?\n\n(同一シリーズ連戦の水増しを除いた本物の連動だけです)`))return;
      for(const c of toAdopt)await dbPut('discoveries',{...c,active:true,adoptedAt:Date.now()});
      reload();
      alert(`✓ ${toAdopt.length}件の連動サインを採用しました`);
    }catch(e){alert('エラー: '+e.message);}
    finally{setLinkAdopting(false);}
  };

  const adoptHabit=async(c)=>{
    await dbPut('discoveries',{...c,active:true,adoptedAt:Date.now()});
    reload();
    setHabitResults(r=>r?{venueHabit:r.venueHabit.filter(x=>signKey(x)!==signKey(c)),kyakuHabit:r.kyakuHabit.filter(x=>signKey(x)!==signKey(c))}:r);
  };
  const adoptHabitCategory=async(catKey,label)=>{
    if(!habitResults||!habitResults[catKey]||habitResults[catKey].length===0)return;
    const list=habitResults[catKey];
    if(!confirm(`${label} ${list.length}件 を全て採用しますか?`))return;
    for(const c of list)await dbPut('discoveries',{...c,active:true,adoptedAt:Date.now()});
    reload();
    alert(`${list.length}件採用しました`);
    setHabitResults(r=>({...r,[catKey]:[]}));
  };

  const runHunt=async()=>{
    setRunning(true); setResults(null); setProgress(null);
    cancelRef.current={cancelled:false};
    try{
      const validRaces=dedupRaces(raceResults).filter(r=>r.result1&&r.entries&&r.entries.length>0);
      const playerMap={};
      players.forEach(p=>{if(p.regNo)playerMap[String(p.regNo).padStart(6,'0')]=p;});
      validRaces.forEach(r=>{
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          if(rn&&!playerMap[rn]&&e.name)playerMap[rn]={regNo:rn,name:e.name};
        });
      });

      const histByKey={};  // (regNo|syaban) → [{date,top3,entryKeys,venue,grade}]
      validRaces.forEach(r=>{
        const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
        const entryKeys=(r.entries||[]).map(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          const sy=Number(e.syaban);
          return rn&&sy?`${rn}|${sy}`:null;
        }).filter(Boolean);
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          const sy=Number(e.syaban);
          if(!rn||!sy)return;
          const k=`${rn}|${sy}`;
          (histByKey[k]=histByKey[k]||[]).push({date:r.date,top3,entryKeys,venue:r.venue,grade:r.grade});
        });
      });

      const minRateDec=minRate/100;
      const findings={single:[],pair:[],venueSingle:[],venuePair:[],compoundSingle:[],compoundPair:[]};
      const keys=Object.keys(histByKey);
      const seen=new Set();

      setProgress({phase:'mining',message:'パターン探索中...',progress:0});
      await new Promise(r=>setTimeout(r,30));

      for(let ki=0;ki<keys.length;ki++){
        if(cancelRef.current.cancelled)break;
        const key=keys[ki];
        const [rn,syStr]=key.split('|');
        const sy=Number(syStr);
        const hist=histByKey[key];
        if(hist.length<minTrials)continue;
        const pName=(playerMap[rn]||{name:'?'}).name;

        // 1) 単独連動: 1車が3着内
        for(let n=1;n<=9;n++){
          if(n===sy)continue;
          const hits=hist.filter(h=>h.top3.has(n)).length;
          const rate=hits/hist.length;
          if(rate>=minRateDec&&hits>=minTrials){
            const sk=`single|${rn}|${sy}|${n}`;
            if(!seen.has(sk)){seen.add(sk);
              findings.single.push({type:'PLAYER_SYABAN_LINK',regNo:rn,playerName:pName,syaban:sy,
                linkedSyaban:n,trials:hist.length,hits,rate:Math.round(rate*1000)/10,
                desc:`${pName} が${sy}番のとき → ${n}番が3着以内 ${Math.round(rate*1000)/10}% (${hits}/${hist.length})`});
            }
          }
        }

        // 2) 2車連動
        for(let n1=1;n1<=9;n1++){
          if(n1===sy)continue;
          for(let n2=n1+1;n2<=9;n2++){
            if(n2===sy)continue;
            const hits=hist.filter(h=>h.top3.has(n1)&&h.top3.has(n2)).length;
            const rate=hits/hist.length;
            if(rate>=minRateDec&&hits>=minTrials){
              const sk=`pair|${rn}|${sy}|${n1},${n2}`;
              if(!seen.has(sk)){seen.add(sk);
                findings.pair.push({type:'PLAYER_SYABAN_PAIR_LINK',regNo:rn,playerName:pName,syaban:sy,
                  linkedPair:[n1,n2],trials:hist.length,hits,rate:Math.round(rate*1000)/10,
                  desc:`${pName} が${sy}番のとき → ${n1}・${n2}両方3着以内 ${Math.round(rate*1000)/10}% (${hits}/${hist.length})`});
              }
            }
          }
        }

        // 3) 競輪場特化: (regNo,sy,venue) → 単独/2車
        const venueGroups={};
        hist.forEach(h=>{(venueGroups[h.venue]=venueGroups[h.venue]||[]).push(h);});
        for(const venue in venueGroups){
          const vh=venueGroups[venue];
          if(vh.length<minTrials)continue;
          // 単独
          for(let n=1;n<=9;n++){
            if(n===sy)continue;
            const hits=vh.filter(h=>h.top3.has(n)).length;
            const rate=hits/vh.length;
            if(rate>=minRateDec&&hits>=minTrials){
              const sk=`vsingle|${rn}|${sy}|${venue}|${n}`;
              if(!seen.has(sk)){seen.add(sk);
                findings.venueSingle.push({type:'PLAYER_SYABAN_VENUE_LINK',regNo:rn,playerName:pName,
                  syaban:sy,venue,linkedSyaban:n,trials:vh.length,hits,rate:Math.round(rate*1000)/10,
                  desc:`${pName} が${venue}で${sy}番のとき → ${n}番が3着以内 ${Math.round(rate*1000)/10}% (${hits}/${vh.length})`});
              }
            }
          }
          // 2車
          for(let n1=1;n1<=9;n1++){
            if(n1===sy)continue;
            for(let n2=n1+1;n2<=9;n2++){
              if(n2===sy)continue;
              const hits=vh.filter(h=>h.top3.has(n1)&&h.top3.has(n2)).length;
              const rate=hits/vh.length;
              if(rate>=minRateDec&&hits>=minTrials){
                const sk=`vpair|${rn}|${sy}|${venue}|${n1},${n2}`;
                if(!seen.has(sk)){seen.add(sk);
                  findings.venuePair.push({type:'PLAYER_SYABAN_VENUE_PAIR_LINK',regNo:rn,playerName:pName,
                    syaban:sy,venue,linkedPair:[n1,n2],trials:vh.length,hits,rate:Math.round(rate*1000)/10,
                    desc:`${pName} が${venue}で${sy}番のとき → ${n1}・${n2}両方3着以内 ${Math.round(rate*1000)/10}% (${hits}/${vh.length})`});
                }
              }
            }
          }
        }

        // 4) 複合 (companion player): companion → 単独
        if(ki%200===0){
          setProgress({phase:'mining',message:`${ki+1}/${keys.length}キー / 単独${findings.single.length} ペア${findings.pair.length} 場特化${findings.venueSingle.length+findings.venuePair.length}`,progress:(ki+1)/keys.length});
          await new Promise(r=>setTimeout(r,0));
        }
      }

      // 複合companion (重いので別ループ)
      setProgress({phase:'compound',message:'複合条件 (2選手) を探索中...',progress:0});
      await new Promise(r=>setTimeout(r,30));
      for(let ki=0;ki<keys.length;ki++){
        if(cancelRef.current.cancelled)break;
        const key1=keys[ki];
        const hist1=histByKey[key1];
        if(hist1.length<minTrials*2)continue;  // 効率上げのため
        const [rn1,sy1Str]=key1.split('|');
        const sy1=Number(sy1Str);
        const pName1=(playerMap[rn1]||{name:'?'}).name;

        // companion ごとに hits 集計
        const compMap={};  // k2 → {sharedRaces}
        hist1.forEach(h=>{
          h.entryKeys.forEach(k2=>{
            if(k2===key1)return;
            (compMap[k2]=compMap[k2]||[]).push(h);
          });
        });

        for(const k2 in compMap){
          const shared=compMap[k2];
          if(shared.length<minTrials)continue;
          const [rn2,sy2Str]=k2.split('|');
          const sy2=Number(sy2Str);
          const pName2=(playerMap[rn2]||{name:'?'}).name;

          // 単独
          for(let n=1;n<=9;n++){
            if(n===sy1||n===sy2)continue;
            const hits=shared.filter(h=>h.top3.has(n)).length;
            const rate=hits/shared.length;
            if(rate>=minRateDec&&hits>=minTrials){
              // 順序正規化
              const k1str=`${rn1}|${sy1}`,k2str=`${rn2}|${sy2}`;
              const sorted=k1str<k2str?[k1str,k2str,pName1,pName2,sy1,sy2,rn1,rn2]:[k2str,k1str,pName2,pName1,sy2,sy1,rn2,rn1];
              const sk=`csingle|${sorted[0]}+${sorted[1]}|${n}`;
              if(!seen.has(sk)){seen.add(sk);
                findings.compoundSingle.push({type:'PLAYER_COMBO_LINK',
                  regA:sorted[6],playerNameA:sorted[2],syaA:sorted[4],
                  regB:sorted[7],playerNameB:sorted[3],syaB:sorted[5],
                  linkedSyaban:n,trials:shared.length,hits,rate:Math.round(rate*1000)/10,
                  desc:`${sorted[2]}が${sorted[4]}番 & ${sorted[3]}が${sorted[5]}番のとき → ${n}番が3着以内 ${Math.round(rate*1000)/10}% (${hits}/${shared.length})`});
              }
            }
          }
          // 2車
          for(let n1=1;n1<=9;n1++){
            if(n1===sy1||n1===sy2)continue;
            for(let n2=n1+1;n2<=9;n2++){
              if(n2===sy1||n2===sy2)continue;
              const hits=shared.filter(h=>h.top3.has(n1)&&h.top3.has(n2)).length;
              const rate=hits/shared.length;
              if(rate>=minRateDec&&hits>=minTrials){
                const k1str=`${rn1}|${sy1}`,k2str=`${rn2}|${sy2}`;
                const sorted=k1str<k2str?[k1str,k2str,pName1,pName2,sy1,sy2,rn1,rn2]:[k2str,k1str,pName2,pName1,sy2,sy1,rn2,rn1];
                const sk=`cpair|${sorted[0]}+${sorted[1]}|${n1},${n2}`;
                if(!seen.has(sk)){seen.add(sk);
                  findings.compoundPair.push({type:'PLAYER_COMBO_PAIR_LINK',
                    regA:sorted[6],playerNameA:sorted[2],syaA:sorted[4],
                    regB:sorted[7],playerNameB:sorted[3],syaB:sorted[5],
                    linkedPair:[n1,n2],trials:shared.length,hits,rate:Math.round(rate*1000)/10,
                    desc:`${sorted[2]}が${sorted[4]}番 & ${sorted[3]}が${sorted[5]}番のとき → ${n1}・${n2}両方3着以内 ${Math.round(rate*1000)/10}% (${hits}/${shared.length})`});
                }
              }
            }
          }
        }

        if(ki%100===0){
          setProgress({phase:'compound',message:`複合検索 ${ki+1}/${keys.length} / 単独${findings.compoundSingle.length} ペア${findings.compoundPair.length}`,progress:(ki+1)/keys.length});
          await new Promise(r=>setTimeout(r,0));
        }
      }

      // ソート: trials降順
      Object.keys(findings).forEach(k=>{findings[k].sort((a,b)=>b.trials-a.trials);});

      // 既採用除外
      const adopted=new Set(discoveries.filter(d=>d.active!==false).map(d=>signKey(d)));
      Object.keys(findings).forEach(k=>{findings[k]=findings[k].filter(c=>!adopted.has(signKey(c)));});

      const total=Object.values(findings).reduce((s,arr)=>s+arr.length,0);
      setResults(findings);
      setProgress({phase:'done',message:`完了: 合計${total.toLocaleString()}件\n単独${findings.single.length} / 2車${findings.pair.length} / 場特化単独${findings.venueSingle.length} / 場特化ペア${findings.venuePair.length} / 複合単独${findings.compoundSingle.length} / 複合2車${findings.compoundPair.length}`,progress:1});
    }catch(e){
      alert('エラー: '+e.message);
    }finally{
      setRunning(false);
    }
  };

  const adoptOne=async(c)=>{
    const obj={...c,active:true,adoptedAt:Date.now()};
    delete obj._matched;
    await dbPut('discoveries',obj);
    reload();
    // 該当カテゴリから削除
    setResults(r=>{
      if(!r)return r;
      const out={...r};
      Object.keys(out).forEach(k=>{out[k]=out[k].filter(x=>signKey(x)!==signKey(c));});
      return out;
    });
  };

  const adoptCategory=async(catKey,catLabel)=>{
    if(!results||!results[catKey])return;
    const list=results[catKey];
    if(list.length===0)return;
    if(!confirm(`${catLabel} ${list.length}件 を全て採用しますか?`))return;
    for(const c of list){
      const obj={...c,active:true,adoptedAt:Date.now()};
      delete obj._matched;
      await dbPut('discoveries',obj);
    }
    reload();
    alert(`${list.length}件採用しました`);
    setResults(r=>({...r,[catKey]:[]}));
  };

  const renderCategory=(catKey,catLabel,emoji)=>{
    const list=results[catKey];
    if(!list||list.length===0)return null;
    return(
      <div style={{marginTop:'14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}>
          <span style={{fontWeight:'700',fontSize:'13px'}}>{emoji} {catLabel} ({list.length}件)</span>
          <button className="btn btn-sm btn-success" style={{marginLeft:'auto'}} onClick={()=>adoptCategory(catKey,catLabel)}>全て採用</button>
        </div>
        <div style={{maxHeight:'400px',overflowY:'auto'}}>
          {list.slice(0,50).map((c,i)=>(
            <div key={i} className="hist-item" style={{borderColor:'var(--green)',borderWidth:'1px'}}>
              <div style={{fontSize:'12px',marginBottom:'4px'}}>{c.desc}</div>
              <div style={{display:'flex',gap:'8px',fontSize:'11px',color:'var(--text2)'}}>
                <strong style={{color:'var(--green)'}}>連動 {c.rate}%</strong>
                <span>試行 {c.trials}回 / 的中 {c.hits}回</span>
              </div>
              <button className="btn btn-sm btn-primary" style={{marginTop:'5px'}} onClick={()=>adoptOne(c)}>採用</button>
            </div>
          ))}
          {list.length>50&&<div className="empty">...他 {list.length-50}件 (上位50件のみ表示)</div>}
        </div>
      </div>
    );
  };

  const renderHabit=(catKey,label,emoji)=>{
    const list=habitResults&&habitResults[catKey];
    if(!list||list.length===0)return null;
    const axis=list.filter(c=>c.side==='axis'), kill=list.filter(c=>c.side==='kill');
    return(
      <div style={{marginTop:'12px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}>
          <span style={{fontWeight:'700',fontSize:'13px'}}>{emoji} {label} (軸{axis.length}/消し{kill.length})</span>
          <button className="btn btn-sm btn-success" style={{marginLeft:'auto'}} onClick={()=>adoptHabitCategory(catKey,label)}>全て採用</button>
        </div>
        <div style={{maxHeight:'320px',overflowY:'auto'}}>
          {list.slice(0,60).map((c,i)=>(
            <div key={i} className="hist-item" style={{borderColor:c.side==='kill'?'var(--text2)':'var(--green)',borderWidth:'1px'}}>
              <div style={{fontSize:'12px',marginBottom:'4px'}}>
                <span style={{display:'inline-block',fontWeight:'700',fontSize:'10px',padding:'1px 6px',borderRadius:'3px',marginRight:'6px',
                  background:c.side==='kill'?'#e8e8e8':'#ffe5e5',color:c.side==='kill'?'#333':'#bb1100'}}>{c.side==='kill'?'消し':'軸'}</span>
                {c.desc}
              </div>
              <div style={{display:'flex',gap:'8px',fontSize:'11px',color:'var(--text2)'}}>
                <strong style={{color:c.dev>=0?'var(--green)':'var(--red)'}}>基準比 {c.dev>=0?'+':''}{c.dev}pt</strong>
                <span>試行 {c.trials}回{c.days?` / ${c.days}日`:''}</span>
              </div>
              <button className="btn btn-sm btn-primary" style={{marginTop:'5px'}} onClick={()=>adoptHabit(c)}>採用</button>
            </div>
          ))}
          {list.length>60&&<div className="empty">...他 {list.length-60}件 (上位60件のみ表示)</div>}
        </div>
      </div>
    );
  };

  return(
    <div className="card" style={{borderColor:'var(--red)',borderWidth:'2px'}}>
      <div className="card-title" style={{color:'var(--red)'}}>🎯 異常パターンハンター</div>
      {/* === 場・脚質の車番グセ + 連動一括採用 (頑健・高速) === */}
      <div style={{padding:'10px',background:'rgba(0,150,80,0.06)',border:'1px solid var(--green)',borderRadius:'6px',marginBottom:'12px'}}>
        <div style={{fontWeight:'700',fontSize:'13px',marginBottom:'6px',color:'var(--green)'}}>🏟️ 場・脚質の「車番グセ」＋ 連動サイン一括採用</div>
        <p style={{fontSize:'11px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'8px'}}>
          試行数の多い<strong>頑健な異常値</strong>。「この競輪場のこの車番は軸/消し」「この脚質がこの車番だと軸/消し」を全データから抽出。<br/>
          連動一括採用は<strong>3会場以上で100%</strong>成立する選手連動だけ＝同一シリーズ連戦の水増しを除いた本物のみ。
        </p>
        <label style={{fontSize:'12px',display:'flex',gap:'6px',alignItems:'center',marginBottom:'8px'}}>
          厳選度: <select className="sel" value={habitStrict} onChange={e=>setHabitStrict(e.target.value)}>
            <option value="extreme">極端のみ (基準比±25pt〜・厳選)</option>
            <option value="standard">標準 (±20pt〜)</option>
            <option value="all">全部 (±15pt〜)</option>
          </select>
        </label>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button className="btn btn-sm btn-primary" disabled={habitRunning} onClick={runHabits} style={{flex:'1 1 45%',background:'var(--green)'}}>
            {habitRunning?'⏳ 抽出中...':'🏟️ 場・脚質のクセを抽出'}
          </button>
          <button className="btn btn-sm btn-primary" disabled={linkAdopting} onClick={autoAdoptLinks} style={{flex:'1 1 45%'}}>
            {linkAdopting?'⏳ 採用中...':'🔗 複数会場100%連動を一括採用'}
          </button>
        </div>
        {habitResults&&(<>
          {renderHabit('venueHabit','競輪場の車番グセ','🏟️')}
          {renderHabit('kyakuHabit','脚質×車番グセ','🦵')}
          {(habitResults.venueHabit.length===0&&habitResults.kyakuHabit.length===0)&&
            <div className="empty" style={{marginTop:'8px'}}>新規の異常クセはありませんでした (採用済みは除外)</div>}
        </>)}
      </div>
      <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>
        統計学を無視して「<strong>なんでこの条件でこれが起きるんだ!?</strong>」という異常事象を探す:<br/>
        • <strong>単独連動</strong>: 選手×車番 → ある車番が3着内<br/>
        • <strong>2車連動</strong>: 選手×車番 → 2車両方3着内<br/>
        • <strong>場特化</strong>: 上記 + 特定競輪場 (例: 函館で発動するパターン)<br/>
        • <strong>複合</strong>: 2選手×車番 が揃ったとき → 単独/2車<br/>
        ※ 全部「指定rate%以上 & 試行N回以上」で網羅探索
      </p>
      <div style={{display:'flex',gap:'10px',marginBottom:'10px',flexWrap:'wrap',alignItems:'center'}}>
        <label style={{fontSize:'12px',display:'flex',gap:'5px',alignItems:'center'}}>
          連動率: <select className="sel" value={minRate} onChange={e=>setMinRate(Number(e.target.value))}>
            <option value="100">100% (完全)</option>
            <option value="95">95%以上</option>
            <option value="90">90%以上</option>
            <option value="85">85%以上</option>
            <option value="80">80%以上</option>
          </select>
        </label>
        <label style={{fontSize:'12px',display:'flex',gap:'5px',alignItems:'center'}}>
          試行: <select className="sel" value={minTrials} onChange={e=>setMinTrials(Number(e.target.value))}>
            <option value="3">3回以上</option>
            <option value="4">4回以上</option>
            <option value="5">5回以上</option>
            <option value="7">7回以上</option>
            <option value="10">10回以上</option>
          </select>
        </label>
      </div>
      {!running?
        <button className="btn btn-primary" onClick={runHunt} style={{width:'100%',background:'var(--red)'}}>
          🔥 異常パターンを総ざらい
        </button>:
        <button className="btn btn-danger" onClick={()=>{cancelRef.current.cancelled=true;}} style={{width:'100%'}}>⏹ キャンセル</button>
      }
      {progress&&(
        <div style={{marginTop:'10px',padding:'8px',background:'rgba(187,34,0,0.07)',borderRadius:'5px',fontSize:'11px',whiteSpace:'pre-line',lineHeight:'1.6'}}>
          {progress.phase==='done'?'✓ ':'⏳ '}{progress.message}
          {progress.progress!=null&&progress.phase!=='done'&&(
            <div style={{height:'4px',background:'var(--bg3)',borderRadius:'2px',marginTop:'4px',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${progress.progress*100}%`,background:'var(--red)'}}/>
            </div>
          )}
        </div>
      )}
      {results&&(<>
        {renderCategory('single','単独連動','🎯')}
        {renderCategory('pair','2車連動','🎯🎯')}
        {renderCategory('venueSingle','場特化 単独','🏟️')}
        {renderCategory('venuePair','場特化 2車','🏟️🎯')}
        {renderCategory('compoundSingle','複合 単独','🔗')}
        {renderCategory('compoundPair','複合 2車','🔗🔗')}
      </>)}
    </div>
  );
}

function CompoundADiscovery({raceResults,players,discoveries,reload}){
  const[running,setRunning]=useState(false);
  const[progress,setProgress]=useState(null);
  const[results,setResults]=useState(null);
  const cancelRef=useRef({cancelled:false});

  const runMining=async()=>{
    setRunning(true); setResults(null); setProgress(null);
    cancelRef.current={cancelled:false};
    try{
      const validRaces=dedupRaces(raceResults).filter(r=>r.result1&&r.entries&&r.entries.length>0);
      const playerMap={};
      players.forEach(p=>{if(p.regNo)playerMap[String(p.regNo).padStart(6,'0')]=p;});
      validRaces.forEach(r=>{
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          if(rn&&!playerMap[rn]&&e.name)playerMap[rn]={regNo:rn,name:e.name};
        });
      });

      setProgress({phase:'building',message:'複合条件の探索準備中...',progress:0});
      await new Promise(r=>setTimeout(r,30));

      // (regNo, syaban) → 該当レース履歴
      const histByKey={};
      validRaces.forEach(r=>{
        const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
        const entryKeys=(r.entries||[]).map(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          const sy=Number(e.syaban);
          return rn&&sy?`${rn}|${sy}`:null;
        }).filter(Boolean);
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          const sy=Number(e.syaban);
          if(!rn||!sy)return;
          const k=`${rn}|${sy}`;
          (histByKey[k]=histByKey[k]||[]).push({date:r.date,top3,entryKeys});
        });
      });

      const today=new Date();
      const _30daysAgo=new Date(today.getTime()-30*86400000).toISOString().slice(0,10);
      const keys=Object.keys(histByKey).filter(k=>histByKey[k].length>=5);

      const candidates=[];
      const seen=new Set();
      const stats={basesProcessed:0,basesSkippedRate:0,
        pairsTotal:0,pairsScanned:0,
        companionsTotal:0,companionsLowTrials:0,companionsNotA:0,companionsNotImproved:0};

      for(let ki=0;ki<keys.length;ki++){
        if(cancelRef.current.cancelled)break;
        const key1=keys[ki];
        const [rn1,sy1Str]=key1.split('|');
        const sy1=Number(sy1Str);
        const hist1=histByKey[key1];
        stats.basesProcessed++;

        // 各 (n1, n2) を仮定
        for(let n1=1;n1<=9;n1++){
          if(n1===sy1)continue;
          for(let n2=n1+1;n2<=9;n2++){
            if(n2===sy1)continue;
            stats.pairsTotal++;

            // base のhit/trial
            let baseHits=0;
            hist1.forEach(h=>{if(h.top3.has(n1)&&h.top3.has(n2))baseHits++;});
            const baseRate=hist1.length>0?baseHits/hist1.length:0;
            // 既にA評価レベルの場合スキップ (rate>=90%) / 弱すぎ(<20%)もスキップ
            if(baseRate>=0.9||baseRate<0.2){stats.basesSkippedRate++;continue;}
            stats.pairsScanned++;

            // 同レース内の各 (regNo2, syaban2) を companion として試す
            const companionMap={};
            for(const h of hist1){
              for(const k2 of h.entryKeys){
                if(k2===key1)continue;
                const isHit=h.top3.has(n1)&&h.top3.has(n2);
                const m=companionMap[k2]=companionMap[k2]||{trials:0,hits:0,recent30T:0,recent30H:0};
                m.trials++;
                if(isHit)m.hits++;
                if(h.date>=_30daysAgo){m.recent30T++;if(isHit)m.recent30H++;}
              }
            }

            // companionを評価 (緩和版)
            for(const k2 in companionMap){
              const m=companionMap[k2];
              stats.companionsTotal++;
              if(m.trials<3){stats.companionsLowTrials++;continue;}  // 3回以上
              const compRate=m.hits/m.trials;
              const compWilson=wilsonLowerBound(m.hits,m.trials);
              const recent30Rate=m.recent30T>0?m.recent30H/m.recent30T:null;
              const recentBad=m.recent30T>=2&&recent30Rate<0.5;

              // A評価判定 (緩和: rate>=80%×3+ or rate>=70%×5+ or Wilson>=55%)
              const isA=((compRate>=0.8&&m.trials>=3)||(compRate>=0.7&&m.trials>=5)||compWilson>=0.55)&&!recentBad;
              if(!isA){stats.companionsNotA++;continue;}
              // 改善幅: baseRate より明確に高い必要 (10%緩和)
              if(compRate<baseRate+0.1){stats.companionsNotImproved++;continue;}

              const [rn2,sy2Str]=k2.split('|');
              const sy2=Number(sy2Str);
              // 重複除去 (player A,B の順序を正規化)
              const sigKey=[`${rn1}|${sy1}`,`${rn2}|${sy2}`].sort().join('+')+`→${n1},${n2}`;
              if(seen.has(sigKey))continue;
              seen.add(sigKey);

              const pa=playerMap[rn1]||{name:'?'};
              const pb=playerMap[rn2]||{name:'?'};
              candidates.push({
                type:'PLAYER_COMBO_PAIR_LINK',
                regA:rn1,playerNameA:pa.name,syaA:sy1,
                regB:rn2,playerNameB:pb.name,syaB:sy2,
                linkedPair:[n1,n2],
                trials:m.trials,hits:m.hits,rate:Math.round(compRate*1000)/10,
                wilsonLower:Math.round(compWilson*1000)/10,
                recent30Trials:m.recent30T,recent30Hits:m.recent30H,
                recent30Rate:recent30Rate!=null?Math.round(recent30Rate*1000)/10:null,
                baseRate:Math.round(baseRate*1000)/10,
                improvement:Math.round((compRate-baseRate)*1000)/10,
                desc:`「${pa.name}が${sy1}番」かつ「${pb.name}が${sy2}番」のとき → ${n1}・${n2}両方3着以内 ${Math.round(compRate*1000)/10}% (${m.hits}/${m.trials}) ※base ${Math.round(baseRate*1000)/10}%→改善+${Math.round((compRate-baseRate)*1000)/10}%`,
              });
            }
          }
        }

        if(ki%100===0||ki===keys.length-1){
          setProgress({phase:'mining',message:`${ki+1}/${keys.length}キー / 発見${candidates.length}件`,progress:(ki+1)/keys.length});
          await new Promise(r=>setTimeout(r,0));
        }
      }

      // 既採用除外
      const adopted=new Set(discoveries.filter(d=>d.active!==false).map(d=>signKey(d)));
      const newCandidates=candidates.filter(c=>!adopted.has(signKey(c)));

      // ソート: rate降順 → trials降順
      newCandidates.sort((a,b)=>b.rate-a.rate||b.trials-a.trials);

      setResults(newCandidates);
      console.log('[複合A詳細]',stats);
      const detailMsg=`完了: ${newCandidates.length}件 (既採用${candidates.length-newCandidates.length}件除外)\n`+
        `→ ベース${stats.basesProcessed.toLocaleString()}キー / ペア${stats.pairsScanned.toLocaleString()}/${stats.pairsTotal.toLocaleString()} (rate範囲外スキップ${stats.basesSkippedRate.toLocaleString()})\n`+
        `→ companion検査${stats.companionsTotal.toLocaleString()}件 (試行少${stats.companionsLowTrials.toLocaleString()}/A未到達${stats.companionsNotA.toLocaleString()}/改善不足${stats.companionsNotImproved.toLocaleString()})`;
      setProgress({phase:'done',message:detailMsg,progress:1});
    }catch(e){
      alert('エラー: '+e.message);
    }finally{
      setRunning(false);
    }
  };

  const adoptOne=async(c)=>{
    await dbPut('discoveries',{
      type:c.type, regA:c.regA, playerNameA:c.playerNameA, syaA:c.syaA,
      regB:c.regB, playerNameB:c.playerNameB, syaB:c.syaB,
      linkedPair:c.linkedPair,
      trials:c.trials, hits:c.hits, rate:c.rate,
      desc:c.desc, active:true, adoptedAt:Date.now(),
    });
    reload();
    setResults(results.filter(x=>signKey(x)!==signKey(c)));
  };

  const adoptAll=async()=>{
    if(!results||results.length===0)return;
    if(!confirm(`A評価複合条件 ${results.length}件 を全て採用しますか?`))return;
    for(const c of results){
      await dbPut('discoveries',{
        type:c.type, regA:c.regA, playerNameA:c.playerNameA, syaA:c.syaA,
        regB:c.regB, playerNameB:c.playerNameB, syaB:c.syaB,
        linkedPair:c.linkedPair,
        trials:c.trials, hits:c.hits, rate:c.rate,
        desc:c.desc, active:true, adoptedAt:Date.now(),
      });
    }
    reload();
    alert(`${results.length}件を採用しました`);
    setResults([]);
  };

  return(
    <div className="card" style={{borderColor:'var(--blue)',borderWidth:'2px'}}>
      <div className="card-title" style={{color:'var(--blue)'}}>🔬 複合条件 A評価マイニング</div>
      <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>
        単独サインだとA評価が出にくいなら<strong>条件を追加してA評価を満たす複合ルール</strong>を探索:<br/>
        • ベース「選手A が ○番」(rate 20-90%) を、companion「+選手B が □番」で絞る<br/>
        • 絞った結果 80%×3回以上 or 70%×5回以上 (A評価) なら採用候補に<br/>
        • baseより10%以上改善している組合せだけ<br/>
        • 既採用は除外
      </p>
      {!running?
        <button className="btn btn-primary" onClick={runMining} style={{width:'100%',background:'var(--blue)'}}>
          🔥 複合条件で A評価を発掘
        </button>:
        <button className="btn btn-danger" onClick={()=>{cancelRef.current.cancelled=true;}} style={{width:'100%'}}>
          ⏹ キャンセル
        </button>
      }
      {progress&&(
        <div style={{marginTop:'10px',padding:'8px',background:'rgba(26,85,136,0.07)',borderRadius:'5px',fontSize:'11px',whiteSpace:'pre-line',lineHeight:'1.6'}}>
          {progress.phase==='done'?'✓ ':'⏳ '}{progress.message}
          {progress.progress!=null&&(
            <div style={{height:'4px',background:'var(--bg3)',borderRadius:'2px',marginTop:'4px',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${progress.progress*100}%`,background:'var(--blue)'}}/>
            </div>
          )}
        </div>
      )}
      {results&&results.length>0&&(<>
        <div style={{display:'flex',gap:'8px',alignItems:'center',marginTop:'12px',marginBottom:'8px',flexWrap:'wrap'}}>
          <span style={{fontWeight:'700'}}>結果 {results.length}件</span>
          <button className="btn btn-sm btn-success" style={{marginLeft:'auto'}} onClick={adoptAll}>全て採用</button>
        </div>
        <div style={{maxHeight:'600px',overflowY:'auto'}}>
          {results.slice(0,100).map((c,i)=>(
            <div key={i} className="hist-item" style={{borderColor:'var(--green)',borderWidth:'1px'}}>
              <div style={{display:'flex',gap:'5px',alignItems:'center',flexWrap:'wrap',marginBottom:'5px'}}>
                <span style={{fontWeight:'900',color:'var(--green)'}}>A</span>
                <Chip no={c.syaA} size="sm"/><span style={{fontWeight:'700',fontSize:'12px'}}>{c.playerNameA}</span>
                <span style={{color:'var(--text2)'}}>＋</span>
                <Chip no={c.syaB} size="sm"/><span style={{fontWeight:'700',fontSize:'12px'}}>{c.playerNameB}</span>
                <span style={{color:'var(--text2)'}}>→</span>
                <Chip no={c.linkedPair[0]} size="sm"/><span>+</span><Chip no={c.linkedPair[1]} size="sm"/>
              </div>
              <div style={{display:'flex',gap:'10px',flexWrap:'wrap',fontSize:'11px',color:'var(--text2)',padding:'5px 7px',background:'rgba(0,0,0,0.03)',borderRadius:'4px'}}>
                <span>連動 <strong style={{color:'var(--green)'}}>{c.rate}%</strong>({c.hits}/{c.trials})</span>
                <span>Wilson下限 <strong>{c.wilsonLower}%</strong></span>
                <span>base {c.baseRate}% → <strong style={{color:'var(--green)'}}>+{c.improvement}%</strong></span>
                {c.recent30Rate!=null&&<span>直近30日 <strong>{c.recent30Rate}%</strong> ({c.recent30Hits}/{c.recent30Trials})</span>}
              </div>
              <button className="btn btn-sm btn-primary" style={{marginTop:'6px'}} onClick={()=>adoptOne(c)}>採用</button>
            </div>
          ))}
          {results.length>100&&<div className="empty">...他 {results.length-100}件</div>}
        </div>
      </>)}
      {results&&results.length===0&&!running&&(
        <div className="empty" style={{marginTop:'10px'}}>条件を満たす複合A評価サインがありませんでした</div>
      )}
    </div>
  );
}

function HighGradeDiscovery({raceResults,players,discoveries,reload}){
  const[running,setRunning]=useState(false);
  const[progress,setProgress]=useState(null);
  const[results,setResults]=useState(null);
  const[gradeFilter,setGradeFilter]=useState('AB');  // 'A' or 'AB'
  const[repairing,setRepairing]=useState(false);
  const[repairProgress,setRepairProgress]=useState(null);
  const cancelRef=useRef({cancelled:false});

  const dataStats=useMemo(()=>{
    const total=raceResults.length;
    const dedupedAll=dedupRaces(raceResults);
    const afterDedup=dedupedAll.length;
    const withResult=dedupedAll.filter(r=>r.result1).length;
    const withEntries=dedupedAll.filter(r=>r.entries&&r.entries.length>0).length;
    const valid=dedupedAll.filter(r=>r.result1&&r.entries&&r.entries.length>0).length;
    const missingEntries=dedupedAll.filter(r=>r.result1&&(!r.entries||r.entries.length===0)).length;
    const noResult=dedupedAll.filter(r=>!r.result1).length;
    // (regNo, syaban) のユニーク数を計算
    const keySet=new Set();
    const keyTrials={};
    dedupedAll.forEach(r=>{
      if(!r.result1||!r.entries)return;
      r.entries.forEach(e=>{
        const k=`${String(e.regNo||'').padStart(6,'0')}|${e.syaban}`;
        if(e.regNo&&e.syaban){keySet.add(k);keyTrials[k]=(keyTrials[k]||0)+1;}
      });
    });
    const totalKeys=keySet.size;
    const keysWith5=Object.values(keyTrials).filter(n=>n>=5).length;
    const keysWith10=Object.values(keyTrials).filter(n=>n>=10).length;
    const keysWith20=Object.values(keyTrials).filter(n=>n>=20).length;
    return {total,afterDedup,withResult,withEntries,valid,missingEntries,noResult,
      totalKeys,keysWith5,keysWith10,keysWith20};
  },[raceResults]);
  const missingEntries=dataStats.missingEntries;
  const validCount=dataStats.valid;

  const runRepair=async()=>{
    setRepairing(true);
    try{
      const result=await repairMissingEntries((done,total,rep,fail)=>{
        setRepairProgress({done,total,rep,fail,message:`${done}/${total}会場/日 処理中... 補完${rep}/失敗${fail}`});
      });
      alert(`✓ 出走表データを再取得しました\n補完: ${result.repaired}件\n失敗: ${result.failed}件 (取得不可)`);
      await reload();
    }catch(e){
      alert('再取得失敗: '+e.message);
    }finally{
      setRepairing(false);
      setRepairProgress(null);
    }
  };

  const runMining=async()=>{
    setRunning(true); setResults(null); setProgress(null);
    cancelRef.current={cancelled:false};
    try{
      const total=raceResults.length;
      const dedupedAll=dedupRaces(raceResults);
      const dupRemoved=total-dedupedAll.length;

      // 重複が500件以上あれば自動削除 (3万件規模に対応)
      if(dupRemoved>=500){
        setProgress({phase:'cleanup',message:`重複レース ${dupRemoved.toLocaleString()}件 を削除中...`,progress:0});
        await new Promise(r=>setTimeout(r,50));
        const deleted=await dedupRaceResultsDB((done,tot)=>{
          setProgress({phase:'cleanup',message:`削除中 ${done.toLocaleString()}/${tot.toLocaleString()}件`,progress:done/tot});
        });
        setProgress({phase:'cleanup',message:`✓ 重複 ${deleted.toLocaleString()}件 を削除しました。データ再読み込み中...`,progress:1});
        await reload();
        await new Promise(r=>setTimeout(r,300));
      }

      // 再評価
      const refreshedRaces=await dbAll('raceResults');
      const dedupedAll2=dedupRaces(refreshedRaces);
      const afterDedup=dedupedAll2.length;
      const withResult=dedupedAll2.filter(r=>r.result1).length;
      const withEntries=dedupedAll2.filter(r=>r.entries&&r.entries.length>0).length;
      const validRaces=dedupedAll2.filter(r=>r.result1&&r.entries&&r.entries.length>0);
      const noResult=dedupedAll2.filter(r=>!r.result1).length;
      const noEntries=dedupedAll2.filter(r=>!r.entries||r.entries.length===0).length;

      console.log('[マイニング診断]',{
        total:refreshedRaces.length,afterDedup,withResult,withEntries,
        valid:validRaces.length,noResult,noEntries,
      });

      setProgress({phase:'diag',message:`診断: 総${refreshedRaces.length.toLocaleString()}件 → 有効${validRaces.length.toLocaleString()}件 (結果なし${noResult.toLocaleString()}/出走表なし${noEntries.toLocaleString()})`,progress:0});
      await new Promise(r=>setTimeout(r,500));
      const playerMap={};
      players.forEach(p=>{if(p.regNo)playerMap[String(p.regNo).padStart(6,'0')]=p;});
      validRaces.forEach(r=>{
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          if(rn&&!playerMap[rn]&&e.name)playerMap[rn]={regNo:rn,name:e.name};
        });
      });

      // (regNo,syaban) ごとの該当履歴を一括構築 (高速化)
      setProgress({phase:'building',message:'該当履歴を構築中...',progress:0});
      await new Promise(r=>setTimeout(r,30));
      const histByKey={};
      validRaces.forEach(r=>{
        const top3=new Set([r.result1,r.result2,r.result3].filter(Boolean).map(Number));
        (r.entries||[]).forEach(e=>{
          const rn=String(e.regNo||'').padStart(6,'0');
          const sy=Number(e.syaban);
          if(!rn||!sy)return;
          const k=`${rn}|${sy}`;
          (histByKey[k]=histByKey[k]||[]).push({date:r.date,top3});
        });
      });

      const today=new Date();
      const _30daysAgo=new Date(today.getTime()-30*86400000).toISOString().slice(0,10);

      // 各 (regNo, syaban) について全(n1, n2)を評価
      const keys=Object.keys(histByKey);
      const candidates=[];
      const minTrials=5;  // 最低試行回数
      const stats={totalKeys:keys.length,keysProcessed:0,keysSkippedTrialsLow:0,
        totalPairs:0,pairsZeroHits:0,
        gradeA:0,gradeB:0,gradeC:0,gradeD:0,
        topRates:[]};  // 上位の rate を記録

      for(let ki=0;ki<keys.length;ki++){
        if(cancelRef.current.cancelled)break;
        const key=keys[ki];
        const [rn,syStr]=key.split('|');
        const sy=Number(syStr);
        const hist=histByKey[key];
        if(hist.length<minTrials){stats.keysSkippedTrialsLow++;continue;}
        stats.keysProcessed++;

        for(let n1=1;n1<=9;n1++){
          if(n1===sy)continue;
          for(let n2=n1+1;n2<=9;n2++){
            if(n2===sy)continue;
            stats.totalPairs++;
            let trials=0,hits=0;
            let recent30Trials=0,recent30Hits=0;
            for(const h of hist){
              trials++;
              const isHit=h.top3.has(n1)&&h.top3.has(n2);
              if(isHit)hits++;
              if(h.date>=_30daysAgo){
                recent30Trials++;
                if(isHit)recent30Hits++;
              }
            }
            if(hits===0){stats.pairsZeroHits++;continue;}
            // 上位rate記録 (10件まで)
            const rateNow=hits/trials;
            if(rateNow>=0.7){
              stats.topRates.push({rate:Math.round(rateNow*1000)/10,trials,hits,key:`${rn}|${sy}→${n1}+${n2}`});
              if(stats.topRates.length>20)stats.topRates=stats.topRates.sort((a,b)=>b.rate-a.rate).slice(0,10);
            }
            const rate=hits/trials;
            const wilsonLower=wilsonLowerBound(hits,trials);
            const recent30Rate=recent30Trials>0?recent30Hits/recent30Trials:null;

            // 評価 (Wilson信頼下限 と rate の両方を考慮)
            // 競輪は同選手×車番の組合せが少ないので rate基準も併用
            let grade='D';
            const hasRecent=recent30Trials>=2;
            const recentGood=hasRecent&&recent30Rate>=0.7;
            const recentBad=hasRecent&&recent30Rate<0.5;

            // A評価: 高精度(rate≥90%×試行5+) または 中精度大量試行(rate≥80%×10+) or Wilson≥65%
            if(((rate>=0.9&&trials>=5)||(rate>=0.8&&trials>=10)||wilsonLower>=0.65)&&!recentBad)grade='A';
            // B評価: rate≥80%×5+ or rate≥70%×8+ or Wilson≥50%
            else if(((rate>=0.8&&trials>=5)||(rate>=0.7&&trials>=8)||wilsonLower>=0.5)&&(!hasRecent||!recentBad))grade='B';
            // C評価: rate≥70%×5+ or rate≥60%×8+ or Wilson≥40%
            else if(((rate>=0.7&&trials>=5)||(rate>=0.6&&trials>=8)||wilsonLower>=0.4)&&!recentBad)grade='C';

            // 全gradeをカウント
            if(grade==='A')stats.gradeA++;
            else if(grade==='B')stats.gradeB++;
            else if(grade==='C')stats.gradeC++;
            else stats.gradeD++;

            if(grade==='D')continue;
            if(gradeFilter==='A'&&grade!=='A')continue;
            if(gradeFilter==='AB'&&grade==='C')continue;

            const p=playerMap[rn];
            candidates.push({
              type:'PLAYER_SYABAN_PAIR_LINK',
              regNo:rn, playerName:p?p.name:'?',
              syaban:sy, linkedPair:[n1,n2],
              trials, hits, rate:Math.round(rate*1000)/10,
              wilsonLower:Math.round(wilsonLower*1000)/10,
              recent30Trials, recent30Hits,
              recent30Rate:recent30Rate!=null?Math.round(recent30Rate*1000)/10:null,
              grade,
              desc:`${p?p.name:'?'} が${sy}番のとき → ${n1}・${n2}両方3着以内 ${Math.round(rate*1000)/10}% (${hits}/${trials})`,
            });
          }
        }

        if(ki%50===0){
          setProgress({phase:'mining',message:`${ki+1}/${keys.length} 確定${candidates.length}件`,progress:(ki+1)/keys.length});
          await new Promise(r=>setTimeout(r,0));
        }
      }

      // 既存採用済みの signKey を除外
      const adopted=new Set(discoveries.filter(d=>d.active!==false).map(d=>signKey(d)));
      const newCandidates=candidates.filter(c=>!adopted.has(signKey(c)));

      // ソート: A > B > C、各内で wilsonLower 降順
      const gradeOrder={A:0,B:1,C:2,D:3};
      newCandidates.sort((a,b)=>{
        if(a.grade!==b.grade)return gradeOrder[a.grade]-gradeOrder[b.grade];
        return b.wilsonLower-a.wilsonLower;
      });

      setResults(newCandidates);
      const aCount=newCandidates.filter(c=>c.grade==='A').length;
      const bCount=newCandidates.filter(c=>c.grade==='B').length;
      const cCount=newCandidates.filter(c=>c.grade==='C').length;
      const adoptedCount=candidates.length-newCandidates.length;
      stats.topRates=stats.topRates.sort((a,b)=>b.rate-a.rate).slice(0,10);
      console.log('[マイニング詳細]',stats);
      const detailMsg=`完了: A${aCount}/B${bCount}/C${cCount}件 (既採用${adoptedCount}件除外)\n` +
        `→ 全gradeカウント: A${stats.gradeA}/B${stats.gradeB}/C${stats.gradeC}/D(除外)${stats.gradeD}\n` +
        `→ 評価対象 ${stats.keysProcessed.toLocaleString()}キー × ${stats.totalPairs.toLocaleString()}ペア (Hits=0除外 ${stats.pairsZeroHits.toLocaleString()})\n` +
        (stats.topRates.length>0?`→ 上位rate例: ${stats.topRates.slice(0,3).map(t=>`${t.rate}%(${t.hits}/${t.trials})`).join(', ')}`:'→ 上位rate70%+のペアなし');
      setProgress({phase:'done',message:detailMsg,progress:1});
    }catch(e){
      alert('エラー: '+e.message);
    }finally{
      setRunning(false);
    }
  };

  const adoptOne=async(c)=>{
    await dbPut('discoveries',{
      type:c.type, regNo:c.regNo, playerName:c.playerName,
      syaban:c.syaban, linkedPair:c.linkedPair,
      trials:c.trials, hits:c.hits, rate:c.rate,
      _wilsonLower:c.wilsonLower, _recent30Rate:c.recent30Rate, _grade:c.grade,
      desc:c.desc, active:true, adoptedAt:Date.now(),
    });
    reload();
    setResults(results.filter(x=>signKey(x)!==signKey(c)));
  };

  const adoptAllA=async()=>{
    if(!results)return;
    const aList=results.filter(c=>c.grade==='A');
    if(aList.length===0)return alert('A評価サインがありません');
    if(!confirm(`A評価サイン ${aList.length}件 を全て採用しますか?`))return;
    for(const c of aList){
      await dbPut('discoveries',{
        type:c.type, regNo:c.regNo, playerName:c.playerName,
        syaban:c.syaban, linkedPair:c.linkedPair,
        trials:c.trials, hits:c.hits, rate:c.rate,
        _wilsonLower:c.wilsonLower, _recent30Rate:c.recent30Rate, _grade:c.grade,
        desc:c.desc, active:true, adoptedAt:Date.now(),
      });
    }
    reload();
    alert(`${aList.length}件を採用しました`);
    setResults(results.filter(c=>c.grade!=='A'));
  };

  return(
    <div className="card" style={{borderColor:'var(--green)',borderWidth:'2px'}}>
      <div className="card-title" style={{color:'var(--green)'}}>🏆 A/B評価サイン発見マイニング</div>

      {/* データ統計サマリー (常時表示) */}
      <div style={{padding:'10px',background:'var(--bg3)',borderRadius:'6px',marginBottom:'10px',fontSize:'11px',lineHeight:'1.7'}}>
        <div style={{fontWeight:'700',marginBottom:'4px'}}>📊 マイニング対象データ</div>
        <div>総レース: <strong>{dataStats.total.toLocaleString()}</strong>件 → 重複除去後 <strong>{dataStats.afterDedup.toLocaleString()}</strong>件</div>
        <div>
          結果あり <strong style={{color:dataStats.withResult===dataStats.afterDedup?'var(--green)':'var(--yellow)'}}>{dataStats.withResult.toLocaleString()}</strong>件
          / 出走表あり <strong style={{color:dataStats.withEntries===dataStats.afterDedup?'var(--green)':'var(--yellow)'}}>{dataStats.withEntries.toLocaleString()}</strong>件
          → 両方ある <strong style={{color:'var(--green)'}}>{dataStats.valid.toLocaleString()}</strong>件 (有効)
        </div>
        <div style={{marginTop:'4px',color:'var(--text2)'}}>
          選手×車番 ユニーク組合せ: <strong>{dataStats.totalKeys.toLocaleString()}</strong>パターン<br/>
          試行5+: <strong style={{color:'var(--accent)'}}>{dataStats.keysWith5.toLocaleString()}</strong> /
          10+: <strong>{dataStats.keysWith10.toLocaleString()}</strong> /
          20+: <strong>{dataStats.keysWith20.toLocaleString()}</strong>
        </div>
      </div>

      {missingEntries>0&&(
        <div style={{padding:'10px 12px',marginBottom:'10px',background:'rgba(187,34,0,0.07)',border:'1px solid var(--red)',borderRadius:'6px'}}>
          <div style={{fontSize:'12px',fontWeight:'700',color:'var(--red)',marginBottom:'4px'}}>
            ⚠️ 出走表データが欠けているレース {missingEntries.toLocaleString()}件
          </div>
          <div style={{fontSize:'11px',color:'var(--text2)',marginBottom:'8px'}}>
            結果はあるが出走表データ(選手↔車番)が欠落しています。これらはマイニングに使えません。<br/>
            有効レース: {validCount.toLocaleString()}件 (全{dedupedAll.length.toLocaleString()}件中)
          </div>
          {!repairing?
            <button className="btn btn-sm btn-danger" onClick={runRepair}>🔧 KEIRIN.JPから出走表を再取得</button>:
            <div style={{fontSize:'11px'}}>
              ⏳ {repairProgress?.message||'再取得中...'}
              <div style={{height:'4px',background:'var(--bg3)',borderRadius:'2px',marginTop:'4px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${repairProgress?(repairProgress.done/repairProgress.total*100):0}%`,background:'var(--red)',transition:'width 0.3s'}}/>
              </div>
            </div>
          }
        </div>
      )}

      <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>

function PrecisionReview({discoveries,raceResults,reload}){
  const[running,setRunning]=useState(false);
  const[review,setReview]=useState(null);

  const runReview=async()=>{
    setRunning(true);
    await new Promise(r=>setTimeout(r,30));
    const uniq=dedupSigns(discoveries.filter(d=>d.active!==false));
    const evaluated=uniq.map(s=>({sign:s,eval:evaluateSign(s,raceResults)}));
    evaluated.sort((a,b)=>{
      const o={'A':0,'B':1,'C':2};
      return o[a.eval.grade]-o[b.eval.grade]||b.eval.wilsonLower-a.eval.wilsonLower;
    });
    setReview(evaluated);
    setRunning(false);
  };

  const disableAllC=async()=>{
    if(!review)return;
    const cSigns=review.filter(r=>r.eval.grade==='C');
    if(cSigns.length===0)return alert('C評価サインはありません');
    if(!confirm(`C評価サイン ${cSigns.length}件 を無効化しますか? (削除はしません、有効/無効トグル)`))return;
    for(const {sign} of cSigns){
      await dbPut('discoveries',{...sign,active:false});
    }
    alert(`${cSigns.length}件を無効化しました`);
    reload();
    setReview(null);
  };

  const A=review?review.filter(r=>r.eval.grade==='A'):[];
  const B=review?review.filter(r=>r.eval.grade==='B'):[];
  const C=review?review.filter(r=>r.eval.grade==='C'):[];

  return(
    <div className="card" style={{borderColor:'var(--accent)',borderWidth:'2px'}}>
      <div className="card-title" style={{color:'var(--accent)'}}>🧪 サイン精度の再評価</div>
      <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>
        採用済みサインを統計的に再評価:<br/>
        • <strong>ウィルソン信頼区間下限</strong> (試行数が少ない100%サインの過信を防止)<br/>
        • <strong>直近30日の連動率</strong> (劣化サインを検出)<br/>
        • <strong>時間重み付き連動率</strong> (新しいデータほど重視)<br/>
        → A/B/C で総合評価
      </p>
      <button className="btn btn-primary" onClick={runReview} disabled={running} style={{width:'100%'}}>
        {running?'⏳ 評価中...':'▶ 全採用サインを再評価'}
      </button>
      {review&&(<>
        <div style={{marginTop:'14px',padding:'10px',background:'var(--bg3)',borderRadius:'6px',fontSize:'12px'}}>
          <div style={{display:'flex',gap:'14px',flexWrap:'wrap'}}>
            <span><strong style={{color:'var(--green)'}}>A評価 {A.length}件</strong> 信頼下限70%+&直近70%+</span>
            <span><strong style={{color:'var(--yellow)'}}>B評価 {B.length}件</strong> どちらか一方</span>
            <span><strong style={{color:'var(--red)'}}>C評価 {C.length}件</strong> 両方低い</span>
          </div>
          {C.length>0&&<button className="btn btn-sm btn-danger" style={{marginTop:'10px'}} onClick={disableAllC}>C評価 {C.length}件 を無効化</button>}
        </div>

        <div style={{maxHeight:'600px',overflowY:'auto',marginTop:'10px'}}>
          {review.map(({sign,eval:ev},i)=>{
            const c=ev.grade==='A'?'var(--green)':ev.grade==='B'?'var(--yellow)':'var(--red)';
            return(
              <div key={i} className="hist-item" style={{borderColor:c,borderWidth:'2px'}}>
                <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginBottom:'5px'}}>
                  <span style={{fontWeight:'900',fontSize:'18px',color:c,minWidth:'24px'}}>{ev.grade}</span>
                  <span style={{fontSize:'12px',flex:1,minWidth:'200px'}}>{describeSign(sign)}</span>
                </div>
                <div style={{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'11px',color:'var(--text2)',padding:'5px 8px',background:'rgba(0,0,0,0.03)',borderRadius:'5px'}}>
                  <span>全期間 <strong>{ev.rate}%</strong> ({ev.hits}/{ev.trials})</span>
                  <span>信頼下限 <strong style={{color:ev.wilsonLower>=70?'var(--green)':ev.wilsonLower>=50?'var(--yellow)':'var(--red)'}}>{ev.wilsonLower}%</strong></span>
                  {ev.recent30Rate!=null&&<span>直近30日 <strong style={{color:ev.recent30Rate>=70?'var(--green)':ev.recent30Rate>=50?'var(--yellow)':'var(--red)'}}>{ev.recent30Rate}%</strong> ({ev.recent30Hits}/{ev.recent30Trials})</span>}
                  {ev.recent30Rate==null&&ev.recent30Trials===0&&<span style={{color:'var(--text2)'}}>直近30日 該当なし</span>}
                  {ev.weightedRate!=null&&<span>時間重み <strong>{ev.weightedRate}%</strong></span>}
                </div>
                {ev.issues.length>0&&(
                  <div style={{fontSize:'10px',color:'var(--red)',marginTop:'5px'}}>
                    ⚠️ {ev.issues.join(' / ')}
                  </div>
                )}
                <div style={{display:'flex',gap:'5px',marginTop:'6px'}}>
                  {sign.active!==false?
                    <button className="btn btn-sm btn-ghost" onClick={async()=>{await dbPut('discoveries',{...sign,active:false});reload();setReview(null);}}>無効化</button>:
                    <button className="btn btn-sm btn-success" onClick={async()=>{await dbPut('discoveries',{...sign,active:true});reload();setReview(null);}}>有効化</button>
                  }
                  <button className="btn btn-sm btn-danger" onClick={async()=>{if(confirm('削除しますか?')){await dbDel('discoveries',sign.id);reload();setReview(null);}}}>削除</button>
                </div>
              </div>
            );
          })}
        </div>
      </>)}
    </div>
  );
}

function ValidationScreen({raceResults,signConditions,discoveries=[],players,reload}){
  const[running,setRunning]=useState(false);
  const[result,setResult]=useState(null);
  const[roiRunning,setRoiRunning]=useState(false);
  const[roiProgress,setRoiProgress]=useState(null);
  const[roiResults,setRoiResults]=useState(null);
  const cancelRef=useRef({cancelled:false});

  const runROIMining=async()=>{
    setRoiRunning(true); setRoiResults(null);
    cancelRef.current={cancelled:false};
    try{
      const res=await mineROIPositive(raceResults,players,{
        minRate:80,minROI:100,minTrials:3,
        cancelRef:cancelRef.current,
        onProgress:(p)=>setRoiProgress(p),
      });
      setRoiResults(res);
      await reload();  // ワイド配当キャッシュ反映
    }catch(e){
      alert('エラー: '+e.message);
    }finally{
      setRoiRunning(false);
    }
  };

  const adoptROISign=async(s)=>{
    await dbPut('discoveries',{
      type:s.type,regNo:s.regNo,playerName:s.playerName,
      syaban:s.syaban,linkedPair:s.linkedPair,
      trials:s.trials,rate:s.rate,
      desc:s.desc,examples:s.examples,
      _roi:s.roi,_avgPay:s.avgPay,_totalPayout:s.totalPayout,
      active:true,adoptedAt:Date.now(),
    });
    reload();
    alert(`採用しました (ROI ${s.roi}%, 平均配当 ${s.avgPay}円)`);
  };

  const adoptAllROI=async()=>{
    if(!roiResults||roiResults.length===0)return;
    if(!confirm(`ROI 100%+ サイン ${roiResults.length}件 を全て採用しますか?`))return;
    for(const s of roiResults){
      await dbPut('discoveries',{
        type:s.type,regNo:s.regNo,playerName:s.playerName,
        syaban:s.syaban,linkedPair:s.linkedPair,
        trials:s.trials,rate:s.rate,
        desc:s.desc,examples:s.examples,
        _roi:s.roi,_avgPay:s.avgPay,_totalPayout:s.totalPayout,
        active:true,adoptedAt:Date.now(),
      });
    }
    reload();
    alert(`${roiResults.length}件 採用完了`);
  };

  const runChecks=async()=>{
    setRunning(true);
    await new Promise(r=>setTimeout(r,50));

    // A. データ整合性
    const A={};
    const raceMap={};
    const dups=[];
    raceResults.forEach(r=>{
      const k=`${r.date||''}|${r.venue||''}|${r.raceNo||''}`;
      if(raceMap[k])dups.push(r);
      else raceMap[k]=r;
    });
    A.duplicates=dups;
    A.noResult=raceResults.filter(r=>r.entries&&r.entries.length>0&&!r.result1&&r.date<new Date().toISOString().slice(0,10));
    A.noEntries=raceResults.filter(r=>r.result1&&(!r.entries||r.entries.length===0));
    A.invalidResult=raceResults.filter(r=>{
      if(!r.result1)return false;
      const t3=[r.result1,r.result2,r.result3].map(Number);
      return t3.some(n=>n<1||n>9||isNaN(n));
    });
    A.countMismatch=raceResults.filter(r=>r.entries&&r.racerCount&&r.entries.length!==r.racerCount);
    A.noPayoutWithResult=raceResults.filter(r=>r.result1&&!r.exactaPayout&&!r.trifectaPayout);
    A.todayMissing=raceResults.filter(r=>r.date===new Date().toISOString().slice(0,10)&&!r.result1);

    // B. サイン信頼性 (採用済みのみ再計算)
    const B={drifted:[],ok:[],lowTrials:[]};
    const validRaces=dedupRaces(raceResults.filter(r=>r.result1&&r.entries));
    const uniqueSigns=dedupSigns(discoveries.filter(d=>d.active!==false));
    for(const sign of uniqueSigns){
      let trials=0,hits=0;
      for(const r of validRaces){
        const ents=r.entries||[];
        const top3=[r.result1,r.result2,r.result3].filter(Boolean).map(Number);
        if(sign.type==='PLAYER_SYABAN_LINK'){
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
          if(!myE)continue;
          trials++;
          if(top3.includes(Number(sign.linkedSyaban)))hits++;
        }else if(sign.type==='PLAYER_SYABAN_PAIR_LINK'){
          const pair=Array.isArray(sign.linkedPair)?sign.linkedPair.map(Number):[];
          const myE=ents.find(e=>String(e.regNo)===String(sign.regNo)&&Number(e.syaban)===Number(sign.syaban));
          if(!myE||pair.length!==2)continue;
          trials++;
          if(pair.every(n=>top3.includes(n)))hits++;
        }
      }
      const current=trials>0?Math.round(hits/trials*100):null;
      const saved=sign.rate||0;
      const drift=current!=null&&Math.abs(current-saved)>=10;
      const lowTrials=trials<5;
      if(lowTrials)B.lowTrials.push({sign,trials,hits,current});
      else if(drift)B.drifted.push({sign,trials,hits,current,saved});
      else B.ok.push({sign,trials,hits,current});
    }

    // C. 異常値検出
    const C={};
    const exPays=raceResults.map(r=>r.exactaPayout).filter(Boolean).sort((a,b)=>a-b);
    const trPays=raceResults.map(r=>r.trifectaPayout).filter(Boolean).sort((a,b)=>a-b);
    const exMed=exPays[Math.floor(exPays.length/2)]||0;
    const trMed=trPays[Math.floor(trPays.length/2)]||0;
    C.medianExacta=exMed;
    C.medianTrifecta=trMed;
    C.highExacta=raceResults.filter(r=>r.exactaPayout&&r.exactaPayout>exMed*10).sort((a,b)=>b.exactaPayout-a.exactaPayout).slice(0,10);
    C.highTrifecta=raceResults.filter(r=>r.trifectaPayout&&r.trifectaPayout>trMed*15).sort((a,b)=>b.trifectaPayout-a.trifectaPayout).slice(0,10);
    C.tooFewEntries=raceResults.filter(r=>r.entries&&r.entries.length>0&&r.entries.length<5);
    // 選手DB整合性
    const playersByReg={};
    players.forEach(p=>{if(p.regNo){const rn=String(p.regNo).padStart(6,'0');(playersByReg[rn]=playersByReg[rn]||[]).push(p);}});
    C.dupPlayers=Object.entries(playersByReg).filter(([_,arr])=>arr.length>=2).map(([k,arr])=>({regNo:k,entries:arr}));

    setResult({A,B,C,timestamp:new Date().toISOString()});
    setRunning(false);
  };

  const updateSignRate=async(item)=>{
    await dbPut('discoveries',{...item.sign,rate:item.current,trials:item.trials,hits:item.hits});
    reload();
    alert(`サインを更新しました\n${item.saved}% → ${item.current}%`);
  };

  const removeAllInvalid=async()=>{
    if(!result?.A?.invalidResult.length)return;
    if(!confirm(`不正な結果データ ${result.A.invalidResult.length}件 を削除しますか?`))return;
    for(const r of result.A.invalidResult){await dbDel('raceResults',r.id);}
    alert('削除しました'); reload();
  };

  const Card=({title,status,children})=>{
    const colorMap={ok:'var(--green)',warn:'var(--yellow)',err:'var(--red)'};
    const c=colorMap[status]||'var(--border)';
    const icon=status==='ok'?'✅':status==='warn'?'⚠️':status==='err'?'❌':'▫';
    return(
      <div className="card" style={{borderColor:c,borderWidth:'1px'}}>
        <div style={{fontSize:'13px',fontWeight:'700',marginBottom:'8px',color:c}}>{icon} {title}</div>
        {children}
      </div>
    );
  };

  const ListMini=({items,render,max=5})=>{
    if(items.length===0)return null;
    return(
      <div style={{maxHeight:'180px',overflowY:'auto',marginTop:'6px'}}>
        {items.slice(0,max).map((it,i)=><div key={i} style={{fontSize:'11px',padding:'3px 0',color:'var(--text2)'}}>{render(it)}</div>)}
        {items.length>max&&<div style={{fontSize:'10px',color:'var(--text2)',marginTop:'4px'}}>...他 {items.length-max}件</div>}
      </div>
    );
  };

  return(
    <div>
      <AnomalyHunter raceResults={raceResults} players={players} discoveries={discoveries} reload={reload}/>
      <CompoundADiscovery raceResults={raceResults} players={players} discoveries={discoveries} reload={reload}/>
      <HighGradeDiscovery raceResults={raceResults} players={players} discoveries={discoveries} reload={reload}/>
      <PrecisionReview discoveries={discoveries} raceResults={raceResults} reload={reload}/>
      <div className="card" style={{borderColor:'var(--accent)',borderWidth:'2px'}}>
        <div className="card-title" style={{color:'var(--accent)'}}>💎 ROI+ サイン総動員マイニング</div>
        <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}}>
          全2車連動パターンを抽出して<strong>実際のワイド配当からROI計算</strong>:<br/>
          • 連動率 <strong style={{color:'var(--green)'}}>80%以上</strong><br/>
          • <strong style={{color:'var(--green)'}}>ワイドROI 100%以上</strong> (回収率)<br/>
          • 試行3回以上
        </p>
        <p style={{fontSize:'10px',color:'var(--yellow)',marginBottom:'10px'}}>
          ⚠️ 履歴データのワイド配当を取得するため数分〜数十分かかります<br/>
          (CORSプロキシ経由、初回のみ遅い・キャッシュ後は瞬時)
        </p>
        {!roiRunning?(
          <button className="btn btn-primary" onClick={runROIMining} style={{width:'100%'}}>
            🔥 ROI+ サインを総動員で探す
          </button>
        ):(
          <button className="btn btn-danger" onClick={()=>{cancelRef.current.cancelled=true;}} style={{width:'100%'}}>
            ⏹ キャンセル
          </button>
        )}
        {roiProgress&&(
          <div style={{marginTop:'10px',padding:'8px 10px',background:'rgba(184,101,26,0.07)',borderRadius:'5px',fontSize:'11px'}}>
            <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
              <span>{roiProgress.phase==='done'?'✓':'⏳'}</span>
              <span>{roiProgress.message}</span>
            </div>
            {roiProgress.progress!=null&&(
              <div style={{height:'4px',background:'var(--bg3)',borderRadius:'2px',marginTop:'6px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${roiProgress.progress*100}%`,background:'var(--accent)',transition:'width 0.3s'}}/>

        {roiResults&&roiResults.length>0&&(

                  <div style={{padding:'6px 8px',background:'rgba(58,122,42,0.06)',borderRadius:'4px',fontSize:'11px',lineHeight:'1.6'}}>
